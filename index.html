const SEEDED_IDS=new Set(PROPS_BASE.flatMap(p=>p.hitos.filter(h=>h.seeded).map(h=>h.id)));
const KEY='retiro_inmobiliario_v2';
const MES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MES_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// Ahorro teórico mensual — inicia Abril 2026
const MPLAN={1:3000,2:3000,3:16333,4:3000,5:3000,6:7333,7:3000,8:3000,9:3000,10:3000,11:3000,12:7333};
function mSav(y,m){if(y<2026||(y===2026&&m<4))return 0;return MPLAN[m]||3000;}
function theorCumul(toY,toM){
  let t=0,y=2026,m=4;
  while(y<toY||(y===toY&&m<=toM)){t+=mSav(y,m);m++;if(m>12){y++;m=1;}}
  return t;
}

// ─── UTILS ───────────────────────────────────────
const fUSD=n=>'$'+Math.round(n).toLocaleString('es-AR');
const fLoc=n=>'$'+Math.round(n).toLocaleString('es-AR');
const mStr=(y,m)=>`${MES[m-1]} ${y}`;
const pDate=s=>{if(!s)return null;const[y,m]=s.split('-').map(Number);return{y,m};};
function addM(y,m,n){m+=n;while(m>12){m-=12;y++;}while(m<1){m+=12;y--;}return{y,m};}
const mDiff=(y1,m1,y2,m2)=>(y2-y1)*12+(m2-m1);

// ─── HELPERS ─────────────────────────────────────
function getProp(p,data){
  const ov=data.propOverrides?.[p.id]||{};
  return{...p,name:ov.name??p.name,totalUSD:ov.totalUSD??p.totalUSD,
    ingreso:ov.ingreso??p.ingreso,comentario:ov.comentario??p.comentario};
}
function getAllHitos(data){
  return PROPS_BASE.flatMap(p=>
    p.hitos.filter(h=>h.date).map(h=>{
      const ho=data.hitoOverrides?.[h.id]||{};
      const po=data.propOverrides?.[p.id]||{};
      return{...h,usd:ho.usd??h.usd,date:ho.date||h.date,
        label:ho.label||h.label,propId:p.id,
        propName:po.name||p.name,color:p.color,colorL:p.colorL,
        rental:h.rental||false};
    })
  ).sort((a,b)=>a.date.localeCompare(b.date));
}
function getOrderedPending(data){
  const allH=getAllHitos(data);
  const pIds=new Set(Object.keys(data.paid));
  const pending=allH.filter(h=>!pIds.has(h.id));
  const order=data.hitoOrder||[];
  return[...pending].sort((a,b)=>{
    const ia=order.indexOf(a.id),ib=order.indexOf(b.id);
    if(ia===-1&&ib===-1)return a.date.localeCompare(b.date);
    if(ia===-1)return 1;if(ib===-1)return-1;return ia-ib;
  });
}
function getRealBalance(data){
  const rt=data.savings.reduce((s,e)=>s+e.usd,0);
  const np=Object.entries(data.paid).filter(([,v])=>!v.seeded&&v.amount_usd).reduce((s,[,v])=>s+(v.amount_usd||0),0);
  return rt-np;
}
// Calcula fecha proyectada de cada hito pendiente según ahorro real actual
function computePaymentDates(data){
  const now=new Date(),nY=now.getFullYear(),nM=now.getMonth()+1;
  const ordPending=getOrderedPending(data);
  const savingsFunded=ordPending.filter(h=>!h.rental);
  const rentalFunded=ordPending.filter(h=>h.rental);
  let bal=getRealBalance(data);
  let cy=nY,cm=nM;
  const result={};
  const queue=[...savingsFunded];
  let it=0;
  while(queue.length>0&&it++<1000){
    const r=addM(cy,cm,1);cy=r.y;cm=r.m;
    bal+=mSav(cy,cm);
    while(queue.length>0&&bal>=queue[0].usd){
      const h=queue.shift();
      bal-=h.usd;
      result[h.id]={y:cy,m:cm};
    }
  }
  // Hitos de renta: usar fecha del plan (no consumen ahorro)
  rentalFunded.forEach(h=>{const d=pDate(h.date);if(d)result[h.id]={y:d.y,m:d.m};});
  return result;
}

// ─── STORAGE ─────────────────────────────────────
const DEF={trm_ars:1500,trm_cop:3700,savings:[],paid:{},propStatus:{},propOverrides:{},hitoOverrides:{},hitoOrder:[]};
function loadData(){
  try{
    const s=localStorage.getItem(KEY);
    const d=s?{...DEF,...JSON.parse(s)}:{...DEF};
    SEEDED_IDS.forEach(id=>{if(!d.paid[id])d.paid[id]={seeded:true};});
    PROPS_BASE.forEach(p=>{if(!d.propStatus[p.id])d.propStatus[p.id]=p.defStatus;});
    if(!d.hitoOrder||d.hitoOrder.length===0)
      d.hitoOrder=getOrderedPending(d).map(h=>h.id);
    return d;
  }catch(e){
    const d={...DEF};
    SEEDED_IDS.forEach(id=>{d.paid[id]={seeded:true};});
    PROPS_BASE.forEach(p=>{d.propStatus[p.id]=p.defStatus;});
    return d;
  }
}

// ─── MÉTRICAS ────────────────────────────────────
function computeMetrics(data){
  const now=new Date(),nY=now.getFullYear(),nM=now.getMonth()+1;
  const allH=getAllHitos(data);
  const pIds=new Set(Object.keys(data.paid));
  const ordPending=getOrderedPending(data);
  // Solo hitos de ahorro personal para el próximo pago y completitud
  const savingsPending=ordPending.filter(h=>!h.rental);
  const nextHito=savingsPending[0]||null;
  const realTotal=data.savings.reduce((s,e)=>s+e.usd,0);
  const nonSeededPaid=Object.entries(data.paid).filter(([,v])=>!v.seeded&&v.amount_usd).reduce((s,[,v])=>s+(v.amount_usd||0),0);
  const realBalance=realTotal-nonSeededPaid;
  const thTotal=theorCumul(nY,nM);
  const savGap=realTotal-thTotal;
  const monthTheo=mSav(nY,nM);
  const monthReal=data.savings.filter(s=>s.year===nY&&s.month===nM).reduce((s,e)=>s+e.usd,0);
  const seededSum=allH.filter(h=>data.paid[h.id]?.seeded).reduce((s,h)=>s+h.usd,0);
  const totalPortfolio=PROPS_BASE.reduce((s,p)=>s+getProp(p,data).totalUSD,0);
  const progressValue=seededSum+realTotal;

  // Próximo hito: delay calculado con ahorro REAL actual
  let nd=null;
  if(nextHito){
    const{y:py,m:pm}=pDate(nextHito.date);
    const planMo=mDiff(nY,nM,py,pm);
    if(realBalance>=nextHito.usd){
      nd={months:0,status:'ready',canPay:true,hito:nextHito,reachDate:{y:nY,m:nM}};
    }else{
      let bal=realBalance,cy=nY,cm=nM,mo=0;
      while(bal<nextHito.usd&&mo<480){
        const r=addM(cy,cm,1);cy=r.y;cm=r.m;bal+=mSav(cy,cm);mo++;
      }
      const delay=Math.max(0,mo-Math.max(0,planMo));
      // FIX: si hay déficit acumulado (savGap<0) pero delay=0, mostrar como warning
      let status=delay===0?'ok':delay<=3?'warning':'danger';
      if(delay===0&&savGap<-monthTheo)status='warning';
      nd={months:delay,status,canPay:false,hito:nextHito,
          reachDate:addM(nY,nM,mo),monthsNeeded:mo,
          behindSavings:savGap<0};
    }
  }

  // Fecha de completitud — solo hitos de ahorro personal (excluye rental)
  let comp=null;
  if(savingsPending.length>0){
    let bal=realBalance,cy=nY,cm=nM,r=[...savingsPending],it=0;
    while(r.length>0&&it++<800){
      const nx=addM(cy,cm,1);cy=nx.y;cm=nx.m;bal+=mSav(cy,cm);
      while(r.length>0&&bal>=r[0].usd){bal-=r[0].usd;r.shift();}
    }
    comp={y:cy,m:cm};
  }

  let overall='ok';
  if(savGap<-5000||(nd&&nd.months>3))overall='danger';
  else if(savGap<-1000||(nd&&nd.months>0&&nd.months<=3)||(nd&&nd.status==='warning'))overall='warning';

  return{realTotal,nonSeededPaid,realBalance,thTotal,savGap,monthTheo,monthReal,
    seededSum,totalPortfolio,progressValue,
    paidCount:allH.filter(h=>pIds.has(h.id)).length,
    totalHitos:allH.length,nextHito,nd,comp,overall,nY,nM,pIds};
}

function InicioTab({metrics,onAddSaving}){
  const{realTotal,realBalance,thTotal,savGap,monthTheo,monthReal,
    progressValue,totalPortfolio,seededSum,paidCount,totalHitos,
    nd,comp,overall,nY,nM}=metrics;
  const ahead=savGap>=0;
  const mAhead=monthReal>=monthTheo;
  const progressPct=totalPortfolio>0?(progressValue/totalPortfolio*100):0;
  const compDelay=comp?mDiff(2039,6,comp.y,comp.m):0;
  const st={
    ok:{c:C.success,bg:C.successL,msg:'Al día con el plan'},
    warning:{c:C.warning,bg:C.warningL,msg:'Posible retraso — revisar ahorro mensual'},
    danger:{c:C.danger,bg:C.dangerL,msg:'Retrasado respecto al plan'},
  }[overall];

  return<div className="fade-in">
    <PageHeader title="Inicio" sub={`${MES_FULL[nM-1]} ${nY} · Actualizado ahora`}/>

    <div style={{margin:'12px 12px 0'}}>
      <div style={{background:st.bg,border:`1.5px solid ${st.c}33`,borderRadius:12,

        <div style={{width:34,height:34,borderRadius:17,background:st.c+'22',

          {overall==='ok'?'✓':overall==='warning'?'▲':'!'}
        </div>
        <div>
          <div style={{fontWeight:700,color:st.c,fontSize:14,fontFamily:C.font}}>{st.msg}</div>
          <div style={{fontSize:12,color:C.sub,marginTop:1,fontFamily:C.font}}>
            {ahead?`+${fUSD(Math.abs(savGap))} sobre lo teórico`:`${fUSD(Math.abs(savGap))} bajo lo teórico`}
          </div>
        </div>
      </div>
    </div>

    {/* Ahorro mensual */}
    <Card style={{marginTop:10}}>
      <div style={{fontSize:10,color:C.sub,fontWeight:700,letterSpacing:1.2,
        textTransform:'uppercase',marginBottom:10,fontFamily:C.font}}>
        Ahorro — {MES_FULL[nM-1]} {nY}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
        <div style={{background:C.border2,borderRadius:9,padding:10}}>
          <div style={{fontSize:11,color:C.sub,fontFamily:C.font}}>Teórico este mes</div>
          <div style={{fontSize:22,fontWeight:700,color:C.primary,fontFamily:C.head,lineHeight:1.1,marginTop:2}}>
            {fUSD(monthTheo)}
          </div>
        </div>
        <div style={{background:mAhead?C.successL:C.dangerL,borderRadius:9,padding:10,
          border:`1.5px solid ${mAhead?C.success:C.danger}22`}}>
          <div style={{fontSize:11,color:C.sub,fontFamily:C.font}}>Real este mes</div>
          <div style={{fontSize:22,fontWeight:700,color:mAhead?C.success:C.danger,fontFamily:C.head,lineHeight:1.1,marginTop:2}}>
            {fUSD(monthReal)}
          </div>
          <div style={{fontSize:11,color:mAhead?C.success:C.danger,fontFamily:C.font,marginTop:1}}>
            {monthReal-monthTheo>=0?'+':''}{fUSD(monthReal-monthTheo)}
          </div>
        </div>
      </div>
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,
        display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div>

            </div>
          </div>

            <div style={{fontSize:22,fontWeight:700,color:C.warning,fontFamily:C.head}}>{fUSD(nd.hito.usd)}</div>
            <div style={{fontSize:11,color:C.sub}}>USD</div>
          </div>
        </div>
        <div style={{marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.sub,marginBottom:4,fontFamily:C.font}}>
            <span>Balance acumulado</span>
            <span style={{fontWeight:600,color:C.text}}>{fUSD(Math.min(realBalance,nd.hito.usd))} / {fUSD(nd.hito.usd)}</span>
          </div>
          <Bar value={realBalance} max={nd.hito.usd}
            color={realBalance>=nd.hito.usd?C.success:realBalance>=nd.hito.usd*.6?C.warning:C.danger}/>
        </div>
        {nd.canPay?(
          <div style={{background:C.successL,borderRadius:8,padding:'9px 12px',
            fontSize:13,color:C.success,fontWeight:600,fontFamily:C.font}}>
            ✓ Saldo suficiente — podés realizar este pago ahora
          </div>
        ):(()=>{
          const bgColor=nd.status==='ok'?C.successL:nd.status==='warning'?C.warningL:C.dangerL;
          const txColor=nd.status==='ok'?C.success:nd.status==='warning'?C.warning:C.danger;
          let msg='';
          if(nd.months===0&&nd.status==='ok'){
            msg=`✓ Llegás en fecha — saldo disponible ${mStr(nd.reachDate.y,nd.reachDate.m)}`;
          }else if(nd.months===0&&nd.status==='warning'){
            msg=`⚠️ Llegarás al pago pero vas ${fUSD(Math.abs(savGap))} atrasado en ahorro acumulado`;
          }else{
            msg=`▲ Delay: ${nd.months} ${nd.months===1?'mes':'meses'} — pago posible ${mStr(nd.reachDate.y,nd.reachDate.m)}`;
          }
          const faltante=Math.max(0,nd.hito.usd-realBalance);
          const mesesPlan=Math.max(1,mDiff(nY,nM,...Object.values(pDate(nd.hito.date))));
          const necesario=Math.ceil(faltante/mesesPlan);
          return<div style={{background:bgColor,borderRadius:8,padding:'9px 12px',
            fontSize:13,fontFamily:C.font,fontWeight:600,color:txColor}}>
            {msg}
            {nd.months>0&&<div style={{fontSize:11,marginTop:3,opacity:.9}}>
              Necesitás ~{fUSD(necesario)}/mes para llegar en fecha
            </div>}
          </div>;
        })()}
      </Card>
    )}

    <div style={{padding:'4px 12px 8px'}}>
      <Btn onClick={onAddSaving} fullWidth>+ Registrar Ahorro del Mes</Btn>
    </div>
  </div>;
}

  const totalIngresos=PROPS_BASE.reduce((s,p)=>s+getProp(p,data).ingreso,0);
  const stColors={'Pagado':{c:C.success,bg:C.successL},'En Curso':{c:C.warning,bg:C.warningL},'Sin Iniciar':{c:C.danger,bg:C.dangerL}};
  return<div className="fade-in">
    <PageHeader title="Propiedades" sub={`${PROPS_BASE.length} inmuebles · ${fUSD(totalPortfolio)}`}/>
    <Card style={{marginTop:12}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>

        <div><div style={{fontSize:11,color:C.sub,fontFamily:C.font}}>Ingresos futuros/mes</div>

      const sc=stColors[status]||stColors['Sin Iniciar'];
      const paidUSD=pb.hitos.filter(h=>pIds.has(h.id)).reduce((s,h)=>{
        const ho=data.hitoOverrides?.[h.id]||{};return s+(ho.usd??h.usd);},0);
      const remaining=Math.max(0,p.totalUSD-paidUSD);
      return<div key={pb.id} style={{margin:'0 12px 10px',background:C.white,
        borderRadius:14,border:`1.5px solid ${sc.c}33`,overflow:'hidden'}}>

          <div>
            <div style={{fontSize:16,fontWeight:700,fontFamily:C.head,color:C.text}}>{p.name}</div>
            <div style={{fontSize:12,color:C.sub,fontFamily:C.font,marginTop:1}}>{pb.moneda} · {fUSD(p.totalUSD)} total</div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <select value={status} onChange={e=>onChangeStatus(pb.id,e.target.value)}
              style={{background:sc.bg,border:`1.5px solid ${sc.c}`,color:sc.c,
              borderRadius:20,padding:'5px 9px',fontSize:11,fontWeight:700,
              fontFamily:C.font,cursor:'pointer',outline:'none'}}>
              <option>Pagado</option><option>En Curso</option><option>Sin Iniciar</option>
            </select>
            <button onClick={()=>onEditProp(pb.id)}
              style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:8,
              padding:'5px 9px',cursor:'pointer',fontSize:13,fontFamily:C.font,color:C.sub}}>✏️</button>
          </div>
        </div>
        <div style={{padding:'11px 13px'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:9}}>
            {[{l:'Pagado',v:fUSD(paidUSD),c:C.success},
              {l:'Pendiente',v:fUSD(remaining),c:remaining>0?C.warning:C.success},
              {l:'Ingreso/mes',v:p.ingreso>0?`+${fUSD(p.ingreso)}`:'-',c:p.ingreso>0?C.success:C.sub}
            ].map(({l,v,c})=>(
              <div key={l} style={{textAlign:'center',background:C.border2,borderRadius:8,padding:'7px 3px'}}>
                <div style={{fontSize:10,color:C.sub,fontFamily:C.font}}>{l}</div>
                <div style={{fontSize:12,fontWeight:700,color:c,fontFamily:C.head,marginTop:1}}>{v}</div>
              </div>
            ))}
          </div>
          <Bar value={paidUSD} max={p.totalUSD} color={pb.color} h={7}/>
          <div style={{fontSize:11,color:C.sub,textAlign:'right',marginTop:3,marginBottom:8,fontFamily:C.font}}>
            {p.totalUSD>0?((paidUSD/p.totalUSD)*100).toFixed(0):0}% pagado
          </div>
          {pb.hitos.filter(h=>h.date).map(h=>{
            const ho=data.hitoOverrides?.[h.id]||{};
            const hU=ho.usd??h.usd,hD=ho.date||h.date,hL=ho.label||h.label;
            const paid=pIds.has(h.id),d=pDate(hD);
            return<div key={h.id} style={{display:'flex',justifyContent:'space-between',
              alignItems:'center',padding:'7px 0',borderTop:`1px solid ${C.border2}`}}>

                  {paid?'✓':h.rental?'⟳':'○'}

                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:paid?C.sub:C.text,
                    fontFamily:C.font,textDecoration:paid?'line-through':'none'}}>{hL}
                    {h.rental&&!paid&&<span style={{fontSize:10,color:C.muted,fontFamily:C.font,marginLeft:4}}>(renta)</span>}
                  </div>
                  {d&&<div style={{fontSize:10,color:C.muted,fontFamily:C.font}}>{mStr(d.y,d.m)}</div>}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:7,flexShrink:0}}>

            background:C.border2,borderRadius:6,padding:'6px 8px',lineHeight:1.4}}>
            💬 {p.comentario}
          </div>}
        </div>
      </div>;
    })}
    <div style={{height:8}}/>
  </div>;
}

// ─── TAB PLAN ────────────────────────────────────
function PlanTab({data,metrics,paymentDates,planFilter,setPlanFilter,onMarkPaid,onUnmark,onMoveHito}){
  const{nY,nM,pIds}=metrics;
  const allH=getAllHitos(data);
  const ordPending=getOrderedPending(data);
  const paidHitos=[...allH.filter(h=>pIds.has(h.id))].sort((a,b)=>a.date.localeCompare(b.date));
  const totalPend=ordPending.filter(h=>!h.rental).reduce((s,h)=>s+h.usd,0);
  const showReorder=planFilter==='pendientes'||planFilter==='todos';

  const toShow=useMemo(()=>{
    if(planFilter==='pagados')return paidHitos;
    if(planFilter==='pendientes')return ordPending;
    if(planFilter!=='todos')return[...paidHitos.filter(h=>h.propId===planFilter),...ordPending.filter(h=>h.propId===planFilter)];
    return[...paidHitos,...ordPending];
  },[planFilter,paidHitos,ordPending]);

  return<div className="fade-in">
    <PageHeader title="Plan de Pagos" sub={`${pIds.size} pagados · ${fUSD(totalPend)} pendiente`}/>
    <div style={{padding:'8px 12px 2px',overflowX:'auto',display:'flex',gap:6,
      WebkitOverflowScrolling:'touch',scrollbarWidth:'none'}}>
      {[{k:'todos',l:'Todos'},{k:'pagados',l:'Pagados'},{k:'pendientes',l:'Pendientes ↕'},
        ...PROPS_BASE.map(p=>({k:p.id,l:getProp(p,data).name,color:p.color}))
      ].map(f=>(
        <button key={f.k} onClick={()=>setPlanFilter(f.k)}
          style={{padding:'6px 11px',borderRadius:20,flexShrink:0,
          border:`1.5px solid ${planFilter===f.k?(f.color||C.primary):C.border}`,
          background:planFilter===f.k?(f.color||C.primary):C.white,
          color:planFilter===f.k?'#fff':C.sub,
          fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:C.font,whiteSpace:'nowrap'}}>
          {f.l}
        </button>
      ))}
    </div>
    {/* Leyenda fechas */}
    <div style={{padding:'4px 12px 6px',display:'flex',gap:12,fontSize:11,color:C.muted,fontFamily:C.font}}>
      <span>📅 Plan original</span>
      <span>⟶ Fecha proyectada según ahorro actual</span>
    </div>

    <div style={{paddingBottom:8}}>
      {toShow.map(h=>{
        const paid=pIds.has(h.id);
        const planDt=pDate(h.date);
        const comp=!paid&&paymentDates[h.id];
        const delay=comp&&planDt?mDiff(planDt.y,planDt.m,comp.y,comp.m):0;
        const{y:py,m:pm}=planDt||{y:0,m:0};
        const isFirst=!paid&&ordPending[0]?.id===h.id;
        const seeded=data.paid[h.id]?.seeded;
        const pendIdx=ordPending.findIndex(x=>x.id===h.id);

        return<div key={h.id} className="fade-in"
          style={{margin:'0 12px 7px',background:C.white,borderRadius:12,
          border:`1.5px solid ${paid?h.color+'33':isFirst?h.color:C.border}`,
          opacity:seeded?.65:1}}>
          <div style={{padding:'11px 13px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1,marginRight:8}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,flexWrap:'wrap'}}>
                  <div style={{width:8,height:8,borderRadius:4,background:h.color}}/>
                  <span style={{fontSize:11,color:C.sub,fontFamily:C.font}}>{h.propName}</span>
                  {isFirst&&!paid&&<span style={{fontSize:10,fontWeight:700,color:C.primary,
                    background:C.primaryL,padding:'2px 7px',borderRadius:20,fontFamily:C.font}}>Próximo</span>}
                  {h.rental&&!paid&&<span style={{fontSize:10,fontWeight:600,color:C.muted,
                    background:C.border2,padding:'2px 7px',borderRadius:20,fontFamily:C.font}}>Por renta</span>}
                  {!paid&&!isFirst&&showReorder&&pendIdx>=0&&
                    <span style={{fontSize:10,color:C.muted,fontFamily:C.font}}>#{pendIdx+1}</span>}
                </div>
                <div style={{fontSize:15,fontWeight:700,color:paid?C.sub:C.text,
                  fontFamily:C.head,textDecoration:paid?'line-through':'none'}}>{h.label}</div>
                {/* Fechas */}
                {!paid&&planDt&&<div style={{fontSize:12,color:C.sub,fontFamily:C.font,marginTop:3}}>
                  <span>📅 {mStr(py,pm)}</span>
                  {comp&&!h.rental&&<span style={{marginLeft:8,fontWeight:600,
                    color:delay>0?C.danger:delay<0?C.success:C.success}}>
                    ⟶ {mStr(comp.y,comp.m)}
                    {delay>0&&<span style={{color:C.danger}}> (+{delay}m)</span>}
                    {delay<=0&&<span style={{color:C.success}}> ✓</span>}
                  </span>}
                </div>}
                {paid&&data.paid[h.id]?.date&&!seeded&&
                  <div style={{fontSize:11,color:C.sub,fontFamily:C.font,marginTop:2}}>Pagado {data.paid[h.id].date}</div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
                <div style={{fontSize:19,fontWeight:700,fontFamily:C.head,
                  color:paid?C.success:isFirst?h.color:C.text}}>{fUSD(h.usd)}</div>
                {!paid&&showReorder&&pendIdx>=0&&(
                  <div style={{display:'flex',gap:3}}>
                    {['up','down'].map(dir=>{
                      const can=dir==='up'?pendIdx>0:pendIdx<ordPending.length-1;
                      return<button key={dir} onClick={()=>can&&onMoveHito(h.id,dir)}
                        style={{background:C.border2,border:`1px solid ${C.border}`,borderRadius:5,
                        width:26,height:26,cursor:can?'pointer':'default',
                        color:can?C.text:C.muted,fontSize:13,fontFamily:C.font,opacity:can?1:.3}}>
                        {dir==='up'?'↑':'↓'}
                      </button>;
                    })}
                  </div>
                )}
              </div>
            </div>
            {/* Botón pagar: visible para CUALQUIER hito pendiente */}
            {!paid&&(

// ─── TAB PROYECCIÓN ──────────────────────────────
function ProyeccionTab({data,metrics}){
  const{realTotal,thTotal,savGap,comp,nY,nM,pIds}=metrics;
  const pending=getAllHitos(data).filter(h=>!pIds.has(h.id)&&!h.rental);
  const chartPts=useMemo(()=>{
    const pts=[];let tC=0,rC=0;
    for(let y=2026;y<=2042;y++){
      for(let m=(y===2026?4:1);m<=12;m++){
        tC+=mSav(y,m);
        const e=data.savings.find(s=>s.year===y&&s.month===m);
        if(e) rC+=e.usd;
        const isReal=(y<nY||(y===nY&&m<=nM));
        pts.push({y,m,tC,rC:isReal?rC:null});
      }
    }
    return pts;
  },[data,nY,nM]);
  const maxV=Math.max(...chartPts.map(p=>p.tC),1);
  const W=950,H=180,ML=40,MB=20,MT=8,MR=8,PW=W-ML-MR,PH=H-MB-MT;
  const xOf=(y,m)=>ML+((y-2026)*12+(m-4))*(PW/((2042-2026)*12+9));
  const yOf=v=>MT+PH-(v/maxV)*PH;
  const tPath=chartPts.map((p,i)=>`${i===0?'M':'L'}${xOf(p.y,p.m).toFixed(1)},${yOf(p.tC).toFixed(1)}`).join(' ');
  const rPts=chartPts.filter(p=>p.rC!=null);
  const rPath=rPts.map((p,i)=>`${i===0?'M':'L'}${xOf(p.y,p.m).toFixed(1)},${yOf(p.rC).toFixed(1)}`).join(' ');
  const compDelay=comp?mDiff(2039,6,comp.y,comp.m):0;
  return<div className="fade-in">
    <PageHeader title="Proyección" sub="Ahorro real vs teórico"/>
    <Card style={{marginTop:12,padding:'13px 0 8px'}}>
      <div style={{padding:'0 13px 8px',fontSize:10,color:C.sub,fontWeight:700,
        letterSpacing:1.2,textTransform:'uppercase',fontFamily:C.font}}>Curva acumulada USD</div>
      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <svg width={W} height={H+4} style={{display:'block'}}>
          {[0,.25,.5,.75,1].map(f=>{
            const v=maxV*f,y2=yOf(v);
            return<g key={f}>
              <line x1={ML} y1={y2} x2={W-MR} y2={y2} stroke={C.border} strokeWidth={1}/>
              <text x={ML-3} y={y2+4} fill={C.sub} fontSize={8} textAnchor="end" fontFamily="Inter">
                {v>=1000?`${Math.round(v/1000)}K`:'0'}
              </text>
            </g>;
          })}
          {[2026,2028,2030,2032,2034,2036,2038,2040,2042].map(yr=>(
            <g key={yr}>
              <line x1={xOf(yr,4)} y1={MT} x2={xOf(yr,4)} y2={MT+PH} stroke={C.border2} strokeWidth={1}/>
              <text x={xOf(yr,4)} y={H} fill={C.sub} fontSize={9} textAnchor="middle" fontFamily="Inter">{yr}</text>
            </g>
          ))}
          {pending.slice(0,15).map(h=>{
            const d=pDate(h.date);if(!d||d.y>2042)return null;
            return<line key={h.id} x1={xOf(d.y,d.m)} y1={MT} x2={xOf(d.y,d.m)} y2={MT+PH}
              stroke={C.warning} strokeWidth={1} strokeDasharray="3,3" opacity={.4}/>;
          })}
          <path d={tPath} fill="none" stroke={C.muted} strokeWidth={1.5} strokeDasharray="5,3"/>
          {rPath&&<path d={rPath} fill="none" stroke={C.success} strokeWidth={2.5}/>}
          {rPts.map(p=>(
            <circle key={`${p.y}-${p.m}`} cx={xOf(p.y,p.m)} cy={yOf(p.rC)} r={3}
              fill={C.success} stroke={C.white} strokeWidth={1.5}/>
          ))}
        </svg>
      </div>
      <div style={{display:'flex',gap:14,padding:'4px 13px',flexWrap:'wrap'}}>
        {[{c:C.muted,dash:true,l:'Teórico'},{c:C.success,l:'Real'},{c:C.warning,dash:true,l:'Pagos'}]
          .map(({c,dash,l})=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
            <svg width={20} height={10}><line x1={0} y1={5} x2={20} y2={5}
              stroke={c} strokeWidth={dash?1.5:2.5} strokeDasharray={dash?'4,3':undefined}/></svg>
            <span style={{fontSize:11,color:C.sub,fontFamily:C.font}}>{l}</span>
          </div>
        ))}
      </div>
    </Card>
    <Card>
      {[{l:'Ahorrado real',v:fUSD(realTotal),c:C.success,b:true},
        {l:'Teórico a la fecha',v:fUSD(thTotal),c:C.sub},
        {l:'Diferencia',v:(savGap>=0?'+':'')+fUSD(savGap),c:savGap>=0?C.success:C.danger,b:true},
        {l:'Portfolio total',v:fUSD(PROPS_BASE.reduce((s,p)=>s+getProp(p,data).totalUSD,0)),c:C.text},
        {l:'Fin base plan',v:'Jun 2039',c:C.sub},
        {l:'Fin estimado',v:comp?mStr(comp.y,comp.m):'—',c:compDelay>0?C.warning:C.success},
        {l:'Delay total',v:compDelay>0?`+${compDelay}m`:compDelay<0?`${Math.abs(compDelay)}m adelantado`:'Sin delay',
         c:compDelay>0?C.warning:C.success,b:true},
      ].map(({l,v,c,b})=><StatRow key={l} label={l} value={v} color={c} bold={b}/>)}
    </Card>
    <div style={{height:8}}/>
  </div>;
}

// ─── APP ─────────────────────────────────────────
function App(){
  const[tab,setTab]                        =useState('inicio');
  const[data,setData]                      =useState(loadData);
  const[modal,setModal]                    =useState(null);
  const[savForm,setSavForm]                =useState({});
  const[paidForm,setPaidForm]              =useState({});
  const[propForm,setPropForm]              =useState({});
  const[hitoForm,setHitoForm]              =useState({});
  const[editingSav,setEditingSav]          =useState(null);
  const[editingPropId,setEditingPropId]    =useState(null);
  const[editingHito,setEditingHito]        =useState(null);
  const[editingHitoProp,setEditingHitoProp]=useState(null);
  const[selHito,setSelHito]                =useState(null);
  const[confirmId,setConfirmId]            =useState(null);
  const[planFilter,setPlanFilter]          =useState('todos');

  useEffect(()=>{try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}},[data]);

  const metrics      =useMemo(()=>computeMetrics(data),[data]);
  const paymentDates =useMemo(()=>computePaymentDates(data),[data]);

  const openAdd=useCallback(()=>{
    const now=new Date();
    setSavForm({year:String(now.getFullYear()),month:String(now.getMonth()+1),
      local:'',moneda:'ARS',trm:String(data.trm_ars),titulo:''});
    setEditingSav(null);setModal('saving');
  },[data.trm_ars]);

  const openEdit=useCallback(s=>{
    setSavForm({year:String(s.year),month:String(s.month),local:String(s.local),
      moneda:s.moneda||'ARS',trm:String(s.trm),titulo:s.titulo||''});
    setEditingSav(s);setModal('saving');
  },[]);

  const saveSaving=useCallback(()=>{
    const year=parseInt(savForm.year),month=parseInt(savForm.month);
    const local=parseFloat(String(savForm.local||'').replace(/[.,\s]/g,''))||0;
    const trm=parseFloat(savForm.trm)||1500;
    if(!year||!month||!local)return;
    const entry={id:editingSav?.id||`s${Date.now()}`,year,month,local,trm,usd:local/trm,
      moneda:savForm.moneda||'ARS',titulo:savForm.titulo||''};
    setData(d=>{
      const ns=editingSav?d.savings.map(s=>s.id===editingSav.id?entry:s):[...d.savings,entry];
      const tk=savForm.moneda==='COP'?'trm_cop':'trm_ars';
      return{...d,savings:ns,[tk]:parseFloat(savForm.trm)||d[tk]};
    });
    setModal(null);
  },[savForm,editingSav]);

  const openMarkPaid=useCallback(h=>{
    const now=new Date();
    setSelHito(h);
    setPaidForm({amount:String(h.usd),date:`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`});
    setModal('paid');
  },[]);

  const savePaid=useCallback(()=>{
    const amount=parseFloat(paidForm.amount)||0;
    if(!amount||!paidForm.date||!selHito)return;
    setData(d=>({...d,paid:{...d.paid,[selHito.id]:{date:paidForm.date,amount_usd:amount}}}));
    setModal(null);
  },[paidForm,selHito]);

  const unmarkPaid=useCallback(id=>{
    if(data.paid[id]?.seeded)return;
    setData(d=>{const p={...d.paid};delete p[id];return{...d,paid:p};});
  },[data.paid]);

  const changeStatus=useCallback((propId,status)=>{
    setData(d=>({...d,propStatus:{...d.propStatus,[propId]:status}}));
  },[]);

  const openEditProp=useCallback(propId=>{
    const p=getProp(PROPS_BASE.find(x=>x.id===propId),data);
    setPropForm({name:p.name,totalUSD:String(p.totalUSD),ingreso:String(p.ingreso),comentario:p.comentario||''});
    setEditingPropId(propId);setModal('editProp');
  },[data]);

  const savePropEdit=useCallback(()=>{
    if(!editingPropId)return;
    setData(d=>({...d,propOverrides:{...d.propOverrides,[editingPropId]:{
      ...(d.propOverrides?.[editingPropId]||{}),
      name:propForm.name||undefined,
      totalUSD:propForm.totalUSD!==''?parseFloat(propForm.totalUSD):undefined,
      ingreso:propForm.ingreso!==''?parseFloat(propForm.ingreso):undefined,
      comentario:propForm.comentario!==undefined?propForm.comentario:undefined,
    }}}));
    setModal(null);
  },[editingPropId,propForm]);

  const openEditHito=useCallback((hito,propBase)=>{
    const ho=data.hitoOverrides?.[hito.id]||{};
    setEditingHito(hito);setEditingHitoProp(propBase);
    setHitoForm({label:ho.label||hito.label,usd:String(ho.usd??hito.usd),date:ho.date||hito.date});
    setModal('editHito');
  },[data.hitoOverrides]);

  const saveHitoEdit=useCallback(()=>{
    if(!editingHito)return;
    const ov={};
    if(hitoForm.label)ov.label=hitoForm.label;
    if(hitoForm.usd!=='')ov.usd=parseFloat(hitoForm.usd);
    if(hitoForm.date)ov.date=hitoForm.date;
    setData(d=>({...d,hitoOverrides:{...d.hitoOverrides,
      [editingHito.id]:{...(d.hitoOverrides?.[editingHito.id]||{}),...ov}
    }}));
    setModal(null);
  },[editingHito,hitoForm]);

  const moveHito=useCallback((id,dir)=>{
    setData(d=>{
      const pending=getOrderedPending(d);
      const order=pending.map(h=>h.id);
      const idx=order.indexOf(id);
      if(dir==='up'&&idx>0)[order[idx-1],order[idx]]=[order[idx],order[idx-1]];
      if(dir==='down'&&idx<order.length-1)[order[idx],order[idx+1]]=[order[idx+1],order[idx]];
      return{...d,hitoOrder:order};
    });
  },[]);

  const NAV_H='calc(74px + env(safe-area-inset-bottom))';

  return<div style={{maxWidth:480,margin:'0 auto',minHeight:'100svh',background:C.bg,
    fontFamily:C.font,color:C.text,paddingBottom:NAV_H,overflowX:'hidden'}}>

    {tab==='inicio'      &&<InicioTab      metrics={metrics} onAddSaving={openAdd}/>}
    {tab==='ahorros'     &&<AhorrosTab     data={data} metrics={metrics} onAdd={openAdd} onEdit={openEdit} onDelete={id=>setConfirmId(id)}/>}
    {tab==='propiedades' &&<PropiedadesTab data={data} onChangeStatus={changeStatus} onEditProp={openEditProp} onEditHito={openEditHito}/>}
    {tab==='plan'        &&<PlanTab        data={data} metrics={metrics} paymentDates={paymentDates} planFilter={planFilter} setPlanFilter={setPlanFilter} onMarkPaid={openMarkPaid} onUnmark={unmarkPaid} onMoveHito={moveHito}/>}
    {tab==='proyeccion'  &&<ProyeccionTab  data={data} metrics={metrics}/>}

    {modal==='saving'   &&<SavingModal   form={savForm}  setForm={setSavForm}  data={data} onSave={saveSaving}  onClose={()=>setModal(null)} isEdit={!!editingSav}/>}
    {modal==='paid'     &&<PaidModal     form={paidForm} setForm={setPaidForm} hito={selHito} onSave={savePaid} onClose={()=>setModal(null)}/>}
    {modal==='editProp' &&<EditPropModal propId={editingPropId} data={data} form={propForm} setForm={setPropForm} onSave={savePropEdit} onClose={()=>setModal(null)}/>}
    {modal==='editHito' &&<EditHitoModal hito={editingHito} propBase={editingHitoProp} form={hitoForm} setForm={setHitoForm} onSave={saveHitoEdit} onClose={()=>setModal(null)}/>}
    {confirmId&&<ConfirmModal msg="¿Eliminar este registro de ahorro?"
      onConfirm={()=>{setData(d=>({...d,savings:d.savings.filter(s=>s.id!==confirmId)}));setConfirmId(null);}}
      onCancel={()=>setConfirmId(null)}/>}

    <BottomNav tab={tab} setTab={setTab}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
