const ALL_HITOS_BASE = PROPS_BASE.flatMap(p =>
  p.hitos.filter(h=>h.date).map(h=>({...h,propId:p.id,propName:p.name,color:p.color,colorL:p.colorL}))
).sort((a,b)=>a.date.localeCompare(b.date));

const SEEDED_IDS = new Set(PROPS_BASE.flatMap(p=>p.hitos.filter(h=>h.seeded).map(h=>h.id)));
const KEY = 'retiro_inmobiliario_v2';
const MES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// ─── UTILIDADES ──────────────────────────────────
const fUSD = n => '$'+Math.round(n).toLocaleString('es-AR');
const fLoc = n => '$'+Math.round(n).toLocaleString('es-AR');
const mStr = (y,m) => `${MES[m-1]} ${y}`;
const pDate = s => { if(!s)return null; const[y,m]=s.split('-').map(Number); return{y,m}; };
function addM(y,m,n){m+=n;while(m>12){m-=12;y++;}while(m<1){m+=12;y--;}return{y,m};}
const mDiff=(y1,m1,y2,m2)=>(y2-y1)*12+(m2-m1);

// Ahorro teórico mensual — empieza Sep 2026
function mSav(y,m){
  if(y<2026||(y===2026&&m<9)) return 0;
  if(m===3) return 16333;
  if(m===6||m===12) return 7333;
  return 3000;
}
function theorCumul(toY,toM){
  let t=0,y=2026,m=9;
  while(y<toY||(y===toY&&m<=toM)){t+=mSav(y,m);m++;if(m>12){y++;m=1;}}
  return t;
}

// ─── OVERRIDES & HELPERS ─────────────────────────
function getProp(p, data){
  const ov = data.propOverrides?.[p.id] || {};
  return {
    ...p,
    name:      ov.name      !== undefined ? ov.name      : p.name,
    totalUSD:  ov.totalUSD  !== undefined ? ov.totalUSD  : p.totalUSD,
    ingreso:   ov.ingreso   !== undefined ? ov.ingreso   : p.ingreso,
    comentario:ov.comentario!== undefined ? ov.comentario: p.comentario,
  };
}
function getAllHitos(data){
  return ALL_HITOS_BASE.map(h=>{
    const prop = PROPS_BASE.find(p=>p.id===h.propId);
    const ov = data.propOverrides?.[h.propId] || {};
    return {...h, propName: ov.name || prop.name};
  });
}
function getOrderedPending(data){
  const allH = getAllHitos(data);
  const paidIds = new Set(Object.keys(data.paid));
  const pending = allH.filter(h=>!paidIds.has(h.id));
  const order = data.hitoOrder || [];
  return [...pending].sort((a,b)=>{
    const ia=order.indexOf(a.id), ib=order.indexOf(b.id);
    if(ia===-1&&ib===-1) return a.date.localeCompare(b.date);
    if(ia===-1) return 1; if(ib===-1) return -1;
    return ia-ib;
  });
}
function getDefaultOrder(data){
  return getOrderedPending(data).map(h=>h.id);
}

// ─── STORAGE ─────────────────────────────────────
const DEF = {trm_ars:1500,trm_cop:3700,savings:[],paid:{},propStatus:{},propOverrides:{},hitoOrder:[]};
function loadData(){
  try{
    const s=localStorage.getItem(KEY);
    const d=s?{...DEF,...JSON.parse(s)}:{...DEF};
    SEEDED_IDS.forEach(id=>{if(!d.paid[id])d.paid[id]={seeded:true};});
    PROPS_BASE.forEach(p=>{if(!d.propStatus[p.id])d.propStatus[p.id]=p.defStatus;});
    if(!d.hitoOrder||d.hitoOrder.length===0) d.hitoOrder=getDefaultOrder(d);
    return d;
  }catch(e){
    const d={...DEF};
    SEEDED_IDS.forEach(id=>{d.paid[id]={seeded:true};});
    PROPS_BASE.forEach(p=>{d.propStatus[p.id]=p.defStatus;});
    return d;
  }
}

// ─── MÉTRICAS ────────────────────────────────────
function computeMetrics(data){
  const now=new Date(), nY=now.getFullYear(), nM=now.getMonth()+1;
  const allH=getAllHitos(data);
  const paidIds=new Set(Object.keys(data.paid));
  const ordPending=getOrderedPending(data);
  const nextHito=ordPending[0]||null;

  const realTotal=data.savings.reduce((s,e)=>s+e.usd,0);
  const nonSeededPaid=Object.entries(data.paid)
    .filter(([,v])=>!v.seeded&&v.amount_usd)
    .reduce((s,[,v])=>s+(v.amount_usd||0),0);
  const realBalance=realTotal-nonSeededPaid;

  const thTotal=theorCumul(nY,nM);
  const savGap=realTotal-thTotal;

  // Monthly
  const monthTheo=mSav(nY,nM);
  const monthReal=data.savings.filter(s=>s.year===nY&&s.month===nM).reduce((s,e)=>s+e.usd,0);

  // Portfolio progress
  const seededSum=allH.filter(h=>data.paid[h.id]?.seeded).reduce((s,h)=>s+h.usd,0);
  const totalPortfolio=PROPS_BASE.reduce((s,p)=>s+getProp(p,data).totalUSD,0);
  const progressValue=seededSum+realTotal;

  // Next hito ETA
  let nd=null;
  if(nextHito){
    const{y:py,m:pm}=pDate(nextHito.date);
    const planMo=mDiff(nY,nM,py,pm);
    if(realBalance>=nextHito.usd){
      nd={months:0,status:'ready',canPay:true,hito:nextHito,reachDate:{y:nY,m:nM}};
    }else{
      let bal=realBalance,cy=nY,cm=nM,mo=0;
      while(bal<nextHito.usd&&mo<480){
        const r=addM(cy,cm,1);cy=r.y;cm=r.m;
        bal+=mSav(cy,cm);mo++;
      }
      const delay=Math.max(0,mo-Math.max(0,planMo));
      nd={months:delay,status:delay===0?'ok':delay<=3?'warning':'danger',
          canPay:false,hito:nextHito,reachDate:addM(nY,nM,mo),monthsNeeded:mo};
    }
  }

  // Completion estimate
  let comp=null;
  if(ordPending.length>0){
    let bal=realBalance,cy=nY,cm=nM,r=[...ordPending],it=0;
    while(r.length>0&&it++<800){
      const nx=addM(cy,cm,1);cy=nx.y;cm=nx.m;
      bal+=mSav(cy,cm);
      while(r.length>0&&bal>=r[0].usd){bal-=r[0].usd;r.shift();}
    }
    comp={y:cy,m:cm};
  }

  let overall='ok';
  if(savGap<-5000||(nd&&nd.months>3)) overall='danger';
  else if(savGap<-1000||(nd&&nd.months>0&&nd.months<=3)) overall='warning';

  const paidCount=allH.filter(h=>paidIds.has(h.id)).length;
  const totalHitos=allH.length;

  return{realTotal,nonSeededPaid,realBalance,thTotal,savGap,monthTheo,monthReal,
    seededSum,totalPortfolio,progressValue,
    paidCount,totalHitos,nextHito,nd,comp,overall,nY,nM,paidIds};
}

  const m={

    padding:'3px 9px',borderRadius:20,fontFamily:C.font,display:'inline-block'}}>{status}</span>;

  const ahead=savGap>=0;

  const compDelay=comp?mDiff(2039,6,comp.y,comp.m):0;

  return<div className="fade-in">

        </div>

    {/* Card mensual teórico vs real */}

      ):(
        <>

              <div style={{fontSize:11,color:C.sub,fontFamily:C.font}}>Teórico este mes</div>

// ─── TAB PLAN ────────────────────────────────────
function PlanTab({data,metrics,planFilter,setPlanFilter,onMarkPaid,onUnmark,onMoveHito}){
  const{nY,nM,paidIds}=metrics;
  const allH=getAllHitos(data);
  const ordPending=getOrderedPending(data);
  const paidHitos=[...allH.filter(h=>paidIds.has(h.id))].sort((a,b)=>a.date.localeCompare(b.date));
  const totalPend=ordPending.reduce((s,h)=>s+h.usd,0);

  const toShow=useMemo(()=>{
    if(planFilter==='pagados') return paidHitos;
    if(planFilter==='pendientes') return ordPending;
    if(planFilter!=='todos'){
      const paid=paidHitos.filter(h=>h.propId===planFilter);
      const pend=ordPending.filter(h=>h.propId===planFilter);
      return [...paid,...pend];
    }
    return [...paidHitos,...ordPending];
  },[planFilter,paidHitos,ordPending]);

  const showReorder=planFilter==='pendientes'||planFilter==='todos';

  return<div className="fade-in">
    <PageHeader title="Plan de Pagos"
      sub={`${paidIds.size} pagados · ${fUSD(totalPend)} pendiente`}/>

    <div style={{padding:'8px 12px 4px',overflowX:'auto',display:'flex',gap:6,
      WebkitOverflowScrolling:'touch',scrollbarWidth:'none'}}>
      {[
        {k:'todos',l:'Todos'},
        {k:'pagados',l:'Pagados'},
        {k:'pendientes',l:'Pendientes ↕'},
        ...PROPS_BASE.map(p=>({k:p.id,l:getProp(p,data).name,color:p.color}))
      ].map(f=>(
        <button key={f.k} onClick={()=>setPlanFilter(f.k)}
          style={{padding:'6px 12px',borderRadius:20,flexShrink:0,
          border:`1.5px solid ${planFilter===f.k?(f.color||C.primary):C.border}`,
          background:planFilter===f.k?(f.color||C.primary):C.white,
          color:planFilter===f.k?'#fff':C.sub,fontSize:11,fontWeight:600,
          cursor:'pointer',fontFamily:C.font,whiteSpace:'nowrap'}}>
          {f.l}
        </button>
      ))}
    </div>
    {showReorder&&<div style={{padding:'4px 12px 0',fontSize:11,color:C.muted,fontFamily:C.font}}>
      ↕ Arrastrá con los botones para reordenar pendientes
    </div>}

    <div style={{paddingTop:8,paddingBottom:8}}>
      {toShow.map((h,idx)=>{
        const paid=paidIds.has(h.id);
        const{y:py,m:pm}=pDate(h.date);
        const isFirst=!paid&&ordPending[0]?.id===h.id;
        const isOver=!paid&&(py<nY||(py===nY&&pm<nM));
        const seeded=data.paid[h.id]?.seeded;
        // Position in pending list for reorder buttons
        const pendIdx=ordPending.findIndex(x=>x.id===h.id);
        const canMoveUp=!paid&&pendIdx>0;
        const canMoveDown=!paid&&pendIdx<ordPending.length-1;

        return<div key={h.id} className="fade-in"
          style={{margin:'0 12px 8px',background:C.white,borderRadius:12,
          border:`1.5px solid ${paid?h.color+'44':isFirst?h.color:C.border}`,
          opacity:paid&&seeded?.65:1}}>
          <div style={{padding:'11px 13px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1,marginRight:8}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,flexWrap:'wrap'}}>
                  <div style={{width:8,height:8,borderRadius:4,background:h.color}}/>
                  <span style={{fontSize:11,color:C.sub,fontFamily:C.font}}>{h.propName}</span>
                  {paid&&<Badge label={seeded?'Ya pagado':'✓ Pagado'} color={C.success} bg={C.successL}/>}
                  {isFirst&&!paid&&<Badge label="Próximo" color={C.primary} bg={C.primaryL}/>}
                  {isOver&&!paid&&<Badge label="Vencido" color={C.danger} bg={C.dangerL}/>}
                  {!paid&&!isFirst&&showReorder&&<span style={{fontSize:10,color:C.muted,fontFamily:C.font}}>
                    #{pendIdx+1}
                  </span>}
                </div>
                <div style={{fontSize:15,fontWeight:700,color:paid?C.sub:C.text,
                  fontFamily:C.head,textDecoration:paid?'line-through':'none'}}>{h.label}</div>
                <div style={{fontSize:11,color:C.sub,fontFamily:C.font,marginTop:2}}>
                  {mStr(py,pm)}
                  {paid&&data.paid[h.id]?.date&&!seeded&&` · Pagado: ${data.paid[h.id].date}`}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
                <div style={{fontSize:19,fontWeight:700,fontFamily:C.head,
                  color:paid?C.success:isFirst?h.color:C.text}}>{fUSD(h.usd)}</div>
                {/* Reorder arrows */}
                {!paid&&showReorder&&(
                  <div style={{display:'flex',gap:3}}>
                    <button onClick={()=>canMoveUp&&onMoveHito(h.id,'up')} disabled={!canMoveUp}
                      style={{background:C.border2,border:`1px solid ${C.border}`,borderRadius:5,
                      width:24,height:24,cursor:canMoveUp?'pointer':'default',
                      color:canMoveUp?C.text:C.muted,fontSize:13,fontFamily:C.font,
                      opacity:canMoveUp?1:.35}}>↑</button>
                    <button onClick={()=>canMoveDown&&onMoveHito(h.id,'down')} disabled={!canMoveDown}
                      style={{background:C.border2,border:`1px solid ${C.border}`,borderRadius:5,
                      width:24,height:24,cursor:canMoveDown?'pointer':'default',
                      color:canMoveDown?C.text:C.muted,fontSize:13,fontFamily:C.font,
                      opacity:canMoveDown?1:.35}}>↓</button>
                  </div>
                )}
              </div>
            </div>
            {!paid&&(isFirst||isOver)&&(
              <button onClick={()=>onMarkPaid(h)}
                style={{marginTop:9,width:'100%',padding:'9px',background:h.color,
                border:'none',borderRadius:8,color:'#fff',fontSize:13,fontWeight:700,
                cursor:'pointer',fontFamily:C.font}}>
                ✓ Marcar como Pagado
              </button>
            )}
            {paid&&!seeded&&(
              <button onClick={()=>onUnmark(h.id)}
                style={{marginTop:7,padding:'5px 11px',background:'transparent',
                border:`1px solid ${C.border}`,borderRadius:7,color:C.sub,
                fontSize:11,cursor:'pointer',fontFamily:C.font,float:'right'}}>
                Deshacer
              </button>
            )}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ─── TAB PROYECCIÓN ──────────────────────────────
function ProyeccionTab({data,metrics}){
  const{realTotal,thTotal,savGap,comp,nY,nM,paidIds}=metrics;
  const allH=getAllHitos(data);
  const pending=allH.filter(h=>!paidIds.has(h.id));
  const chartPts=useMemo(()=>{
    const pts=[];let tC=0,rC=0;
    for(let y=2026;y<=2041;y++){
      for(let m=(y===2026?9:1);m<=12;m++){
        tC+=mSav(y,m);
        const e=data.savings.find(s=>s.year===y&&s.month===m);
        if(e) rC+=e.usd;
        const isReal=(y<nY||(y===nY&&m<=nM));
        pts.push({y,m,tC,rC:isReal?rC:null});
      }
    }
    return pts;
  },[data,nY,nM]);

  const maxV=Math.max(...chartPts.map(p=>p.tC),1);
  const W=900,H=180,ML=38,MB=20,MT=8,MR=8,PW=W-ML-MR,PH=H-MB-MT;
  const xOf=(y,m)=>ML+((y-2026)*12+(m-9))*(PW/((2041-2026)*12+4));
  const yOf=v=>MT+PH-(v/maxV)*PH;
  const tPath=chartPts.map((p,i)=>`${i===0?'M':'L'}${xOf(p.y,p.m).toFixed(1)},${yOf(p.tC).toFixed(1)}`).join(' ');
  const rPts=chartPts.filter(p=>p.rC!=null);
  const rPath=rPts.map((p,i)=>`${i===0?'M':'L'}${xOf(p.y,p.m).toFixed(1)},${yOf(p.rC).toFixed(1)}`).join(' ');
  const compDelay=comp?mDiff(2039,6,comp.y,comp.m):0;

  return<div className="fade-in">
    <PageHeader title="Proyección" sub="Ahorro real vs teórico"/>
    <Card style={{marginTop:12,padding:'13px 0 8px'}}>
      <div style={{padding:'0 13px 8px',fontSize:10,color:C.sub,fontWeight:700,
        letterSpacing:1.2,textTransform:'uppercase',fontFamily:C.font}}>Curva acumulada USD</div>
      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <svg width={W} height={H+4} style={{display:'block'}}>
          {[0,.25,.5,.75,1].map(f=>{
            const v=maxV*f,y2=yOf(v);
            return<g key={f}>
              <line x1={ML} y1={y2} x2={W-MR} y2={y2} stroke={C.border} strokeWidth={1}/>
              <text x={ML-3} y={y2+4} fill={C.sub} fontSize={8} textAnchor="end" fontFamily="Inter">
                {v>=1000?`${Math.round(v/1000)}K`:'0'}
              </text>
            </g>;
          })}
          {[2026,2028,2030,2032,2034,2036,2038,2040].map(yr=>(
            <g key={yr}>
              <line x1={xOf(yr,1)} y1={MT} x2={xOf(yr,1)} y2={MT+PH} stroke={C.border2} strokeWidth={1}/>
              <text x={xOf(yr,1)} y={H} fill={C.sub} fontSize={9} textAnchor="middle" fontFamily="Inter">{yr}</text>
            </g>
          ))}
          {pending.slice(0,15).map(h=>{
            const d=pDate(h.date);
            if(!d||d.y>2041) return null;
            return<line key={h.id} x1={xOf(d.y,d.m)} y1={MT} x2={xOf(d.y,d.m)} y2={MT+PH}
              stroke={C.warning} strokeWidth={1} strokeDasharray="3,3" opacity={.4}/>;
          })}
          <path d={tPath} fill="none" stroke={C.muted} strokeWidth={1.5} strokeDasharray="5,3"/>
          {rPath&&<path d={rPath} fill="none" stroke={C.success} strokeWidth={2.5}/>}
          {rPts.map(p=>(
            <circle key={`${p.y}-${p.m}`} cx={xOf(p.y,p.m)} cy={yOf(p.rC)} r={3}
              fill={C.success} stroke={C.white} strokeWidth={1.5}/>
          ))}
        </svg>
      </div>
      <div style={{display:'flex',gap:14,padding:'4px 13px',flexWrap:'wrap'}}>
        {[{c:C.muted,dash:true,l:'Teórico'},{c:C.success,l:'Real'},{c:C.warning,dash:true,l:'Pagos pendientes'}]
          .map(({c,dash,l})=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
            <svg width={20} height={10}><line x1={0} y1={5} x2={20} y2={5}
              stroke={c} strokeWidth={dash?1.5:2.5} strokeDasharray={dash?'4,3':undefined}/></svg>
            <span style={{fontSize:11,color:C.sub,fontFamily:C.font}}>{l}</span>
          </div>
        ))}
      </div>
    </Card>
    <Card>
      <div style={{fontSize:10,color:C.sub,fontWeight:700,letterSpacing:1.2,
        textTransform:'uppercase',marginBottom:8,fontFamily:C.font}}>Métricas</div>
      {[
        {l:'Ahorrado real',v:fUSD(realTotal),c:C.success,b:true},
        {l:'Teórico a la fecha',v:fUSD(thTotal),c:C.sub},
        {l:'Diferencia',v:(savGap>=0?'+':'')+fUSD(savGap),c:savGap>=0?C.success:C.danger,b:true},
        {l:'Portfolio total',v:fUSD(PROPS_BASE.reduce((s,p)=>s+getProp(p,data).totalUSD,0)),c:C.text},
        {l:'Fin base del plan',v:'Jun 2039',c:C.sub},
        {l:'Fin estimado real',v:comp?mStr(comp.y,comp.m):'—',c:compDelay>0?C.warning:C.success},
        {l:'Delay total',v:compDelay>0?`+${compDelay} meses`:compDelay<0?`${Math.abs(compDelay)}m adelantado`:'Sin delay',
         c:compDelay>0?C.warning:C.success,b:true},
      ].map(({l,v,c,b})=><StatRow key={l} label={l} value={v} color={c} bold={b}/>)}
    </Card>
    <div style={{height:8}}/>
  </div>;
}

// ─── MODALES ─────────────────────────────────────
function Overlay({children,onClose}){
  return<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(15,23,42,.5)',
    zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
    <div onClick={e=>e.stopPropagation()} className="slide-up"
      style={{background:C.white,borderRadius:'20px 20px 0 0',padding:'20px',
      width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',
      paddingBottom:`calc(20px + env(safe-area-inset-bottom))`}}>
      {children}
    </div>
  </div>;
}
function MHead({title,onClose}){
  return<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
    <div style={{fontFamily:C.head,fontSize:18,fontWeight:700,color:C.text}}>{title}</div>
    <button onClick={onClose} style={{background:C.border,border:'none',borderRadius:15,
      width:30,height:30,cursor:'pointer',fontSize:14,color:C.sub,fontFamily:C.font}}>✕</button>
  </div>;
}
function Field({label,children,sub}){
  return<div style={{marginBottom:13}}>
    <label style={{display:'block',fontSize:10,color:C.sub,fontWeight:700,
      textTransform:'uppercase',letterSpacing:.7,marginBottom:5,fontFamily:C.font}}>{label}</label>
    {children}
    {sub&&<div style={{fontSize:10,color:C.muted,fontFamily:C.font,marginTop:3}}>{sub}</div>}
  </div>;
}

function SavingModal({form,setForm,data,onSave,onClose,isEdit}){
  const local=parseFloat(String(form.local||'').replace(/[.,\s]/g,''))||0;
  const trm=parseFloat(form.trm)||1500;
  const usd=trm>0?local/trm:0;
  const th=form.year&&form.month?mSav(parseInt(form.year),parseInt(form.month)):0;
  const diff=usd-th;
  return<Overlay onClose={onClose}>
    <MHead title={isEdit?'Editar Ahorro':'Registrar Ahorro'} onClose={onClose}/>
    <Field label="Título (opcional)">
      <input type="text" value={form.titulo||''} onChange={e=>setForm(f=>({...f,titulo:e.target.value}))}
        placeholder="Ej: Sueldo, Prima, Bono..." style={inputSt}/>
    </Field>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <Field label="Año">
        <select value={form.year||''} onChange={e=>setForm(f=>({...f,year:e.target.value}))} style={inputSt}>
          <option value="">Año</option>
          {Array.from({length:16},(_,i)=>2026+i).map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </Field>
      <Field label="Mes">
        <select value={form.month||''} onChange={e=>setForm(f=>({...f,month:e.target.value}))} style={inputSt}>
          <option value="">Mes</option>
          {MES.map((n,i)=><option key={i+1} value={i+1}>{n}</option>)}
        </select>
      </Field>
    </div>
    <Field label="Moneda">
      <select value={form.moneda||'ARS'}
        onChange={e=>setForm(f=>({...f,moneda:e.target.value,
          trm:e.target.value==='COP'?String(data.trm_cop):String(data.trm_ars)}))} style={inputSt}>
        <option value="ARS">Pesos Argentinos (ARS)</option>
        <option value="COP">Pesos Colombianos (COP)</option>
      </select>
    </Field>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <Field label={`Monto (${form.moneda||'ARS'})`}>
        <input type="number" value={form.local||''} onChange={e=>setForm(f=>({...f,local:e.target.value}))}
          placeholder="0" style={inputSt}/>
      </Field>
      <Field label="TRM (por USD)">
        <input type="number" value={form.trm||''} onChange={e=>setForm(f=>({...f,trm:e.target.value}))}
          placeholder="1500" style={inputSt}/>
      </Field>
    </div>
    {usd>0&&<div style={{background:'#f8fafc',borderRadius:10,padding:12,marginBottom:13}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,color:C.sub,fontFamily:C.font}}>Equivalente USD</span>
        <span style={{fontSize:20,fontWeight:700,color:C.primary,fontFamily:C.head}}>{fUSD(usd)}</span>
      </div>
      {th>0&&<div style={{marginTop:7,paddingTop:7,borderTop:`1px solid ${C.border}`,
        display:'flex',justifyContent:'space-between',fontSize:13,fontFamily:C.font}}>
        <span style={{color:C.sub}}>Teórico del mes</span>
        <span style={{fontWeight:700,color:diff>=0?C.success:C.danger}}>
          {fUSD(th)} · {diff>=0?'+':''}{fUSD(diff)}
        </span>
      </div>}
    </div>}
    <Btn onClick={onSave} fullWidth disabled={!form.year||!form.month||!form.local}>
      {isEdit?'Actualizar':'Guardar Ahorro'}
    </Btn>
  </Overlay>;
}

function PaidModal({form,setForm,hito,onSave,onClose}){
  if(!hito) return null;
  return<Overlay onClose={onClose}>
    <MHead title="Registrar Pago" onClose={onClose}/>
    <div style={{background:hito.colorL,border:`1.5px solid ${hito.color}44`,borderRadius:10,
      padding:12,marginBottom:13}}>
      <div style={{fontSize:12,color:C.sub,fontFamily:C.font}}>{hito.propName}</div>
      <div style={{fontSize:17,fontWeight:700,color:C.text,fontFamily:C.head,marginTop:1}}>{hito.label}</div>
      <div style={{fontSize:15,fontWeight:700,color:hito.color,fontFamily:C.head,marginTop:3}}>
        {fUSD(hito.usd)} USD (plan)
      </div>
    </div>
    <Field label="Monto pagado (USD)">
      <input type="number" value={form.amount||''} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
        placeholder={String(hito.usd)} style={inputSt}/>
    </Field>
    <Field label="Fecha del pago (AAAA-MM)">
      <input type="text" value={form.date||''} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
        placeholder="2026-09" style={inputSt}/>
    </Field>
    <Btn onClick={onSave} fullWidth color={C.success}>✓ Confirmar Pago</Btn>
  </Overlay>;
}

function EditPropModal({propId,data,form,setForm,onSave,onClose}){
  const pb=PROPS_BASE.find(p=>p.id===propId);
  if(!pb) return null;
  return<Overlay onClose={onClose}>
    <MHead title={`Editar — ${pb.name}`} onClose={onClose}/>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,
      padding:'8px 10px',background:pb.colorL,borderRadius:8,
      border:`1.5px solid ${pb.color}44`}}>
      <div style={{width:10,height:10,borderRadius:5,background:pb.color,flexShrink:0}}/>
      <span style={{fontSize:12,color:C.sub,fontFamily:C.font}}>
        Moneda base: {pb.moneda} · Cambiá los valores que necesites
      </span>
    </div>
    <Field label="Nombre de la propiedad">
      <input type="text" value={form.name||''} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
        placeholder={pb.name} style={inputSt}/>
    </Field>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <Field label="Valor total (USD)">
        <input type="number" value={form.totalUSD||''} onChange={e=>setForm(f=>({...f,totalUSD:e.target.value}))}
          placeholder={String(pb.totalUSD)} style={inputSt}/>
      </Field>
      <Field label="Ingreso mensual (USD)">
        <input type="number" value={form.ingreso||''} onChange={e=>setForm(f=>({...f,ingreso:e.target.value}))}
          placeholder={String(pb.ingreso)} style={inputSt}/>
      </Field>
    </div>
    <Field label="Comentario / Nota">
      <input type="text" value={form.comentario||''} onChange={e=>setForm(f=>({...f,comentario:e.target.value}))}
        placeholder={pb.comentario} style={inputSt}/>
    </Field>
    <div style={{display:'flex',gap:10,marginTop:4}}>
      <Btn onClick={()=>{
        const pb2=PROPS_BASE.find(p=>p.id===propId);
        setForm({name:pb2.name,totalUSD:pb2.totalUSD,ingreso:pb2.ingreso,comentario:pb2.comentario});
      }} secondary color={C.sub} fullWidth small>Restablecer</Btn>
      <Btn onClick={onSave} color={C.primary} fullWidth>Guardar</Btn>
    </div>
  </Overlay>;
}

function ConfirmModal({msg,onConfirm,onCancel}){
  return<div onClick={onCancel} style={{position:'fixed',inset:0,background:'rgba(15,23,42,.5)',
    zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 20px'}}>
    <div onClick={e=>e.stopPropagation()} className="fade-in"
      style={{background:C.white,borderRadius:16,padding:22,maxWidth:340,width:'100%',
      border:`1px solid ${C.border}`}}>
      <div style={{fontSize:15,color:C.text,marginBottom:18,lineHeight:1.5,fontFamily:C.font}}>{msg}</div>
      <div style={{display:'flex',gap:10}}>
        <Btn onClick={onCancel} secondary color={C.sub} fullWidth>Cancelar</Btn>
        <Btn onClick={onConfirm} color={C.danger} fullWidth>Eliminar</Btn>
      </div>
    </div>
  </div>;
}

// ─── NAV ─────────────────────────────────────────
function BottomNav({tab,setTab}){
  const tabs=[
    {id:'inicio',icon:'🏠',l:'Inicio'},
    {id:'ahorros',icon:'💰',l:'Ahorros'},
    {id:'propiedades',icon:'🏢',l:'Props'},
    {id:'plan',icon:'📋',l:'Plan'},
    {id:'proyeccion',icon:'📈',l:'Proyección'},
  ];
  return<div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:480,margin:'0 auto',
    background:C.white,borderTop:`1px solid ${C.border}`,display:'flex',zIndex:100,
    paddingBottom:'env(safe-area-inset-bottom)'}}>
    {tabs.map(t=>(
      <button key={t.id} onClick={()=>setTab(t.id)}
        style={{flex:1,padding:'8px 0 7px',border:'none',background:'none',cursor:'pointer',
        display:'flex',flexDirection:'column',alignItems:'center',gap:1,
        color:tab===t.id?C.primary:C.muted,fontFamily:C.font}}>
        <span style={{fontSize:18}}>{t.icon}</span>
        <span style={{fontSize:9,fontWeight:tab===t.id?700:400}}>{t.l}</span>
        {tab===t.id&&<div style={{width:4,height:3,borderRadius:2,background:C.primary}}/>}
      </button>
    ))}
  </div>;
}

// ─── APP ─────────────────────────────────────────
function App(){
  // ── TODOS LOS HOOKS AL TOPE ──
  const[tab,setTab]                     = useState('inicio');
  const[data,setData]                   = useState(loadData);
  const[modal,setModal]                 = useState(null);
  const[savForm,setSavForm]             = useState({});
  const[paidForm,setPaidForm]           = useState({});
  const[propForm,setPropForm]           = useState({});
  const[editingSav,setEditingSav]       = useState(null);
  const[editingPropId,setEditingPropId] = useState(null);
  const[selHito,setSelHito]             = useState(null);
  const[confirmId,setConfirmId]         = useState(null);
  const[planFilter,setPlanFilter]       = useState('todos');

  useEffect(()=>{
    try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}
  },[data]);

  const metrics = useMemo(()=>computeMetrics(data),[data]);

  // ── HANDLERS AHORRO ──
  const openAdd = useCallback(()=>{
    const now=new Date();
    setSavForm({year:String(now.getFullYear()),month:String(now.getMonth()+1),
      local:'',moneda:'ARS',trm:String(data.trm_ars),titulo:''});
    setEditingSav(null);
    setModal('saving');
  },[data.trm_ars]);

  const openEdit = useCallback(s=>{
    setSavForm({year:String(s.year),month:String(s.month),local:String(s.local),
      moneda:s.moneda||'ARS',trm:String(s.trm),titulo:s.titulo||''});
    setEditingSav(s);
    setModal('saving');
  },[]);

  const saveSaving = useCallback(()=>{
    const year=parseInt(savForm.year), month=parseInt(savForm.month);
    const local=parseFloat(String(savForm.local||'').replace(/[.,\s]/g,''))||0;
    const trm=parseFloat(savForm.trm)||1500;
    if(!year||!month||!local) return;
    const usd=local/trm;
    const entry={id:editingSav?.id||`s${Date.now()}`,year,month,local,trm,usd,
      moneda:savForm.moneda||'ARS',titulo:savForm.titulo||''};
    setData(d=>{
      const newSav=editingSav
        ?d.savings.map(s=>s.id===editingSav.id?entry:s)
        :[...d.savings,entry];
      const trmKey=savForm.moneda==='COP'?'trm_cop':'trm_ars';
      return{...d,savings:newSav,[trmKey]:parseFloat(savForm.trm)||d[trmKey]};
    });
    setModal(null);
  },[savForm,editingSav]);

  // ── HANDLERS PAGO ──
  const openMarkPaid = useCallback(h=>{
    const now=new Date();
    setSelHito(h);
    setPaidForm({amount:String(h.usd),date:`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`});
    setModal('paid');
  },[]);

  const savePaid = useCallback(()=>{
    const amount=parseFloat(paidForm.amount)||0;
    if(!amount||!paidForm.date||!selHito) return;
    setData(d=>({...d,paid:{...d.paid,[selHito.id]:{date:paidForm.date,amount_usd:amount}}}));
    setModal(null);
  },[paidForm,selHito]);

  const unmarkPaid = useCallback(id=>{
    if(data.paid[id]?.seeded) return;
    setData(d=>{const p={...d.paid};delete p[id];return{...d,paid:p};});
  },[data.paid]);

  // ── HANDLERS PROPIEDADES ──
  const changeStatus = useCallback((propId,status)=>{
    setData(d=>({...d,propStatus:{...d.propStatus,[propId]:status}}));
  },[]);

  const openEditProp = useCallback(propId=>{
    const p=getProp(PROPS_BASE.find(x=>x.id===propId),data);
    setPropForm({name:p.name,totalUSD:String(p.totalUSD),
      ingreso:String(p.ingreso),comentario:p.comentario||''});
    setEditingPropId(propId);
    setModal('editProp');
  },[data]);

  const savePropEdit = useCallback(()=>{
    if(!editingPropId) return;
    const ov={
      name:propForm.name||undefined,
      totalUSD:propForm.totalUSD!==''?parseFloat(propForm.totalUSD):undefined,
      ingreso:propForm.ingreso!==''?parseFloat(propForm.ingreso):undefined,
      comentario:propForm.comentario!==undefined?propForm.comentario:undefined,
    };
    setData(d=>({...d,propOverrides:{...d.propOverrides,[editingPropId]:{
      ...(d.propOverrides?.[editingPropId]||{}), ...ov
    }}}));
    setModal(null);
  },[editingPropId,propForm]);

  // ── HANDLERS REORDEN ──
  const moveHito = useCallback((id,dir)=>{
    setData(d=>{
      const pending=getOrderedPending(d);
      const order=pending.map(h=>h.id);
      const idx=order.indexOf(id);
      if(dir==='up'&&idx>0) [order[idx-1],order[idx]]=[order[idx],order[idx-1]];
      if(dir==='down'&&idx<order.length-1) [order[idx],order[idx+1]]=[order[idx+1],order[idx]];
      return{...d,hitoOrder:order};
    });
  },[]);

  // ── RENDER ──
  return<div style={{maxWidth:480,margin:'0 auto',minHeight:'100svh',background:C.bg,
    fontFamily:C.font,color:C.text,paddingBottom:75,overflowX:'hidden'}}>

    {tab==='inicio'&&<InicioTab metrics={metrics} onAddSaving={openAdd}/>}
    {tab==='ahorros'&&<AhorrosTab data={data} metrics={metrics}
      onAdd={openAdd} onEdit={openEdit} onDelete={id=>setConfirmId(id)}/>}
    {tab==='propiedades'&&<PropiedadesTab data={data}
      onChangeStatus={changeStatus} onEditProp={openEditProp}/>}
    {tab==='plan'&&<PlanTab data={data} metrics={metrics}
      planFilter={planFilter} setPlanFilter={setPlanFilter}
      onMarkPaid={openMarkPaid} onUnmark={unmarkPaid} onMoveHito={moveHito}/>}
    {tab==='proyeccion'&&<ProyeccionTab data={data} metrics={metrics}/>}

    {modal==='saving'&&<SavingModal form={savForm} setForm={setSavForm} data={data}
      onSave={saveSaving} onClose={()=>setModal(null)} isEdit={!!editingSav}/>}
    {modal==='paid'&&<PaidModal form={paidForm} setForm={setPaidForm}
      hito={selHito} onSave={savePaid} onClose={()=>setModal(null)}/>}
    {modal==='editProp'&&<EditPropModal propId={editingPropId} data={data}
      form={propForm} setForm={setPropForm}
      onSave={savePropEdit} onClose={()=>setModal(null)}/>}
    {confirmId&&<ConfirmModal msg="¿Eliminar este registro de ahorro?"
      onConfirm={()=>{setData(d=>({...d,savings:d.savings.filter(s=>s.id!==confirmId)}));setConfirmId(null);}}
      onCancel={()=>setConfirmId(null)}/>}

    <BottomNav tab={tab} setTab={setTab}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
