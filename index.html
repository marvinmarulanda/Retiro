const MPLAN={1:3000,2:3000,3:16333,4:3000,5:3000,6:7333,7:3000,8:3000,9:3000,10:3000,11:3000,12:7333};

function mSav(y,m){if(y<2026||(y===2026&&m<4))return 0;return MPLAN[m]||3000;}

// Base capacity for a month: override if set, otherwise MPLAN
function baseCapacity(y,m,data){
  if(!data)return mSav(y,m);
  const ym=`${y}-${String(m).padStart(2,'0')}`;
  return(data.savingsOverrides&&data.savingsOverrides[ym]!==undefined)
    ?data.savingsOverrides[ym]
    :mSav(y,m);
}
// Cumulative theoretical savings up to a month, respecting overrides
function theorCumul(toY,toM,data){
  let t=0,y=2026,m=4;
  while(y<toY||(y===toY&&m<=toM)){t+=baseCapacity(y,m,data);m++;if(m>12){y++;m=1;}}
  return t;
}

// ─── INSTALLMENT HELPERS ─────────────────────────
// Returns total installment deductions for a given month across all active plans
function installmentDeductionForMonth(y,m,data){
  const plans=data.installmentPlans||[];
  let total=0;
  const ym=`${y}-${String(m).padStart(2,'0')}`;
  plans.forEach(p=>{
    if(p.status==='cancelled')return;
    if(p.status==='paused')return;
    const start=p.startDate; // YYYY-MM
    const _parsed=pDate(start);
    if(!_parsed)return;
    const{y:sy,m:sm}=_parsed;
    const endDt=addM(sy,sm,p.totalMonths-1);
    const end=`${endDt.y}-${String(endDt.m).padStart(2,'0')}`;
    if(ym>=start&&ym<=end) total+=p.amountPerMonth;
  });
  return total;
}
// Effective savings in a month: applies user override first, then subtracts installments
function mSavEffective(y,m,data){
  return Math.max(0, baseCapacity(y,m,data) - installmentDeductionForMonth(y,m,data));
}
// Get installment plan for a hito id
function getPlanForHito(hitoId,data){
  return(data.installmentPlans||[]).find(p=>p.hitoId===hitoId&&p.status!=='cancelled');
}
// Check if current month is confirmed for a plan
function isMonthConfirmed(plan,y,m){
  const ym=`${y}-${String(m).padStart(2,'0')}`;
  return(plan.paidMonths||[]).includes(ym);
}
// How many months paid so far
function paidMonthsCount(plan){ return(plan.paidMonths||[]).length; }
// Auto-complete: if all months confirmed, hito should be marked paid
function planIsComplete(plan){ return paidMonthsCount(plan)>=plan.totalMonths; }

const mDiff=(y1,m1,y2,m2)=>(y2-y1)*12+(m2-m1);

// ─── HELPERS ─────────────────────────────────────
// Merge base props with custom props for uniform handling
function getAllProps(data){
  const deletedBase=new Set(data.deletedBaseProps||[]);
  const base=PROPS_BASE.filter(p=>!deletedBase.has(p.id)).map(p=>{
    const ov=data.propOverrides?.[p.id]||{};
    const dreamDate=ov.dreamDate??p.dreamDate??(p.hitos[0]?.date||'2026-01');
    return{...p,name:ov.name??p.name,totalUSD:ov.totalUSD??p.totalUSD,
      ingreso:ov.ingreso??p.ingreso,comentario:ov.comentario??p.comentario,
      dreamDate,isCustom:false};
  });
  const custom=(data.customProps||[]).map(p=>{
    const ov=data.propOverrides?.[p.id]||{};
    const dreamDate=ov.dreamDate??p.dreamDate??(p.hitos[0]?.date||'2026-01');
    return{...p,name:ov.name??p.name,totalUSD:ov.totalUSD??p.totalUSD,
      ingreso:ov.ingreso??p.ingreso,comentario:ov.comentario??p.comentario,
      dreamDate,isCustom:true};
  });
  return[...base,...custom];
}

function getBaseProp(id,data){
  return PROPS_BASE.find(p=>p.id===id)||(data.customProps||[]).find(p=>p.id===id);

function getAllHitos(data){
  const removals=new Set(data.hitoRemovals||[]);
  const deletedBase=new Set(data.deletedBaseProps||[]);
  const allProps=getAllProps(data);
  const result=[];
  allProps.forEach(p=>{
    const propName=p.name;
    // base/custom hitos
    (p.hitos||[]).filter(h=>h.date&&!removals.has(h.id)).forEach(h=>{
      const ho=data.hitoOverrides?.[h.id]||{};
      result.push({...h,usd:ho.usd??h.usd,date:ho.date||h.date,
        label:ho.label||h.label,propId:p.id,propName,
        color:p.color,colorL:p.colorL,rental:h.rental||false});
    });
    // additions
    (data.hitoAdditions?.[p.id]||[]).filter(h=>!removals.has(h.id)).forEach(h=>{
      const ho=data.hitoOverrides?.[h.id]||{};
      result.push({...h,usd:ho.usd??h.usd,date:ho.date||h.date,
        label:ho.label||h.label,propId:p.id,propName,
        color:p.color,colorL:p.colorL,rental:h.rental||false});
    });
  });
  return result.sort((a,b)=>a.date.localeCompare(b.date));
}

// Merge an existing ordered list with new hitos, inserting each new one
// at the correct chronological position within the existing order.
function mergeHitoOrder(existingOrder, allPendingHitos){
  const byId=Object.fromEntries(allPendingHitos.map(h=>[h.id,h]));
  // Keep only ids that still exist as pending
  const valid=existingOrder.filter(id=>byId[id]);
  const inOrder=new Set(valid);
  // New hitos not yet in order, sorted by date
  const newH=allPendingHitos.filter(h=>!inOrder.has(h.id)).sort((a,b)=>a.date.localeCompare(b.date));
  const result=[...valid];
  for(const nh of newH){
    let idx=result.length;
    for(let i=0;i<result.length;i++){
      const eh=byId[result[i]];
      if(eh&&eh.date>nh.date){idx=i;break;}
    }
    result.splice(idx,0,nh.id);
  }
  return result;
}

function getOrderedPending(data){
  const allH=getAllHitos(data);
  const pIds=new Set(Object.keys(data.paid));
  const pending=allH.filter(h=>!pIds.has(h.id));
  // Merge existing manual order with any new hitos at their date position
  const merged=mergeHitoOrder(data.hitoOrder||[],pending);
  return pending.sort((a,b)=>{
    const ia=merged.indexOf(a.id),ib=merged.indexOf(b.id);
    if(ia===-1&&ib===-1)return a.date.localeCompare(b.date);
    if(ia===-1)return 1;if(ib===-1)return-1;return ia-ib;
  });
}

function computePaymentDates(data){
  const now=new Date(),nY=now.getFullYear(),nM=now.getMonth()+1;
  const ordPending=getOrderedPending(data);
  const rt=data.savings.reduce((s,e)=>s+e.usd,0);
  const np=Object.entries(data.paid).filter(([,v])=>!v.seeded&&v.amount_usd).reduce((s,[,v])=>s+(v.amount_usd||0),0);
  // Include current month's unregistered capacity:
  // If it's April and you've saved $0, the sim should assume you WILL save April's effective capacity.
  const monthSaved=data.savings.filter(s=>s.year===nY&&s.month===nM).reduce((s,e)=>s+e.usd,0);
  const curMonthRem=Math.max(0,mSavEffective(nY,nM,data)-monthSaved);
  let bal=rt-np+curMonthRem;
  let cy=nY,cm=nM;
  const result={};
  const installmentHitoIds=new Set(
    (data.installmentPlans||[]).filter(p=>p.status!=='cancelled').map(p=>p.hitoId)
  );
  const queue=ordPending.filter(h=>!h.rental&&!installmentHitoIds.has(h.id));
  let it=0;
  while(queue.length>0&&it++<1000){
    const r=addM(cy,cm,1);cy=r.y;cm=r.m;
    bal+=mSavEffective(cy,cm,data);
    while(queue.length>0&&bal>=queue[0].usd){const h=queue.shift();bal-=h.usd;result[h.id]={y:cy,m:cm};}
  }
  ordPending.filter(h=>h.rental).forEach(h=>{const d=pDate(h.date);if(d)result[h.id]={y:d.y,m:d.m};});
  (data.installmentPlans||[]).filter(p=>p.status!=='cancelled').forEach(p=>{
    const remaining=Math.max(0,p.totalMonths-paidMonthsCount(p));
    const completionDt=remaining>0?addM(nY,nM,remaining):{y:nY,m:nM};
    result[p.hitoId]={y:completionDt.y,m:completionDt.m,isInstallment:true};
  });
  return result;
}

const DEF={trm_ars:1500,trm_cop:3700,savings:[],paid:{},propStatus:{},
           propOverrides:{},hitoOverrides:{},hitoOrder:[],
           hitoAdditions:{},hitoRemovals:[],customProps:[],
           installmentPlans:[],savingsOverrides:{},deletedBaseProps:[]};
function loadData(){
  try{
    const s=localStorage.getItem(KEY);
    const d=s?{...DEF,...JSON.parse(s)}:{...DEF};
    if(!d.hitoAdditions)d.hitoAdditions={};
    if(!d.hitoRemovals)d.hitoRemovals=[];
    if(!d.customProps)d.customProps=[];
    if(!d.installmentPlans)d.installmentPlans=[];
    if(!d.savingsOverrides)d.savingsOverrides={};
    if(!d.deletedBaseProps)d.deletedBaseProps=[];
    SEEDED_IDS.forEach(id=>{if(!d.paid[id])d.paid[id]={seeded:true};});
    PROPS_BASE.forEach(p=>{if(!d.propStatus[p.id])d.propStatus[p.id]=p.defStatus;});
    (d.customProps||[]).forEach(p=>{if(!d.propStatus[p.id])d.propStatus[p.id]='Sin Iniciar';});
    // Preserve manual hitoOrder; only insert NEW hitos at their date position
    const _pIds=new Set(Object.keys(d.paid));
    const _pending=getAllHitos(d).filter(h=>!_pIds.has(h.id));
    if(!d.hitoOrder||d.hitoOrder.length===0){
      d.hitoOrder=_pending.sort((a,b)=>a.date.localeCompare(b.date)).map(h=>h.id);
    } else {
      d.hitoOrder=mergeHitoOrder(d.hitoOrder,_pending);
    }
    return d;
  }catch(e){
    const d={...DEF};
    SEEDED_IDS.forEach(id=>{d.paid[id]={seeded:true};});
    PROPS_BASE.forEach(p=>{d.propStatus[p.id]=p.defStatus;});
    return d;
  }
}

// ─── MÉTRICAS ────────────────────────────────────
function computeMetrics(data){
  const now=new Date(),nY=now.getFullYear(),nM=now.getMonth()+1;
  const allH=getAllHitos(data);
  const pIds=new Set(Object.keys(data.paid));
  const ordPending=getOrderedPending(data);
  // Exclude hitos managed by installment plans from the lump-sum queue
  const instHitoIds=new Set(
    (data.installmentPlans||[]).filter(p=>p.status!=='cancelled').map(p=>p.hitoId)
  );
  const savingsPending=ordPending.filter(h=>!h.rental&&!instHitoIds.has(h.id));
  const nextHito=savingsPending[0]||null;
  const realTotal=data.savings.reduce((s,e)=>s+e.usd,0);
  const nonSeededPaid=Object.entries(data.paid).filter(([,v])=>!v.seeded&&v.amount_usd).reduce((s,[,v])=>s+(v.amount_usd||0),0);
  const realBalance=realTotal-nonSeededPaid;
  const thTotal=theorCumul(nY,nM,data);
  // savGap: net available vs what net should be.
  // If user paid $17K and plan only expected $4K by now → they're "al día" (spent > expected, balance ≥ 0)
  // If user saved nothing and plan expected $4K → they're $4K behind
  const thNet=Math.max(0, thTotal - nonSeededPaid);
  const savGap=realBalance - thNet;
  const monthTheo=baseCapacity(nY,nM,data);
  const monthInstDeduct=installmentDeductionForMonth(nY,nM,data);
  const monthEffective=Math.max(0,monthTheo-monthInstDeduct);
  const monthReal=data.savings.filter(s=>s.year===nY&&s.month===nM).reduce((s,e)=>s+e.usd,0);
  const seededSum=allH.filter(h=>data.paid[h.id]?.seeded).reduce((s,h)=>s+h.usd,0);
  const allPropsM=getAllProps(data);
  const totalPortfolio=allPropsM.reduce((s,p)=>s+p.totalUSD,0);
  // progressValue: historical paid + savings + installment amounts already committed
  const instCommitted=(data.installmentPlans||[]).filter(p=>p.status!=='cancelled')
    .reduce((s,p)=>s+paidMonthsCount(p)*p.amountPerMonth, 0);
  const progressValue=seededSum+realTotal+instCommitted;

  // Include current month's unregistered capacity in projection balance
  const curMonthSaved=data.savings.filter(s=>s.year===nY&&s.month===nM).reduce((s,e)=>s+e.usd,0);
  const curMonthRem=Math.max(0,monthEffective-curMonthSaved);
  const projBalance=realBalance+curMonthRem; // balance including what we expect to save this month

  let nd=null;
  if(nextHito){
    const{y:py,m:pm}=pDate(nextHito.date);
    const planMo=mDiff(nY,nM,py,pm);
    if(projBalance>=nextHito.usd){
      nd={months:0,status:'ready',canPay:true,hito:nextHito,reachDate:{y:nY,m:nM}};
    }else{
      let bal=projBalance,cy=nY,cm=nM,mo=0;
      while(bal<nextHito.usd&&mo<480){const r=addM(cy,cm,1);cy=r.y;cm=r.m;bal+=mSavEffective(cy,cm,data);mo++;}
      const delay=Math.max(0,mo-Math.max(0,planMo));
      let status=delay===0?'ok':delay<=3?'warning':'danger';
      if(delay===0&&savGap<-monthTheo)status='warning';
      nd={months:delay,status,canPay:false,hito:nextHito,reachDate:addM(nY,nM,mo),behindSavings:savGap<0};
    }
  }
  let comp=null;
  if(savingsPending.length>0){
    let bal=projBalance,cy=nY,cm=nM,r=[...savingsPending],it=0;
    while(r.length>0&&it++<800){const nx=addM(cy,cm,1);cy=nx.y;cm=nx.m;bal+=mSavEffective(cy,cm,data);
      while(r.length>0&&bal>=r[0].usd){bal-=r[0].usd;r.shift();}}
    comp={y:cy,m:cm};
  }
  // Overall: based on NET savGap (realBalance vs thNet)
  let overall='ok';
  if(savGap<-5000) overall='danger';
  else if(savGap<-500) overall='warning';
  if(overall==='ok'&&nd&&nd.months>6) overall='warning';
  else if(overall==='ok'&&nd&&nd.months>0) overall='warning';

  // Active installment plans for current month
  const activePlans=(data.installmentPlans||[]).filter(p=>p.status!=='cancelled');
  const currentMonthInstallments=activePlans.filter(p=>{
    const ym=`${nY}-${String(nM).padStart(2,'0')}`;
    const{y:sy,m:sm}=pDate(p.startDate);
    const endDt=addM(sy,sm,p.totalMonths-1);
    const end=`${endDt.y}-${String(endDt.m).padStart(2,'0')}`;
    return ym>=p.startDate&&ym<=end&&p.status==='active';
  });

  return{realTotal,nonSeededPaid,realBalance,thTotal,savGap,monthTheo,monthInstDeduct,monthEffective,monthReal,
    seededSum,totalPortfolio,progressValue,
    paidCount:allH.filter(h=>pIds.has(h.id)).length,
    totalHitos:allH.length,nextHito,nd,comp,overall,nY,nM,pIds,
    activePlans,currentMonthInstallments,savingsPending};
}

                <div style={{fontSize:13,fontWeight:700,color:stC,fontFamily:C.head}}>{fUSD(plan.amountPerMonth*plan.totalMonths)}</div>
                <div style={{fontSize:10,color:C.muted}}>total</div>
              </div>
            </div>

            <div style={{display:'flex',gap:6,marginTop:8}}>
              {inRange&&plan.status==='active'&&!confirmedThisMonth&&!isComplete&&(
                <button onClick={()=>onManageInstallment(plan,'confirm',nY,nM)}
                  style={{flex:1,padding:'8px',background:C.success,border:'none',borderRadius:8,
                  color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:C.font}}>
                  ✓ Confirmar cuota {MES[nM-1]}
                </button>
              )}
              {inRange&&plan.status==='active'&&confirmedThisMonth&&!isComplete&&(
                <div style={{flex:1,padding:'8px',background:C.successL,borderRadius:8,
                  color:C.success,fontSize:12,fontWeight:700,fontFamily:C.font,textAlign:'center'}}>
                  ✓ Cuota {MES[nM-1]} confirmada
                </div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:8}}>
        <div><div style={{fontSize:30,fontWeight:700,color:C.primary,fontFamily:C.head,lineHeight:1}}>{pct.toFixed(1)}%</div><div style={{fontSize:12,color:C.sub,fontFamily:C.font,marginTop:1}}>financiado</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:C.font}}>{fUSD(progressValue)}</div><div style={{fontSize:11,color:C.sub,fontFamily:C.font}}>de {fUSD(totalPortfolio)}</div></div>
      </div>
      <Bar value={progressValue} max={totalPortfolio} color={C.primary} h={10}/>
      <div style={{marginTop:6,display:'flex',justifyContent:'space-between',fontSize:11,color:C.muted,fontFamily:C.font}}>
        <span>Pagado históricamente: {fUSD(seededSum)}</span>
        <span>Saldo disponible: {fUSD(realBalance)}</span>
      </div>
      <div style={{marginTop:7,paddingTop:7,borderTop:`1px solid ${C.border2}`,display:'flex',justifyContent:'space-between',fontSize:12,fontFamily:C.font}}>
        <span style={{color:C.sub}}>{paidCount}/{totalHitos} hitos</span>
        {comp&&<span style={{fontWeight:700,color:delay>0?C.warning:C.success}}>Fin: {mStr(comp.y,comp.m)}{delay>0?` (+${delay}m)`:' ✓'}</span>}
      </div>
    </Card>
    {nd&&nd.hito&&(
      <Card>
        <div style={{fontSize:10,color:C.sub,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',marginBottom:10,fontFamily:C.font}}>Próximo Pago</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
              <div style={{width:8,height:8,borderRadius:4,background:nd.hito.color}}/>
              <span style={{fontSize:12,color:C.sub,fontFamily:C.font}}>{nd.hito.propName}</span>
            </div>
            <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:C.head}}>{nd.hito.label}</div>
            <div style={{fontSize:12,color:C.sub,fontFamily:C.font,marginTop:1}}>Meta: {(()=>{const d=pDate(nd.hito.date);return mStr(d.y,d.m);})()}</div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontSize:22,fontWeight:700,color:C.warning,fontFamily:C.head}}>{fUSD(nd.hito.usd)}</div>
            <div style={{fontSize:11,color:C.sub}}>USD</div>
          </div>
        </div>
        <div style={{marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.sub,marginBottom:4,fontFamily:C.font}}>
            <span>Balance acumulado</span><span style={{fontWeight:600,color:C.text}}>{fUSD(Math.min(realBalance,nd.hito.usd))} / {fUSD(nd.hito.usd)}</span>
          </div>
          <Bar value={realBalance} max={nd.hito.usd} color={realBalance>=nd.hito.usd?C.success:realBalance>=nd.hito.usd*.6?C.warning:C.danger}/>
        </div>
        {nd.canPay?(
          <div style={{background:C.successL,borderRadius:8,padding:'9px 12px',fontSize:13,color:C.success,fontWeight:600,fontFamily:C.font}}>✓ Saldo suficiente — podés realizar este pago ahora</div>
        ):(()=>{
          const bgC=nd.status==='ok'?C.successL:nd.status==='warning'?C.warningL:C.dangerL;
          const txC=nd.status==='ok'?C.success:nd.status==='warning'?C.warning:C.danger;
          const metaDate=(()=>{const d=pDate(nd.hito.date);return mStr(d.y,d.m);})();
          const msg=nd.months===0&&nd.status==='ok'?`✓ Llegás en fecha — saldo listo ${mStr(nd.reachDate.y,nd.reachDate.m)}`
            :nd.months===0?`⚠️ Llegás al pago pero vas ${fUSD(Math.abs(savGap))} atrasado en ahorro`
            :`▲ ${nd.months}m de delay vs la meta (${metaDate}) — proyectado ${mStr(nd.reachDate.y,nd.reachDate.m)}`;
          // Only show $/mes hint if delay > 0 and the date is in the future (not overdue)
          const planInFuture=mDiff(nY,nM,...Object.values(pDate(nd.hito.date)))>0;
          const fa=Math.max(0,nd.hito.usd-realBalance),mp=Math.max(2,mDiff(nY,nM,...Object.values(pDate(nd.hito.date))));
          return<div style={{background:bgC,borderRadius:8,padding:'9px 12px',fontSize:13,fontFamily:C.font,fontWeight:600,color:txC}}>
            {msg}{nd.months>0&&planInFuture&&<div style={{fontSize:11,marginTop:3,opacity:.9}}>Necesitás ~{fUSD(Math.ceil(fa/mp))}/mes adicional para llegar en fecha · Capacidad libre actual: {fUSD(monthEffective)}</div>}
          </div>;
        })()}
      </Card>
    )}
    <div style={{padding:'4px 12px 8px'}}><Btn onClick={onAddSaving} fullWidth>+ Registrar Ahorro del Mes</Btn></div>
  </div>;
}

// ─── TAB AHORROS ─────────────────────────────────
function AhorrosTab({data,metrics,onAdd,onEdit,onDelete,onSetOverride,onReset,onExport,onImport,onRestoreProp}){
  const sorted=[...data.savings].sort((a,b)=>b.year-a.year||(b.month-a.month));
  const avg=sorted.length?sorted.slice(0,3).reduce((s,e)=>s+e.usd,0)/Math.min(3,sorted.length):0;
  const now=new Date(),nM=now.getMonth()+1,nY=now.getFullYear();
  const[showOv,setShowOv]=React.useState(false);
  const[ovY,setOvY]=React.useState(String(nY));
  const[ovM,setOvM]=React.useState(String(nM));
  const[ovAmt,setOvAmt]=React.useState('');
  const ovKey=`${ovY}-${String(ovM).padStart(2,'0')}`;
  const existOv=(data.savingsOverrides||{})[ovKey];
  const ovEntries=Object.entries(data.savingsOverrides||{}).sort();
  return<div className="fade-in">
    <PageHeader title="Ahorros" sub="Registro mensual · ARS y COP" action={<Btn onClick={onAdd} small>+ Agregar</Btn>}/>
    <Card style={{marginTop:12}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,textAlign:'center'}}>
        {[{l:'Total USD',v:fUSD(metrics.realTotal),c:C.primary},{l:'Meses',v:data.savings.length,c:C.text},{l:'Prom/mes',v:fUSD(avg),c:C.warning}].map(({l,v,c})=>(
          <div key={l}><div style={{fontSize:11,color:C.sub,fontFamily:C.font}}>{l}</div><div style={{fontSize:15,fontWeight:700,color:c,fontFamily:C.head,marginTop:2}}>{v}</div></div>
        ))}
      </div>
    </Card>
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:10,color:C.sub,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',fontFamily:C.font}}>
          Capacidad mensual {ovEntries.length>0&&<span style={{color:C.warning}}>({ovEntries.length} modif.)</span>}
        </div>
        <select value={ovY} onChange={e=>setOvY(e.target.value)}
          style={{fontSize:11,padding:'3px 6px',borderRadius:6,border:`1px solid ${C.border}`,
          background:C.border2,color:C.text,fontFamily:C.font,outline:'none'}}>
          {Array.from({length:20},(_,i)=>2020+i).map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:3,marginBottom:10}}>
        {MES.map((m,i)=>{
          const mn=i+1;
          const base=baseCapacity(parseInt(ovY),mn,data);
          const hasOv=(data.savingsOverrides||{})[`${ovY}-${String(mn).padStart(2,'0')}`]!==undefined;
          const isCur=parseInt(ovY)===nY&&nM===mn;
          const isSpec=MPLAN[mn]>3000;
          return<div key={m} style={{padding:'5px 2px',textAlign:'center',cursor:'pointer',
            background:isCur?C.primaryL:hasOv?C.warningL:isSpec?'#fef3c7':C.border2,borderRadius:4}}
            onClick={()=>{setOvM(String(mn));setShowOv(true);setOvAmt('');}}>
            <div style={{fontSize:9,color:C.sub,fontFamily:C.font}}>{m}</div>
            <div style={{fontSize:10,fontWeight:700,
              color:hasOv?C.warning:isSpec?C.warning:isCur?C.primary:C.text,fontFamily:C.font}}>
              {base>=1000?`${(base/1000).toFixed(0)}K`:`${base}`}
            </div>
          </div>;
        })}
      </div>
      <button onClick={()=>setShowOv(!showOv)}
        style={{width:'100%',padding:'8px',background:C.border2,border:`1.5px solid ${C.border}`,
        borderRadius:8,color:C.primary,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:C.font}}>
        ⚙ {showOv?'Cerrar':'Modificar capacidad de un mes específico'}
      </button>
      {showOv&&<div style={{marginTop:10,padding:'12px',background:'#f8fafc',borderRadius:9,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:11,color:C.sub,fontFamily:C.font,marginBottom:10,lineHeight:1.5}}>
          Sobrescribí la capacidad de ahorro de cualquier mes futuro. Útil para primas, bonos o meses con gastos extra. Impacta las fechas proyectadas de todos los hitos.
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
          <Field label="Año">
            <select value={ovY} onChange={e=>setOvY(e.target.value)} style={{...iSt,fontSize:13}}>
              {Array.from({length:16},(_,i)=>2026+i).map(y=><option key={y} value={y}>{y}</option>)}
            </select>
          </Field>
          <Field label="Mes">
            <select value={ovM} onChange={e=>setOvM(e.target.value)} style={{...iSt,fontSize:13}}>
              {MES.map((n,i)=><option key={i+1} value={i+1}>{n}</option>)}
            </select>
          </Field>
        </div>
        <Field label={`Nuevo monto (USD) · Teórico actual: ${fUSD(MPLAN[parseInt(ovM)]||3000)}`}>
          <input type="number" value={ovAmt} onChange={e=>setOvAmt(e.target.value)}
            placeholder={existOv!==undefined?String(existOv):`${MPLAN[parseInt(ovM)]||3000}`} style={{...iSt,fontSize:13}}/>
        </Field>
        {existOv!==undefined&&<div style={{fontSize:11,color:C.warning,marginBottom:8,fontFamily:C.font}}>
          Override actual: {fUSD(existOv)} para {MES[parseInt(ovM)-1]} {ovY}
        </div>}
        <div style={{display:'flex',gap:8}}>
          <Btn onClick={()=>{if(ovAmt){onSetOverride(ovKey,parseFloat(ovAmt));setOvAmt('');}}} color={C.primary} small disabled={!ovAmt}>Guardar</Btn>
          {existOv!==undefined&&<Btn onClick={()=>{onSetOverride(ovKey,null);setOvAmt('');}} secondary color={C.danger} small>Eliminar</Btn>}
        </div>
      </div>}
      {/* Active overrides list */}
      {ovEntries.length>0&&<div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:4}}>
        {ovEntries.map(([k,v])=>(
          <span key={k} style={{fontSize:11,fontWeight:600,color:C.warning,background:C.warningL,
            padding:'3px 8px',borderRadius:12,fontFamily:C.font,cursor:'pointer'}}
            onClick={()=>{const[y,m]=k.split('-');setOvY(y);setOvM(String(parseInt(m)));setShowOv(true);}}>
            {k}: {fUSD(v)} ×
          </span>
        ))}
      </div>}
    </Card>
    {sorted.length===0?(<div style={{textAlign:'center',padding:'40px 20px'}}>
      <div style={{fontSize:40,marginBottom:12}}>💰</div>
      <div style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:C.head}}>Sin ahorros aún</div>
      <div style={{fontSize:13,color:C.sub,marginTop:4}}>Plan inicia Abril 2026</div>
    </div>):(
      <div>{sorted.map(s=>{
        const th=baseCapacity(s.year,s.month,data),diff=s.usd-th,ok=diff>=0;
        return<div key={s.id} style={{margin:'0 12px 8px',background:C.white,borderRadius:12,padding:13,border:`1px solid ${C.border}`}} className="fade-in">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div>
              {s.titulo&&<div style={{fontSize:12,fontWeight:700,color:C.primary,fontFamily:C.font,marginBottom:2}}>{s.titulo}</div>}
              <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:C.head}}>{mStr(s.year,s.month)}</div>
              <div style={{fontSize:12,color:C.sub,marginTop:1,fontFamily:C.font}}>{fLoc(s.local)} {s.moneda} · TRM {Number(s.trm).toLocaleString('es-AR')}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:19,fontWeight:700,color:ok?C.success:C.danger,fontFamily:C.head}}>{fUSD(s.usd)}</div>
              <div style={{fontSize:11,color:ok?C.success:C.danger,fontFamily:C.font}}>{diff>=0?'+':''}{fUSD(diff)} vs teórico</div>
            </div>
          </div>
          <div style={{marginBottom:8}}><Bar value={s.usd} max={Math.max(s.usd,th)} color={ok?C.success:C.warning}/><div style={{fontSize:11,color:C.sub,fontFamily:C.font,marginTop:2}}>Teórico: {fUSD(th)}</div></div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <Btn onClick={()=>onEdit(s)} small secondary color={C.primary}>Editar</Btn>
            <Btn onClick={()=>onDelete(s.id)} small secondary color={C.danger}>Eliminar</Btn>
          </div>
        </div>;
      })}</div>
    )}
    <div style={{height:8}}/>
    {/* Backup zone */}
    <div style={{margin:'0 12px 8px',padding:'13px',background:C.border2,borderRadius:12,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:C.font,marginBottom:4}}>📦 Backup de datos</div>
      <div style={{fontSize:11,color:C.sub,fontFamily:C.font,marginBottom:10,lineHeight:1.5}}>
        Exportá todos tus datos como archivo JSON. Importá para restaurar en otro dispositivo o navegador.
      </div>
      <div style={{display:'flex',gap:8}}>
        <Btn onClick={onExport} color={C.primary} small fullWidth>⬇ Exportar backup</Btn>
        <label style={{flex:1}}>
          <div style={{padding:'7px 12px',background:C.white,border:`1.5px solid ${C.primary}`,borderRadius:9,
            color:C.primary,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:C.font,textAlign:'center',lineHeight:'1.4'}}>
            ⬆ Importar backup
          </div>
          <input type="file" accept=".json" onChange={onImport} style={{display:'none'}}/>
        </label>
      </div>
    </div>
    {/* Restore deleted base props */}
    {(data.deletedBaseProps||[]).length>0&&<div style={{margin:'0 12px 8px',padding:'13px',background:C.warningL,borderRadius:12,border:`1.5px solid ${C.warning}33`}}>
      <div style={{fontSize:12,fontWeight:700,color:C.warning,fontFamily:C.font,marginBottom:6}}>↩ Propiedades eliminadas</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {(data.deletedBaseProps||[]).map(pid=>{
          const pb=PROPS_BASE.find(p=>p.id===pid);if(!pb)return null;
          return<button key={pid} onClick={()=>onRestoreProp&&onRestoreProp(pid)}
            style={{background:C.white,border:`1.5px solid ${pb.color}`,borderRadius:20,
            padding:'5px 11px',cursor:'pointer',fontSize:12,fontWeight:700,
            color:pb.color,fontFamily:C.font,display:'flex',alignItems:'center',gap:4}}>
            <span>↩</span><span>{pb.name}</span>
          </button>;
        })}
      </div>
      <div style={{fontSize:10,color:C.sub,fontFamily:C.font,marginTop:6}}>
        Tocá una propiedad para restaurarla con todos sus hitos originales
      </div>
    </div>}
    {/* Reset zone */}
    <div style={{margin:'0 12px 16px',padding:'13px',background:C.dangerL,borderRadius:12,border:`1.5px solid ${C.danger}33`}}>
      <div style={{fontSize:12,fontWeight:700,color:C.danger,fontFamily:C.font,marginBottom:4}}>⚠️ Zona de reinicio</div>
      <div style={{fontSize:11,color:C.sub,fontFamily:C.font,marginBottom:10,lineHeight:1.5}}>
        Borra ahorros, pagos manuales, planes de cuotas y overrides de capacidad. Las propiedades e hitos se conservan pero vuelven a estado inicial. Útil para empezar de cero con datos reales.
      </div>
      <Btn onClick={onReset} color={C.danger} fullWidth small>🗑️ Reiniciar — borrar todos mis datos</Btn>
    </div>
  </div>;
}

// ─── PROP CARD (usada en PropiedadesTab) ─────────
function PropCard({p,isBase,data,pIds,onChangeStatus,onEditProp,onEditHito,onAddHito,onRemoveHito,onDeleteProp,onUnmark,onSetupInstallment}){
  const removals=new Set(data.hitoRemovals||[]);
  const status=data.propStatus[p.id]||'Sin Iniciar';
  const stC={'Pagado':{c:C.success,bg:C.successL},'En Curso':{c:C.warning,bg:C.warningL},'Sin Iniciar':{c:C.danger,bg:C.dangerL}};
  const sc=stC[status]||stC['Sin Iniciar'];
  const allHitos=[
    ...(p.hitos||[]).filter(h=>h.date&&!removals.has(h.id)).map(h=>{const ho=data.hitoOverrides?.[h.id]||{};return{...h,usd:ho.usd??h.usd,date:ho.date||h.date,label:ho.label||h.label};}),
    ...(data.hitoAdditions?.[p.id]||[]).filter(h=>!removals.has(h.id)).map(h=>{const ho=data.hitoOverrides?.[h.id]||{};return{...h,usd:ho.usd??h.usd,date:ho.date||h.date,label:ho.label||h.label};})
  ].sort((a,b)=>a.date.localeCompare(b.date));
  const paidUSD=allHitos.filter(h=>pIds.has(h.id)).reduce((s,h)=>s+h.usd,0);
  const remaining=Math.max(0,p.totalUSD-paidUSD);
  return<div style={{margin:'0 12px 10px',background:C.white,borderRadius:14,border:`1.5px solid ${sc.c}33`,overflow:'hidden'}}>
    <div style={{background:p.colorL,borderBottom:`3px solid ${p.color}`,padding:'11px 13px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <div style={{fontSize:16,fontWeight:700,fontFamily:C.head,color:C.text}}>{p.name}</div>
          {!isBase&&<span style={{fontSize:10,fontWeight:700,color:p.color,background:'rgba(255,255,255,.7)',padding:'2px 7px',borderRadius:12,fontFamily:C.font}}>nueva</span>}
        </div>
        <div style={{fontSize:12,color:C.sub,fontFamily:C.font,marginTop:1}}>{p.moneda} · {fUSD(p.totalUSD)} total</div>
        {p.dreamDate&&<div style={{fontSize:10,color:C.muted,fontFamily:C.font,marginTop:1}}>
          🌱 Inicio del sueño: {(()=>{const d=pDate(p.dreamDate);return d?mStr(d.y,d.m):p.dreamDate;})()}
        </div>}
      </div>
      <div style={{display:'flex',gap:5,alignItems:'center'}}>
        <select value={status} onChange={e=>onChangeStatus(p.id,e.target.value)}
          style={{background:sc.bg,border:`1.5px solid ${sc.c}`,color:sc.c,borderRadius:20,padding:'5px 8px',fontSize:11,fontWeight:700,fontFamily:C.font,cursor:'pointer',outline:'none'}}>
          <option>Pagado</option><option>En Curso</option><option>Sin Iniciar</option>
        </select>
        <button onClick={()=>onEditProp(p.id)} style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:8,padding:'5px 8px',cursor:'pointer',fontSize:13,color:C.sub}}>✏️</button>
        <button onClick={()=>onDeleteProp(p.id)} style={{background:C.dangerL,border:`1.5px solid ${C.danger}44`,borderRadius:8,padding:'5px 8px',cursor:'pointer',fontSize:13,color:C.danger}} title={isBase?"Eliminar propiedad base":"Eliminar propiedad"}>🗑️</button>
      </div>
    </div>
    <div style={{padding:'11px 13px'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:9}}>
        {[{l:'Pagado',v:fUSD(paidUSD),c:C.success},{l:'Pendiente',v:fUSD(remaining),c:remaining>0?C.warning:C.success},
          {l:'Ingreso/mes',v:p.ingreso>0?`+${fUSD(p.ingreso)}`:'-',c:p.ingreso>0?C.success:C.sub}].map(({l,v,c})=>(
          <div key={l} style={{textAlign:'center',background:C.border2,borderRadius:8,padding:'7px 3px'}}>
            <div style={{fontSize:10,color:C.sub,fontFamily:C.font}}>{l}</div>
            <div style={{fontSize:12,fontWeight:700,color:c,fontFamily:C.head,marginTop:1}}>{v}</div>
          </div>
        ))}
      </div>
      <Bar value={paidUSD} max={p.totalUSD} color={p.color} h={7}/>

function PropiedadesTab({data,onChangeStatus,onEditProp,onEditHito,onAddHito,onRemoveHito,onDeleteProp,onNewProp,onUnmark,onSetupInstallment}){
  const pIds=new Set(Object.keys(data.paid));
  const allProps=getAllProps(data);
  const totalPortfolio=allProps.reduce((s,p)=>s+p.totalUSD,0);
  const totalIngresos=allProps.reduce((s,p)=>s+p.ingreso,0);

  // Sort props by earliest PENDING hito date (applies overrides, ignores seeded/paid)
  const removals=new Set(data.hitoRemovals||[]);
  function earliestPendingDate(p){
    const baseH=(p.hitos||[])
      .filter(h=>h.date&&!removals.has(h.id)&&!pIds.has(h.id))
      .map(h=>{const ho=data.hitoOverrides?.[h.id]||{};return ho.date||h.date;});
    const addH=(data.hitoAdditions?.[p.id]||[])
      .filter(h=>!removals.has(h.id)&&!pIds.has(h.id))
      .map(h=>{const ho=data.hitoOverrides?.[h.id]||{};return ho.date||h.date;});
    const all=[...baseH,...addH];
    return all.length?[...all].sort()[0]:'9999-99';
  }
  // Sort by "fecha de inicio del sueño" (dreamDate) so oldest property appears first
  const sortedProps=[...allProps].sort((a,b)=>(a.dreamDate||'9999').localeCompare(b.dreamDate||'9999'));
  const isBase=id=>PROPS_BASE.some(p=>p.id===id);
  return<div className="fade-in">
    <PageHeader title="Propiedades" sub={`${allProps.length} inmuebles · ${fUSD(totalPortfolio)}`}/>
    <Card style={{marginTop:12}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div><div style={{fontSize:11,color:C.sub,fontFamily:C.font}}>Portfolio total</div><div style={{fontSize:20,fontWeight:700,color:C.primary,fontFamily:C.head,marginTop:2}}>{fUSD(totalPortfolio)}</div></div>
        <div><div style={{fontSize:11,color:C.sub,fontFamily:C.font}}>Ingresos futuros/mes</div><div style={{fontSize:20,fontWeight:700,color:C.success,fontFamily:C.head,marginTop:2}}>{fUSD(totalIngresos)}</div></div>
      </div>
    </Card>
    {sortedProps.map(p=>(
      <PropCard key={p.id} p={p} isBase={isBase(p.id)} data={data} pIds={pIds}
        onChangeStatus={onChangeStatus} onEditProp={onEditProp}
        onEditHito={onEditHito} onAddHito={onAddHito}
        onRemoveHito={onRemoveHito} onDeleteProp={onDeleteProp}
        onUnmark={onUnmark} onSetupInstallment={onSetupInstallment}/>
    ))}
    {/* Nueva propiedad */}
    <div style={{padding:'4px 12px 16px'}}>
      <button onClick={onNewProp}
        style={{width:'100%',padding:'14px',background:C.white,
        border:`2px dashed ${C.primary}88`,borderRadius:14,cursor:'pointer',
        display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontFamily:C.font}}>
        <span style={{fontSize:24}}>🏠</span>
        <div style={{textAlign:'left'}}>
          <div style={{fontSize:15,fontWeight:700,color:C.primary,fontFamily:C.head}}>Nueva Propiedad</div>
          <div style={{fontSize:12,color:C.sub,marginTop:1}}>Agregá un nuevo bien al plan</div>
        </div>
      </button>
    </div>
  </div>;
}

  const allH=getAllHitos(data);

  const paidHitos=[...allH.filter(h=>pIds.has(h.id))].sort((a,b)=>a.date.localeCompare(b.date));
  const totalPend=ordPending.filter(h=>!h.rental).reduce((s,h)=>s+h.usd,0);
  const showReorder=planFilter==='pendientes'||planFilter==='todos';
  const allProps=getAllProps(data);
  const toShow=useMemo(()=>{
    if(planFilter==='pagados')return paidHitos;
    if(planFilter==='pendientes')return ordPending;
    if(planFilter!=='todos')return[...paidHitos.filter(h=>h.propId===planFilter),...ordPending.filter(h=>h.propId===planFilter)];

    <PageHeader title="Plan de Pagos" sub={`${pIds.size} pagados · ${fUSD(totalPend)} pendiente`}/>
    <div style={{padding:'8px 12px 2px',overflowX:'auto',display:'flex',gap:6,WebkitOverflowScrolling:'touch',scrollbarWidth:'none'}}>
      {[{k:'todos',l:'Todos'},{k:'pagados',l:'Pagados'},{k:'pendientes',l:'Pendientes ↕'},

        <button key={f.k} onClick={()=>setPlanFilter(f.k)}
          style={{padding:'6px 11px',borderRadius:20,flexShrink:0,
          border:`1.5px solid ${planFilter===f.k?(f.color||C.primary):C.border}`,
          background:planFilter===f.k?(f.color||C.primary):C.white,
          color:planFilter===f.k?'#fff':C.sub,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:C.font,whiteSpace:'nowrap'}}>
          {f.l}

    <div style={{padding:'4px 12px 6px',display:'flex',gap:12,fontSize:11,color:C.muted,fontFamily:C.font}}>

        const instPlan=isInstHito?(data.installmentPlans||[]).find(p=>p.hitoId===h.id&&p.status!=='cancelled'):null;

        const{y:py,m:pm}=planDt||{y:0,m:0};
        // FIX: use metrics.nextHito (excludes installment hitos) not ordPending[0]
        const isFirst=!paid&&metrics.nextHito?.id===h.id;
        const seeded=data.paid[h.id]?.seeded;
        const pendIdx=ordPending.findIndex(x=>x.id===h.id);
        return<div key={h.id} className="fade-in"
          style={{margin:'0 12px 7px',background:C.white,borderRadius:12,
          border:`1.5px solid ${paid?h.color+'33':isFirst?h.color:isInstHito?C.primary+'44':C.border}`,opacity:seeded?.65:1}}>
          <div style={{padding:'11px 13px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>

                  <div style={{width:8,height:8,borderRadius:4,background:h.color}}/>

                  {isFirst&&!paid&&<span style={{fontSize:10,fontWeight:700,color:C.primary,background:C.primaryL,padding:'2px 7px',borderRadius:20,fontFamily:C.font}}>Próximo</span>}
                  {isInstHito&&<span style={{fontSize:10,fontWeight:700,color:'#0369a1',background:'#e0f2fe',padding:'2px 7px',borderRadius:20,fontFamily:C.font}}>📅 En cuotas</span>}
                  {h.rental&&!paid&&<span style={{fontSize:10,fontWeight:600,color:C.muted,background:C.border2,padding:'2px 7px',borderRadius:20,fontFamily:C.font}}>Por renta</span>}

                </div>

                  <span>📅 {mStr(py,pm)}</span>

              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  {!paid&&!isInstHito&&<button onClick={()=>onEditHitoFromPlan(h)} style={{background:C.border2,border:`1px solid ${C.border}`,borderRadius:6,padding:'3px 7px',cursor:'pointer',fontSize:12,color:C.sub}}>✏️</button>}
                  <div style={{fontSize:19,fontWeight:700,fontFamily:C.head,color:paid?C.success:isFirst?h.color:isInstHito?'#0369a1':C.text}}>{fUSD(h.usd)}</div>
                </div>
                {!paid&&!isInstHito&&showReorder&&pendIdx>=0&&(
                  <div style={{display:'flex',gap:3}}>
                    {['up','down'].map(dir=>{
                      const can=dir==='up'?pendIdx>0:pendIdx<ordPending.length-1;

          </div>
        </div>;
      })}    </div>

// ─── TAB PROYECCIÓN ──────────────────────────────
function ProyeccionTab({data,metrics}){
  const{realTotal,thTotal,savGap,comp,nY,nM,pIds}=metrics;
  const pending=getAllHitos(data).filter(h=>!pIds.has(h.id)&&!h.rental);
  const chartPts=useMemo(()=>{
    const pts=[];let tC=0,rC=0;
    for(let y=2026;y<=2042;y++){for(let m=(y===2026?4:1);m<=12;m++){
      tC+=mSav(y,m);const e=data.savings.find(s=>s.year===y&&s.month===m);if(e)rC+=e.usd;
      const isReal=(y<nY||(y===nY&&m<=nM));pts.push({y,m,tC,rC:isReal?rC:null});
    }}return pts;
  },[data,nY,nM]);
  const maxV=Math.max(...chartPts.map(p=>p.tC),1);
  const W=950,H=180,ML=40,MB=20,MT=8,MR=8,PW=W-ML-MR,PH=H-MB-MT;
  const xOf=(y,m)=>ML+((y-2026)*12+(m-4))*(PW/((2042-2026)*12+9));
  const yOf=v=>MT+PH-(v/maxV)*PH;
  const tPath=chartPts.map((p,i)=>`${i===0?'M':'L'}${xOf(p.y,p.m).toFixed(1)},${yOf(p.tC).toFixed(1)}`).join(' ');
  const rPts=chartPts.filter(p=>p.rC!=null);
  const rPath=rPts.map((p,i)=>`${i===0?'M':'L'}${xOf(p.y,p.m).toFixed(1)},${yOf(p.rC).toFixed(1)}`).join(' ');
  const compDelay=comp?mDiff(2039,6,comp.y,comp.m):0;
  const allPropsM=getAllProps(data);
  return<div className="fade-in">
    <PageHeader title="Proyección" sub="Ahorro real vs teórico"/>
    <Card style={{marginTop:12,padding:'13px 0 8px'}}>
      <div style={{padding:'0 13px 8px',fontSize:10,color:C.sub,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',fontFamily:C.font}}>Curva acumulada USD</div>
      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <svg width={W} height={H+4} style={{display:'block'}}>
          {[0,.25,.5,.75,1].map(f=>{const v=maxV*f,y2=yOf(v);return<g key={f}><line x1={ML} y1={y2} x2={W-MR} y2={y2} stroke={C.border} strokeWidth={1}/><text x={ML-3} y={y2+4} fill={C.sub} fontSize={8} textAnchor="end" fontFamily="Inter">{v>=1000?`${Math.round(v/1000)}K`:'0'}</text></g>;})}
          {[2026,2028,2030,2032,2034,2036,2038,2040,2042].map(yr=><g key={yr}><line x1={xOf(yr,4)} y1={MT} x2={xOf(yr,4)} y2={MT+PH} stroke={C.border2} strokeWidth={1}/><text x={xOf(yr,4)} y={H} fill={C.sub} fontSize={9} textAnchor="middle" fontFamily="Inter">{yr}</text></g>)}
          {pending.slice(0,15).map(h=>{const d=pDate(h.date);if(!d||d.y>2042)return null;return<line key={h.id} x1={xOf(d.y,d.m)} y1={MT} x2={xOf(d.y,d.m)} y2={MT+PH} stroke={C.warning} strokeWidth={1} strokeDasharray="3,3" opacity={.4}/>;
          })}
          <path d={tPath} fill="none" stroke={C.muted} strokeWidth={1.5} strokeDasharray="5,3"/>
          {rPath&&<path d={rPath} fill="none" stroke={C.success} strokeWidth={2.5}/>}
          {rPts.map(p=><circle key={`${p.y}-${p.m}`} cx={xOf(p.y,p.m)} cy={yOf(p.rC)} r={3} fill={C.success} stroke={C.white} strokeWidth={1.5}/>)}
        </svg>
      </div>
      <div style={{display:'flex',gap:14,padding:'4px 13px',flexWrap:'wrap'}}>
        {[{c:C.muted,dash:true,l:'Teórico'},{c:C.success,l:'Real'},{c:C.warning,dash:true,l:'Pagos'}].map(({c,dash,l})=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
            <svg width={20} height={10}><line x1={0} y1={5} x2={20} y2={5} stroke={c} strokeWidth={dash?1.5:2.5} strokeDasharray={dash?'4,3':undefined}/></svg>
            <span style={{fontSize:11,color:C.sub,fontFamily:C.font}}>{l}</span>
          </div>
        ))}
      </div>
    </Card>
    <Card>
      {[{l:'Ahorrado real',v:fUSD(realTotal),c:C.success,b:true},{l:'Teórico a la fecha',v:fUSD(thTotal),c:C.sub},
        {l:'Diferencia',v:(savGap>=0?'+':'')+fUSD(savGap),c:savGap>=0?C.success:C.danger,b:true},
        {l:'Portfolio total',v:fUSD(allPropsM.reduce((s,p)=>s+p.totalUSD,0)),c:C.text},
        {l:'Fin base plan',v:'Jun 2039',c:C.sub},{l:'Fin estimado',v:comp?mStr(comp.y,comp.m):'—',c:compDelay>0?C.warning:C.success},
        {l:'Delay total',v:compDelay>0?`+${compDelay}m`:compDelay<0?`${Math.abs(compDelay)}m adelantado`:'Sin delay',c:compDelay>0?C.warning:C.success,b:true},
      ].map(({l,v,c,b})=><StatRow key={l} label={l} value={v} color={c} bold={b}/>)}
    </Card>
    <div style={{height:8}}/>
  </div>;
}

function NewPropModal({form,setForm,onSave,onClose}){

  const hitoTotal=(form.hitos||[]).reduce((s,h)=>s+parseFloat(h.usd||0),0);
  const addHitoRow=()=>setForm(f=>({...f,hitos:[...(f.hitos||[]),{label:'',usd:'',date:'',_k:Date.now()}]}));
  const removeHitoRow=i=>setForm(f=>({...f,hitos:(f.hitos||[]).filter((_,j)=>j!==i)}));
  const updateHitoRow=(i,field,val)=>setForm(f=>({...f,hitos:(f.hitos||[]).map((h,j)=>j===i?{...h,[field]:val}:h)}));
  const valid=form.name&&form.totalUSD&&(form.hitos||[]).length>0&&(form.hitos||[]).every(h=>h.label&&h.usd&&h.date);
  return<Overlay onClose={onClose}>
    <MH title="Nueva Propiedad" onClose={onClose}/>

    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <Field label="Nombre">
        <input type="text" value={form.name||''} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Ej: Apartamento Patio" style={iSt}/>
      </Field>
      <Field label="Moneda">
        <select value={form.moneda||'COP'} onChange={e=>setForm(f=>({...f,moneda:e.target.value}))} style={iSt}>
          <option value="COP">COP</option><option value="ARS">ARS</option><option value="USD">USD</option>
        </select>
      </Field>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <Field label="Valor total (USD)">
        <input type="number" value={form.totalUSD||''} onChange={e=>setForm(f=>({...f,totalUSD:e.target.value}))} placeholder="80000" style={iSt}/>
      </Field>
      <Field label="Ingreso mensual (USD)">
        <input type="number" value={form.ingreso||''} onChange={e=>setForm(f=>({...f,ingreso:e.target.value}))} placeholder="0" style={iSt}/>
      </Field>
    </div>
    <Field label="🌱 Inicio del sueño (AAAA-MM)" sub="Cuándo decidiste perseguir esta propiedad — determina el orden de aparición">
      <input type="text" value={form.dreamDate||''} onChange={e=>setForm(f=>({...f,dreamDate:e.target.value}))}
        placeholder="2026-01" style={iSt}/>
    </Field>
    <Field label="Comentario (opcional)">
      <input type="text" value={form.comentario||''} onChange={e=>setForm(f=>({...f,comentario:e.target.value}))} placeholder="Notas sobre esta propiedad" style={iSt}/>
    </Field>
    <Field label="Color de identificación">
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:6}}>
        {PROP_COLORS.map(c=>(
          <button key={c.c} onClick={()=>setForm(f=>({...f,color:c.c,colorL:c.l}))}
            style={{width:'100%',aspectRatio:'1',borderRadius:10,background:c.l,border:`2.5px solid ${form.color===c.c?c.c:'transparent'}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{width:14,height:14,borderRadius:7,background:c.c}}/>

    </div>

}

function SavingModal({form,setForm,data,onSave,onClose,isEdit}){
  const local=parseFloat(String(form.local||'').replace(/[.,\s]/g,''))||0;
  const trm=parseFloat(form.trm)||1500,usd=trm>0?local/trm:0;
  const th=form.year&&form.month?baseCapacity(parseInt(form.year),parseInt(form.month),data):0,diff=usd-th;
  return<Overlay onClose={onClose}>
    <MH title={isEdit?'Editar Ahorro':'Registrar Ahorro'} onClose={onClose}/>
    <Field label="Título (opcional)"><input type="text" value={form.titulo||''} onChange={e=>setForm(f=>({...f,titulo:e.target.value}))} placeholder="Ej: Sueldo, Prima, Bono..." style={iSt}/></Field>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <Field label="Año"><select value={form.year||''} onChange={e=>setForm(f=>({...f,year:e.target.value}))} style={iSt}><option value="">Año</option>{Array.from({length:20},(_,i)=>2020+i).map(y=><option key={y} value={y}>{y}</option>)}</select></Field>
      <Field label="Mes"><select value={form.month||''} onChange={e=>setForm(f=>({...f,month:e.target.value}))} style={iSt}><option value="">Mes</option>{MES.map((n,i)=><option key={i+1} value={i+1}>{n}</option>)}</select></Field>
    </div>
    <Field label="Moneda"><select value={form.moneda||'ARS'} onChange={e=>setForm(f=>({...f,moneda:e.target.value,trm:e.target.value==='COP'?String(data.trm_cop):String(data.trm_ars)}))} style={iSt}><option value="ARS">Pesos Argentinos (ARS)</option><option value="COP">Pesos Colombianos (COP)</option></select></Field>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <Field label={`Monto (${form.moneda||'ARS'})`}><input type="number" value={form.local||''} onChange={e=>setForm(f=>({...f,local:e.target.value}))} placeholder="0" style={iSt}/></Field>
      <Field label="TRM (por USD)"><input type="number" value={form.trm||''} onChange={e=>setForm(f=>({...f,trm:e.target.value}))} placeholder="1500" style={iSt}/></Field>
    </div>
    {usd>0&&<div style={{background:'#f8fafc',borderRadius:10,padding:12,marginBottom:13}}>
      <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:13,color:C.sub,fontFamily:C.font}}>Equivalente USD</span><span style={{fontSize:20,fontWeight:700,color:C.primary,fontFamily:C.head}}>{fUSD(usd)}</span></div>
      {th>0&&<div style={{marginTop:6,paddingTop:6,borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',fontSize:13,fontFamily:C.font}}>
        <span style={{color:C.sub}}>Teórico del mes</span><span style={{fontWeight:700,color:diff>=0?C.success:C.danger}}>{fUSD(th)} · {diff>=0?'+':''}{fUSD(diff)}</span>
      </div>}
    </div>}
    <Btn onClick={onSave} fullWidth disabled={!form.year||!form.month||!form.local}>{isEdit?'Actualizar':'Guardar Ahorro'}</Btn>
  </Overlay>;
}

  return<Overlay onClose={onClose}>
    <MH title="Pagar en cuotas" onClose={onClose}/>

    </Field>

        placeholder="29" style={iSt}/>
    </Field>
    <Field label="Fecha inicio (AAAA-MM)" sub="Primer mes en que pagás la cuota">
      <input type="text" value={form.startDate||''} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))}
        placeholder="2029-03" style={iSt}/>
    </Field>
    {months>0&&totalUSD>0&&(
      <div style={{background:C.border2,borderRadius:10,padding:'12px',marginBottom:14}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,textAlign:'center'}}>
          <div>
            <div style={{fontSize:10,color:C.sub,fontFamily:C.font}}>Cuota mensual</div>
            <div style={{fontSize:17,fontWeight:700,color:C.primary,fontFamily:C.head,marginTop:2}}>{fUSD(perMonth)}</div>
          </div>
          <div style={{borderLeft:`1px solid ${C.border}`,borderRight:`1px solid ${C.border}`}}>
            <div style={{fontSize:10,color:C.sub,fontFamily:C.font}}>Meses</div>
            <div style={{fontSize:17,fontWeight:700,color:C.text,fontFamily:C.head,marginTop:2}}>{months}</div>
          </div>
          <div>
            <div style={{fontSize:10,color:C.sub,fontFamily:C.font}}>Total</div>
            <div style={{fontSize:17,fontWeight:700,color:C.text,fontFamily:C.head,marginTop:2}}>{fUSD(perMonth*months)}</div>
          </div>
        </div>
      </div>
    )}
    <Btn onClick={onSave} fullWidth disabled={!form.months||!form.startDate||!totalUSD}
      color={propBase.color}>📅 Activar plan de cuotas</Btn>
  </Overlay>;
}

function InstallmentManageModal({plan,onAction,onClose}){
  if(!plan)return null;
  const[editing,setEditing]=React.useState(false);
  const[editForm,setEditForm]=React.useState({
    amountPerMonth:String(plan.amountPerMonth),
    totalMonths:String(plan.totalMonths),
    startDate:plan.startDate,
  });
  const paid=paidMonthsCount(plan);
  const remaining=plan.totalMonths-paid;
  const isComplete=planIsComplete(plan);
  // Compute end date
  const{y:sy,m:sm}=pDate(plan.startDate);
  const endDt=addM(sy,sm,plan.totalMonths-1);
  const endDate=`${MES[endDt.m-1]} ${endDt.y}`;
  const newTotal=parseInt(editForm.totalMonths)||plan.totalMonths;
  const newAmt=parseFloat(editForm.amountPerMonth)||plan.amountPerMonth;
  const newEnd=(()=>{const{y:sy2,m:sm2}=pDate(editForm.startDate||plan.startDate);const e=addM(sy2,sm2,newTotal-1);return`${MES[e.m-1]} ${e.y}`;})();
  return<Overlay onClose={onClose}>
    <MH title="Gestionar plan de cuotas" onClose={onClose}/>
    {/* Summary */}
    <div style={{background:C.primaryL,borderRadius:10,padding:'12px',marginBottom:12}}>
      <div style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:C.head}}>{plan.propName} · {plan.label}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:8}}>
        {[
          {l:'Cuota mensual',v:fUSD(plan.amountPerMonth)},
          {l:'Total cuotas',v:`${plan.totalMonths} meses`},
          {l:'Inicio',v:`${MES[(pDate(plan.startDate).m)-1]} ${pDate(plan.startDate).y}`},
          {l:'Fin previsto',v:endDate},
          {l:'Pagadas',v:`${paid} de ${plan.totalMonths}`},
          {l:'Faltan',v:`${remaining} meses`},
        ].map(({l,v})=>(
          <div key={l} style={{background:C.white,borderRadius:7,padding:'7px 9px'}}>
            <div style={{fontSize:10,color:C.sub,fontFamily:C.font}}>{l}</div>
            <div style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:C.font,marginTop:1}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{marginTop:8}}>
        <Bar value={paid} max={plan.totalMonths}
          color={plan.status==='paused'?C.warning:isComplete?C.success:C.primary} h={6}/>
        <div style={{fontSize:10,color:C.sub,fontFamily:C.font,marginTop:3,textAlign:'right'}}>
          {plan.totalMonths>0?((paid/plan.totalMonths)*100).toFixed(0):0}% completado
        </div>
      </div>
      {plan.status==='paused'&&<div style={{fontSize:12,color:C.warning,fontWeight:700,marginTop:4}}>⏸ Plan pausado</div>}
      {isComplete&&<div style={{fontSize:12,color:C.success,fontWeight:700,marginTop:4}}>✓ Plan completado</div>}
    </div>

    {/* Edit section */}
    {!isComplete&&(
      <div style={{marginBottom:12}}>
        <button onClick={()=>setEditing(!editing)}
          style={{width:'100%',padding:'9px',background:C.border2,border:`1px solid ${C.border}`,
          borderRadius:9,color:C.primary,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:C.font}}>
          ✏️ {editing?'Cancelar edición':'Editar plan (cuotas, meses, fecha inicio)'}
        </button>
        {editing&&(
          <div style={{background:'#f8fafc',borderRadius:10,padding:'12px',marginTop:8,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:10,color:C.sub,fontWeight:700,textTransform:'uppercase',letterSpacing:.7,marginBottom:10,fontFamily:C.font}}>
              Editar plan — los meses ya confirmados se mantienen
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <Field label="Cuota mensual (USD)">
                <input type="number" value={editForm.amountPerMonth} onChange={e=>setEditForm(f=>({...f,amountPerMonth:e.target.value}))} style={{...iSt,fontSize:13}}/>
              </Field>
              <Field label="Total de meses">
                <input type="number" value={editForm.totalMonths} onChange={e=>setEditForm(f=>({...f,totalMonths:e.target.value}))} style={{...iSt,fontSize:13}}/>
              </Field>
            </div>
            <Field label="Fecha de inicio (AAAA-MM)">
              <input type="text" value={editForm.startDate} onChange={e=>setEditForm(f=>({...f,startDate:e.target.value}))} style={{...iSt,fontSize:13}}/>
            </Field>
            {editForm.startDate&&newTotal>0&&(
              <div style={{background:C.primaryL,borderRadius:7,padding:'8px 10px',marginTop:4,fontSize:12,fontFamily:C.font,color:C.primary}}>
                Nueva cuota: {fUSD(newAmt)}/mes · Fin previsto: {newEnd} · Total: {fUSD(newAmt*newTotal)}
              </div>
            )}
            <div style={{marginTop:10}}>
              <Btn onClick={()=>onAction('edit',editForm)} color={C.primary} fullWidth>
                Guardar cambios
              </Btn>
            </div>
          </div>
        )}
      </div>
    )}

    {/* Confirmed months */}
    {(plan.paidMonths||[]).length>0&&(
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,color:C.sub,fontWeight:700,textTransform:'uppercase',letterSpacing:.7,marginBottom:6,fontFamily:C.font}}>
          Cuotas confirmadas ({paid})
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
          {[...(plan.paidMonths||[])].sort().map(ym=>(
            <div key={ym} style={{display:'flex',alignItems:'center',gap:3}}>
              <span style={{fontSize:11,fontWeight:600,color:C.success,background:C.successL,
                padding:'3px 8px',borderRadius:12,fontFamily:C.font}}>{ym}</span>
              <button onClick={()=>onAction('unconfirm',ym)}
                style={{background:C.warningL,border:`1px solid ${C.warning}44`,borderRadius:8,
                padding:'2px 5px',cursor:'pointer',fontSize:10,color:C.warning,fontFamily:C.font,
                lineHeight:1}}>↩</button>
            </div>
          ))}
        </div>
        <div style={{fontSize:10,color:C.muted,fontFamily:C.font,marginTop:4}}>↩ para revertir una cuota confirmada por error</div>
      </div>
    )}

    {/* Actions */}
    {!isComplete&&(
      <div style={{display:'flex',flexDirection:'column',gap:7}}>
        {plan.status==='active'?(
          <Btn onClick={()=>onAction('pause')} fullWidth secondary color={C.warning}>
            ⏸ Pausar — deja de descontar de mi capacidad mensual
          </Btn>
        ):(
          <Btn onClick={()=>onAction('resume')} fullWidth color={C.primary}>
            ▶ Reactivar plan

        <Btn onClick={()=>onAction('cancel')} fullWidth secondary color={C.danger}>
          ✕ Cancelar — el hito vuelve a la cola normal

    {isComplete&&(
      <div style={{background:C.successL,borderRadius:10,padding:'12px',textAlign:'center',
        fontSize:13,fontWeight:700,color:C.success,fontFamily:C.font}}>
        ✓ Plan completado — hito marcado como pagado automáticamente
      </div>
    )}
  </Overlay>;
}

// ─── TAB HISTORIAL ───────────────────────────────
function HistorialTab({data,metrics}){
  const{pIds,nY,nM}=metrics;
  const allH=getAllHitos(data);
  const allProps=getAllProps(data);
  const propMap=Object.fromEntries(allProps.map(p=>[p.id,p]));

  // Build timeline events
  const events=[];
  // 1. Savings
  data.savings.forEach(s=>{
    events.push({type:'saving',date:`${s.year}-${String(s.month).padStart(2,'0')}`,
      year:s.year,month:s.month,amount:s.usd,local:s.local,moneda:s.moneda,
      titulo:s.titulo||'Ahorro mensual',color:C.success,icon:'💰'});
  });
  // 2. Paid hitos
  allH.forEach(h=>{
    const p=data.paid[h.id];
    if(!p)return;
    const d=p.date?pDate(p.date):pDate(h.date);
    if(!d)return;
    events.push({type:'payment',date:`${d.y}-${String(d.m).padStart(2,'0')}`,
      year:d.y,month:d.m,amount:p.amount_usd||h.usd,
      label:h.label,propName:h.propName,color:h.color,seeded:p.seeded,icon:'✅'});
  });
  // 3. Installment confirmed months
  (data.installmentPlans||[]).filter(p=>p.status!=='cancelled').forEach(plan=>{
    (plan.paidMonths||[]).forEach(ym=>{
      const d=pDate(ym);if(!d)return;
      events.push({type:'cuota',date:ym,year:d.y,month:d.m,
        amount:plan.amountPerMonth,label:`Cuota ${plan.label}`,
        propName:plan.propName,color:C.primary,icon:'📅'});
    });
  });
  // 4. Dream starts (prop creation)
  allProps.forEach(p=>{
    if(!p.dreamDate)return;
    const d=pDate(p.dreamDate);if(!d)return;
    events.push({type:'dream',date:p.dreamDate,year:d.y,month:d.m,
      label:`Inicio del sueño: ${p.name}`,propName:p.name,
      color:p.color,icon:'🌱',amount:0});
  });

  const sorted=[...events].sort((a,b)=>a.date.localeCompare(b.date));
  
  // Group by year-month
  const groups={};
  sorted.forEach(e=>{
    const k=`${e.year}-${String(e.month).padStart(2,'0')}`;
    if(!groups[k])groups[k]=[];
    groups[k].push(e);
  });
  const groupKeys=Object.keys(groups).sort();

  // Monthly totals
  const monthSavings={};
  data.savings.forEach(s=>{
    const k=`${s.year}-${String(s.month).padStart(2,'0')}`;
    monthSavings[k]=(monthSavings[k]||0)+s.usd;
  });

  if(!metrics||!data)return null;
  return<div className="fade-in">
    <PageHeader title="Mi Historial" sub={`${sorted.filter(e=>e.type!=='dream').length} eventos registrados`}/>
    {groupKeys.length===0?(
      <div style={{textAlign:'center',padding:'60px 20px'}}>
        <div style={{fontSize:40,marginBottom:12}}>📖</div>
        <div style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:C.head}}>Historial vacío</div>
        <div style={{fontSize:13,color:C.sub,marginTop:6}}>Registrá ahorros y pagos para ver tu historia aquí</div>
      </div>
    ):(
      <div style={{padding:'12px 12px 8px'}}>
        {groupKeys.map(k=>{
          const[y,m]=k.split('-').map(Number);
          const evs=groups[k];
          const isNow=y===nY&&m===nM;
          const totalIn=evs.filter(e=>e.type==='saving').reduce((s,e)=>s+e.amount,0);
          const totalOut=evs.filter(e=>e.type==='payment'&&!e.seeded).reduce((s,e)=>s+e.amount,0);
          const totalCuotas=evs.filter(e=>e.type==='cuota').reduce((s,e)=>s+e.amount,0);
          return<div key={k} style={{marginBottom:16}}>
            {/* Month header */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
              marginBottom:8,paddingBottom:6,borderBottom:`2px solid ${isNow?C.primary:C.border}`}}>
              <div style={{fontSize:14,fontWeight:700,color:isNow?C.primary:C.text,fontFamily:C.head,display:'flex',gap:6,alignItems:'center'}}>
                {isNow&&<span style={{fontSize:10,background:C.primary,color:'#fff',padding:'2px 6px',borderRadius:10,fontFamily:C.font}}>HOY</span>}
                {MES_FULL[m-1]} {y}
              </div>
              {(totalIn>0||totalOut>0||totalCuotas>0)&&(
                <div style={{fontSize:11,fontFamily:C.font,display:'flex',gap:8}}>
                  {totalIn>0&&<span style={{color:C.success,fontWeight:700}}>+{fUSD(totalIn)}</span>}
                  {totalOut>0&&<span style={{color:C.danger,fontWeight:700}}>-{fUSD(totalOut)}</span>}
                  {totalCuotas>0&&<span style={{color:C.primary,fontWeight:700}}>~{fUSD(totalCuotas)}</span>}
                </div>
              )}
            </div>
            {/* Events */}
            {evs.map((e,i)=>(
              <div key={i} style={{display:'flex',gap:10,marginBottom:8,
                background:C.white,borderRadius:10,padding:'9px 11px',
                border:`1px solid ${C.border}`,
                borderLeft:`3px solid ${e.color}`}}>
                <span style={{fontSize:18,flexShrink:0,lineHeight:1.3}}>{e.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:C.font}}>
                    {e.titulo||e.label}
                    {e.seeded&&<span style={{fontSize:10,color:C.muted,marginLeft:6,fontWeight:400}}>histórico</span>}
                  </div>
                  {e.propName&&<div style={{fontSize:11,color:C.sub,fontFamily:C.font,marginTop:1}}>{e.propName}</div>}
                  {e.type==='saving'&&e.local>0&&<div style={{fontSize:11,color:C.muted,fontFamily:C.font}}>
                    {fLoc(e.local)} {e.moneda}
                  </div>}
                </div>
                {e.amount>0&&<div style={{fontSize:14,fontWeight:700,color:e.type==='payment'?C.danger:e.type==='cuota'?C.primary:C.success,fontFamily:C.head,flexShrink:0}}>
                  {e.type==='saving'?'+':e.type==='dream'?'':'-'}{e.type!=='dream'?fUSD(e.amount):''}
                </div>}
              </div>
            ))}
          </div>;
        })}
      </div>
    )}
    <div style={{height:8}}/>
  </div>;
}


// ─── TAB ESCENARIOS ──────────────────────────────
function EscenariosTab({data,metrics}){
  const{realBalance,nY,nM,comp}=metrics;
  const[extraMonthly,setExtraMonthly]=useState('0');
  const[extraMonths,setExtraMonths]=useState('3');
  const[oneTime,setOneTime]=useState('0');

  const extra=parseFloat(extraMonthly)||0;
  const nExtra=parseInt(extraMonths)||0;
  const extra1=parseFloat(oneTime)||0;

  // Scenario projection: same as computePaymentDates but with extra savings
  const scenarioDates=useMemo(()=>{
    const ordPending=getOrderedPending(data);
    const installmentHitoIds=new Set(
      (data.installmentPlans||[]).filter(p=>p.status!=='cancelled').map(p=>p.hitoId)
    );
    const curMonthSaved=data.savings.filter(s=>s.year===nY&&s.month===nM).reduce((s,e)=>s+e.usd,0);
    const curMonthRem=Math.max(0,mSavEffective(nY,nM,data)-curMonthSaved);
    let bal=realBalance+curMonthRem+extra1;
    let cy=nY,cm=nM;
    const result={};
    const queue=ordPending.filter(h=>!h.rental&&!installmentHitoIds.has(h.id));
    let it=0;
    while(queue.length>0&&it++<1000){
      const r=addM(cy,cm,1);cy=r.y;cm=r.m;
      const moN=mDiff(nY,nM,cy,cm);
      const bonusThis=moN<=nExtra?extra:0;
      bal+=mSavEffective(cy,cm,data)+bonusThis;
      while(queue.length>0&&bal>=queue[0].usd){const h=queue.shift();bal-=h.usd;result[h.id]={y:cy,m:cm};}
    }
    return result;
  },[data,realBalance,nY,nM,extra,nExtra,extra1]);

  // Base dates (no extra)
  const baseDates=useMemo(()=>{
    const ordPending=getOrderedPending(data);
    const installmentHitoIds=new Set(
      (data.installmentPlans||[]).filter(p=>p.status!=='cancelled').map(p=>p.hitoId)
    );
    const curMonthSaved=data.savings.filter(s=>s.year===nY&&s.month===nM).reduce((s,e)=>s+e.usd,0);
    const curMonthRem=Math.max(0,mSavEffective(nY,nM,data)-curMonthSaved);
    let bal=realBalance+curMonthRem;
    let cy=nY,cm=nM;
    const result={};
    const queue=ordPending.filter(h=>!h.rental&&!installmentHitoIds.has(h.id));
    let it=0;
    while(queue.length>0&&it++<1000){
      const r=addM(cy,cm,1);cy=r.y;cm=r.m;
      bal+=mSavEffective(cy,cm,data);
      while(queue.length>0&&bal>=queue[0].usd){const h=queue.shift();bal-=h.usd;result[h.id]={y:cy,m:cm};}
    }
    return result;
  },[data,realBalance,nY,nM]);

  const pendHitos=useMemo(()=>{
    const instIds=new Set((data.installmentPlans||[]).filter(p=>p.status!=='cancelled').map(p=>p.hitoId));
    return getOrderedPending(data).filter(h=>!h.rental&&!instIds.has(h.id));
  },[data]);

  const hasScenario=extra>0||extra1>0;

  // Scenario completion
  const scenComp=useMemo(()=>{
    if(pendHitos.length===0)return null;
    const last=pendHitos[pendHitos.length-1];
    return scenarioDates[last.id]||null;
  },[pendHitos,scenarioDates]);
  const baseComp=useMemo(()=>{
    if(pendHitos.length===0)return null;
    const last=pendHitos[pendHitos.length-1];
    return baseDates[last.id]||null;
  },[pendHitos,baseDates]);

  const saving=baseComp&&scenComp?mDiff(scenComp.y,scenComp.m,baseComp.y,baseComp.m):0;

  if(!metrics||!data)return null;
  return<div className="fade-in">
    <PageHeader title="Escenarios" sub="¿Qué pasa si ahorro más?"/>
    <Card style={{marginTop:12}}>
      <div style={{fontSize:10,color:C.sub,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',marginBottom:12,fontFamily:C.font}}>
        Simular ahorro adicional
      </div>
      <Field label="Ahorro extra por mes (USD)" sub="Adicional a tu capacidad actual">
        <input type="number" value={extraMonthly} onChange={e=>setExtraMonthly(e.target.value)} placeholder="0" style={iSt}/>
      </Field>
      <Field label="Por cuántos meses" sub="Ej: 3 meses de bonos, 6 meses de ahorro extra...">
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,marginBottom:6}}>
          {[3,6,12,24,'∞'].map(v=>(
            <button key={v} onClick={()=>setExtraMonths(v==='∞'?'999':String(v))}
              style={{padding:'8px 4px',borderRadius:8,border:`1.5px solid ${(v==='∞'?nExtra>=999:nExtra===v)?C.primary:C.border}`,
              background:(v==='∞'?nExtra>=999:nExtra===v)?C.primaryL:C.white,
              color:(v==='∞'?nExtra>=999:nExtra===v)?C.primary:C.sub,
              fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:C.font}}>
              {v}{v!=='∞'&&'m'}
            </button>
          ))}
        </div>
        <input type="number" value={extraMonths} onChange={e=>setExtraMonths(e.target.value)} placeholder="3" style={{...iSt,fontSize:13}}/>
      </Field>
      <Field label="Pago único ahora (USD)" sub="Ej: venta de un activo, herencia, bono especial">
        <input type="number" value={oneTime} onChange={e=>setOneTime(e.target.value)} placeholder="0" style={iSt}/>
      </Field>
      {hasScenario&&saving>0&&(
        <div style={{background:C.successL,borderRadius:10,padding:'12px',display:'flex',justifyContent:'space-between',alignItems:'center',border:`1.5px solid ${C.success}33`}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:C.success,fontFamily:C.font}}>✅ Te ahorrás {saving} meses</div>
            <div style={{fontSize:11,color:C.sub,fontFamily:C.font,marginTop:2}}>
              Base: {baseComp?mStr(baseComp.y,baseComp.m):'—'} → Escenario: {scenComp?mStr(scenComp.y,scenComp.m):'—'}
            </div>
          </div>
          <div style={{fontSize:24,fontWeight:700,color:C.success,fontFamily:C.head}}>{saving}m</div>
        </div>
      )}
      {hasScenario&&saving===0&&(
        <div style={{background:C.border2,borderRadius:10,padding:'12px',fontSize:13,color:C.sub,fontFamily:C.font}}>
          Con este escenario la fecha de finalización no cambia significativamente.
        </div>
      )}
    </Card>

    {pendHitos.length>0&&(
      <Card>
        <div style={{fontSize:10,color:C.sub,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',marginBottom:10,fontFamily:C.font}}>
          Impacto en cada hito {hasScenario?'· Escenario vs Base':'· Fechas proyectadas base'}
        </div>
        {pendHitos.slice(0,12).map(h=>{
          const base=baseDates[h.id],scen=scenarioDates[h.id];
          const diff=base&&scen?mDiff(scen.y,scen.m,base.y,base.m):0;
          return<div key={h.id} style={{padding:'9px 0',borderBottom:`1px solid ${C.border2}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                <div style={{width:7,height:7,borderRadius:3.5,background:h.color,flexShrink:0}}/>
                <span style={{fontSize:11,color:C.sub,fontFamily:C.font}}>{h.propName}</span>
              </div>
              <div style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:C.font}}>{h.label}</div>
              <div style={{fontSize:11,color:C.sub,fontFamily:C.font,marginTop:1}}>
                Base: {base?mStr(base.y,base.m):'—'}
                {hasScenario&&scen&&<span style={{marginLeft:8,color:diff>0?C.success:C.sub,fontWeight:diff>0?700:400}}>
                  → {mStr(scen.y,scen.m)}{diff>0?<span style={{color:C.success}}> ({diff}m antes)</span>:null}
                </span>}
              </div>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:C.head,flexShrink:0}}>{fUSD(h.usd)}</div>
          </div>;
        })}
        {pendHitos.length>12&&<div style={{fontSize:11,color:C.muted,fontFamily:C.font,textAlign:'center',paddingTop:6}}>
          +{pendHitos.length-12} hitos más
        </div>}
      </Card>
    )}
    {/* Proyección dentro de Escenarios */}
    <Card>
      <div style={{fontSize:10,color:C.sub,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',marginBottom:10,fontFamily:C.font}}>
        📈 Curva de ahorro acumulado
      </div>
      <ProyeccionMini data={data} metrics={metrics}/>
    </Card>
    <div style={{height:8}}/>
  </div>;
}


// ─── PROYECCIÓN MINI (for Escenarios tab) ────────
function ProyeccionMini({data,metrics}){
  const{realTotal,thTotal,savGap,comp,nY,nM,pIds}=metrics;
  const chartPts=useMemo(()=>{
    const pts=[];let tC=0,rC=0;
    for(let y=2026;y<=2042;y++){for(let m=(y===2026?4:1);m<=12;m++){
      tC+=mSav(y,m);const e=data.savings.find(s=>s.year===y&&s.month===m);if(e)rC+=e.usd;
      const isReal=(y<nY||(y===nY&&m<=nM));pts.push({y,m,tC,rC:isReal?rC:null});
    }}return pts;
  },[data,nY,nM]);
  const maxV=Math.max(...chartPts.map(p=>p.tC),1);
  const W=700,H=130,ML=32,MB=18,MT=6,MR=6,PW=W-ML-MR,PH=H-MB-MT;
  const xOf=(y,m)=>ML+((y-2026)*12+(m-4))*(PW/((2042-2026)*12+9));
  const yOf=v=>MT+PH-(v/maxV)*PH;
  const tPath=chartPts.map((p,i)=>`${i===0?'M':'L'}${xOf(p.y,p.m).toFixed(1)},${yOf(p.tC).toFixed(1)}`).join(' ');
  const rPts=chartPts.filter(p=>p.rC!=null);
  const rPath=rPts.map((p,i)=>`${i===0?'M':'L'}${xOf(p.y,p.m).toFixed(1)},${yOf(p.rC).toFixed(1)}`).join(' ');
  const compDelay=comp?mDiff(2039,6,comp.y,comp.m):0;
  return<>
    <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch',margin:'0 -2px'}}>
      <svg width={W} height={H+4} style={{display:'block'}}>
        {[0,.5,1].map(f=>{const v=maxV*f,y2=yOf(v);return<g key={f}>
          <line x1={ML} y1={y2} x2={W-MR} y2={y2} stroke={C.border} strokeWidth={1}/>
          <text x={ML-3} y={y2+4} fill={C.sub} fontSize={7} textAnchor="end" fontFamily="Inter">{v>=1000?`${Math.round(v/1000)}K`:'0'}</text>
        </g>;})}
        {[2026,2030,2035,2040,2042].map(yr=><g key={yr}>
          <line x1={xOf(yr,4)} y1={MT} x2={xOf(yr,4)} y2={MT+PH} stroke={C.border2} strokeWidth={1}/>
          <text x={xOf(yr,4)} y={H} fill={C.sub} fontSize={8} textAnchor="middle" fontFamily="Inter">{yr}</text>
        </g>)}
        <path d={tPath} fill="none" stroke={C.muted} strokeWidth={1.5} strokeDasharray="5,3"/>
        {rPath&&<path d={rPath} fill="none" stroke={C.success} strokeWidth={2.5}/>}
        {rPts.map(p=><circle key={`${p.y}-${p.m}`} cx={xOf(p.y,p.m)} cy={yOf(p.rC)} r={2.5} fill={C.success} stroke={C.white} strokeWidth={1}/>)}
      </svg>
    </div>
    <div style={{marginTop:6,display:'flex',justifyContent:'space-between',fontSize:11,fontFamily:C.font}}>
      <span style={{color:C.sub}}>Real: {fUSD(realTotal)}</span>
      <span style={{color:savGap>=0?C.success:C.danger}}>{savGap>=0?'+':''}{fUSD(savGap)} vs teórico</span>
      {comp&&<span style={{color:compDelay>0?C.warning:C.success,fontWeight:700}}>Fin: {mStr(comp.y,comp.m)}</span>}
    </div>
  </>;
}
