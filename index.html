  </div>;
}

// ─── APP ─────────────────────────────────────────
function App(){
  const[tab,setTab]                        =useState('inicio');
  const[data,setData]                      =useState(loadData);
  const[modal,setModal]                    =useState(null);
  const[savForm,setSavForm]                =useState({});
  const[paidForm,setPaidForm]              =useState({});
  const[propForm,setPropForm]              =useState({});
  const[hitoForm,setHitoForm]              =useState({});
  const[addHitoForm,setAddHitoForm]        =useState({});
  const[newPropForm,setNewPropForm]        =useState({});
  const[editingSav,setEditingSav]          =useState(null);
  const[editingPropId,setEditingPropId]    =useState(null);
  const[editingHito,setEditingHito]        =useState(null);
  const[editingHitoProp,setEditingHitoProp]=useState(null);
  const[addingHitoProp,setAddingHitoProp]  =useState(null);
  const[selHito,setSelHito]                =useState(null);
  const[confirmData,setConfirmData]        =useState(null);
  const[planFilter,setPlanFilter]          =useState('todos');
  const[instSetupHito,setInstSetupHito]    =useState(null);
  const[instSetupProp,setInstSetupProp]    =useState(null);
  const[instSetupForm,setInstSetupForm]    =useState({});
  const[instManagePlan,setInstManagePlan]  =useState(null);

  useEffect(()=>{try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}},[data]);
  const metrics      =useMemo(()=>computeMetrics(data),[data]);
  const paymentDates =useMemo(()=>computePaymentDates(data),[data]);

  const openAdd=useCallback(()=>{const now=new Date();setSavForm({year:String(now.getFullYear()),month:String(now.getMonth()+1),local:'',moneda:'ARS',trm:String(data.trm_ars),titulo:''});setEditingSav(null);setModal('saving');},[data.trm_ars]);
  const openEdit=useCallback(s=>{setSavForm({year:String(s.year),month:String(s.month),local:String(s.local),moneda:s.moneda||'ARS',trm:String(s.trm),titulo:s.titulo||''});setEditingSav(s);setModal('saving');},[]);
  const saveSaving=useCallback(()=>{
    const year=parseInt(savForm.year),month=parseInt(savForm.month);
    const local=parseFloat(String(savForm.local||'').replace(/[.,\s]/g,''))||0;
    const trm=parseFloat(savForm.trm)||1500;
    if(!year||!month||!local)return;
    const entry={id:editingSav?.id||`s${Date.now()}`,year,month,local,trm,usd:local/trm,moneda:savForm.moneda||'ARS',titulo:savForm.titulo||''};
    setData(d=>{const ns=editingSav?d.savings.map(s=>s.id===editingSav.id?entry:s):[...d.savings,entry];const tk=savForm.moneda==='COP'?'trm_cop':'trm_ars';return{...d,savings:ns,[tk]:parseFloat(savForm.trm)||d[tk]};});
    setModal(null);
  },[savForm,editingSav]);

  const openMarkPaid=useCallback(h=>{const now=new Date();setSelHito(h);setPaidForm({amount:String(h.usd),date:`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`});setModal('paid');},[]);
  const savePaid=useCallback(()=>{
    const amount=parseFloat(paidForm.amount)||0;
    if(!amount||!paidForm.date||!selHito)return;
    setData(d=>{
      const newPaid={...d.paid,[selHito.id]:{date:paidForm.date,amount_usd:amount}};
      let newHO=d.hitoOverrides;
      if(amount!==selHito.usd)newHO={...d.hitoOverrides,[selHito.id]:{...(d.hitoOverrides?.[selHito.id]||{}),usd:amount}};
      return{...d,paid:newPaid,hitoOverrides:newHO};
    });
    setModal(null);
  },[paidForm,selHito]);
  const unmarkPaid=useCallback(id=>{if(data.paid[id]?.seeded)return;setData(d=>{const p={...d.paid};delete p[id];return{...d,paid:p};});},[data.paid]);

  const changeStatus=useCallback((propId,status)=>{setData(d=>({...d,propStatus:{...d.propStatus,[propId]:status}}));},[]);
  const openEditProp=useCallback(propId=>{
    const pb=getBaseProp(propId,data);if(!pb)return;
    const ov=data.propOverrides?.[propId]||{};
    setPropForm({name:ov.name??pb.name,totalUSD:String(ov.totalUSD??pb.totalUSD),ingreso:String(ov.ingreso??pb.ingreso),comentario:ov.comentario??pb.comentario??'',dreamDate:ov.dreamDate??pb.dreamDate??''});
    setEditingPropId(propId);setModal('editProp');
  },[data]);
  const savePropEdit=useCallback(()=>{
    if(!editingPropId)return;
    setData(d=>({...d,propOverrides:{...d.propOverrides,[editingPropId]:{...(d.propOverrides?.[editingPropId]||{}),
      name:propForm.name||undefined,totalUSD:propForm.totalUSD!==''?parseFloat(propForm.totalUSD):undefined,
      ingreso:propForm.ingreso!==''?parseFloat(propForm.ingreso):undefined,comentario:propForm.comentario!==undefined?propForm.comentario:undefined,dreamDate:propForm.dreamDate||undefined}}}));
    setModal(null);
  },[editingPropId,propForm]);

  const openEditHito=useCallback((hito,propBase)=>{
    const ho=data.hitoOverrides?.[hito.id]||{};
    setEditingHito(hito);setEditingHitoProp(propBase);
    setHitoForm({label:ho.label||hito.label,usd:String(ho.usd??hito.usd),date:ho.date||hito.date});
    setModal('editHito');
  },[data.hitoOverrides]);
  const saveHitoEdit=useCallback(()=>{
    if(!editingHito)return;
    const ov={};
    if(hitoForm.label)ov.label=hitoForm.label;
    if(hitoForm.usd!=='')ov.usd=parseFloat(hitoForm.usd);
    if(hitoForm.date)ov.date=hitoForm.date;
    setData(d=>({...d,hitoOverrides:{...d.hitoOverrides,[editingHito.id]:{...(d.hitoOverrides?.[editingHito.id]||{}),...ov}}}));
    setModal(null);
  },[editingHito,hitoForm]);

  const openAddHito=useCallback(p=>{setAddingHitoProp(p);setAddHitoForm({label:'',usd:'',date:''});setModal('addHito');},[]);
  const saveAddHito=useCallback(()=>{
    if(!addingHitoProp||!addHitoForm.label||!addHitoForm.usd||!addHitoForm.date)return;
    const newId=`custom_${addingHitoProp.id}_${Date.now()}`;
    const newH={id:newId,label:addHitoForm.label,usd:parseFloat(addHitoForm.usd),date:addHitoForm.date};
    setData(d=>({...d,hitoAdditions:{...d.hitoAdditions,[addingHitoProp.id]:[...(d.hitoAdditions?.[addingHitoProp.id]||[]),newH]}}));
    setModal(null);
  },[addingHitoProp,addHitoForm]);

  const removeHito=useCallback((hitoId)=>{
    setConfirmData({msg:'¿Eliminar este hito de pago? Se reflejará en el Plan.',
      onConfirm:()=>{setData(d=>({...d,hitoRemovals:[...(d.hitoRemovals||[]),hitoId]}));setConfirmData(null);}});
  },[]);

  // NEW PROP
  const openNewProp=useCallback(()=>{
    setNewPropForm({name:'',moneda:'COP',totalUSD:'',ingreso:'',comentario:'',color:PROP_COLORS[0].c,colorL:PROP_COLORS[0].l,hitos:[]});
    setModal('newProp');
  },[]);
  const saveNewProp=useCallback(()=>{
    const{name,moneda,totalUSD,ingreso,comentario,color,colorL,hitos}=newPropForm;
    if(!name||!totalUSD||!hitos.length||hitos.some(h=>!h.label||!h.usd||!h.date))return;
    const propId=`custom_prop_${Date.now()}`;
    const builtHitos=hitos.map((h,i)=>({id:`${propId}_h${i}`,label:h.label,usd:parseFloat(h.usd),date:h.date}));
    const newProp={id:propId,name,moneda,trm:moneda==='ARS'?1500:moneda==='COP'?3700:1,
      totalUSD:parseFloat(totalUSD),ingreso:parseFloat(ingreso)||0,
      comentario,color,colorL,dreamDate:newPropForm.dreamDate||builtHitos[0]?.date||'2026-01',
      defStatus:'Sin Iniciar',hitos:builtHitos};
    setData(d=>{
      const updated={...d,customProps:[...(d.customProps||[]),newProp],propStatus:{...d.propStatus,[propId]:'Sin Iniciar'}};
      // Get ALL pending hitos after adding the new prop, then merge preserving manual order
      const allPending=getAllHitos(updated).filter(h=>!new Set(Object.keys(updated.paid)).has(h.id));
      updated.hitoOrder=mergeHitoOrder(d.hitoOrder||[],allPending);
      return updated;
    });
    setModal(null);
  },[newPropForm]);

  const deleteProp=useCallback(propId=>{
    const isBaseProp=PROPS_BASE.some(p=>p.id===propId);
    const propName=getAllProps(data).find(p=>p.id===propId)?.name||propId;
    // Collect all hito IDs for this property
    const getHitoIds=(d)=>{
      const base=PROPS_BASE.find(p=>p.id===propId);
      const custom=(d.customProps||[]).find(p=>p.id===propId);
      const prop=base||custom;
      const baseIds=(prop?.hitos||[]).map(h=>h.id);
      const addedIds=(d.hitoAdditions?.[propId]||[]).map(h=>h.id);
      return new Set([...baseIds,...addedIds]);
    };
    const warnMsg=isBaseProp
      ? `⚠️ "${propName}" es una propiedad base del plan. Al borrarla desaparece de todas las vistas. Podés volver a cargarla con "Restablecer propiedad base" desde ajustes.

¿Confirmar eliminación?`
      : `¿Eliminar "${propName}" y todos sus datos asociados?`;
    setConfirmData({msg:warnMsg,
      onConfirm:()=>{
        setData(d=>{
          const hitoIds=getHitoIds(d);
          // Remove paid records for hitos of this prop
          const newPaid={...d.paid};
          hitoIds.forEach(id=>{if(!d.paid[id]?.seeded||!isBaseProp)delete newPaid[id];});
          // Remove hito overrides
          const newHO={...d.hitoOverrides};
          hitoIds.forEach(id=>delete newHO[id]);
          // Remove installment plans
          const newPlans=(d.installmentPlans||[]).filter(p=>!hitoIds.has(p.hitoId));
          // Remove hito additions for this prop
          const newAd={...d.hitoAdditions};delete newAd[propId];
          // Remove from hitoOrder
          const newOrder=(d.hitoOrder||[]).filter(id=>!hitoIds.has(id));
          // Remove hito removals entries
          const newRemovals=(d.hitoRemovals||[]).filter(id=>!hitoIds.has(id));
          // Remove propStatus and propOverrides
          const newPS={...d.propStatus};delete newPS[propId];
          const newPO={...d.propOverrides};delete newPO[propId];
          // If base prop: add to deletedBaseProps list so it stays hidden
          const newDeleted=isBaseProp?[...(d.deletedBaseProps||[]),propId]:(d.deletedBaseProps||[]);
          // If custom prop: remove from customProps
          const newCustom=(d.customProps||[]).filter(p=>p.id!==propId);
          return{...d,paid:newPaid,hitoOverrides:newHO,installmentPlans:newPlans,
            hitoAdditions:newAd,hitoOrder:newOrder,hitoRemovals:newRemovals,
            propStatus:newPS,propOverrides:newPO,deletedBaseProps:newDeleted,
            customProps:newCustom};
        });
        setConfirmData(null);
      }});
  },[data]);

  // ── INSTALLMENT HANDLERS ──
  const openSetupInstallment=useCallback((hito,propBase)=>{
    setInstSetupHito(hito);
    setInstSetupProp(propBase);
    setInstSetupForm({totalUSD:String(hito.usd),months:'',startDate:''});
    setModal('instSetup');
  },[]);

  const saveInstallmentSetup=useCallback(()=>{
    if(!instSetupHito||!instSetupForm.months||!instSetupForm.startDate)return;
    const totalUSD=parseFloat(instSetupForm.totalUSD)||instSetupHito.usd;
    const months=parseInt(instSetupForm.months);
    const perMonth=Math.ceil(totalUSD/months);
    const newPlan={
      id:`inst_${Date.now()}`,
      hitoId:instSetupHito.id,
      propId:instSetupHito.propId||instSetupProp?.id,
      propName:instSetupHito.propName||instSetupProp?.name||'',
      label:instSetupHito.label,
      amountPerMonth:perMonth,
      totalMonths:months,
      startDate:instSetupForm.startDate,
      status:'active',
      paidMonths:[],
    };
    setData(d=>({...d,installmentPlans:[...(d.installmentPlans||[]),newPlan]}));
    setModal(null);
  },[instSetupHito,instSetupProp,instSetupForm]);

  const manageInstallment=useCallback((plan,action,ef,m)=>{
    if(action==='confirm'){
      // ef = year (number), m = month (number)
      const ym=`${ef}-${String(m).padStart(2,'0')}`;
      setData(d=>{
        const updated=d.installmentPlans.map(p=>{
          if(p.id!==plan.id)return p;
          const newPaidMonths=[...(p.paidMonths||[]),ym];
          const complete=newPaidMonths.length>=p.totalMonths;
          return{...p,paidMonths:newPaidMonths,status:complete?'completed':p.status};
        });
        const updatedPlan=updated.find(p=>p.id===plan.id);
        if(updatedPlan&&planIsComplete(updatedPlan)&&!d.paid[updatedPlan.hitoId]){
          const paidEntry={date:ym,amount_usd:updatedPlan.amountPerMonth*updatedPlan.totalMonths};
          return{...d,installmentPlans:updated,paid:{...d.paid,[updatedPlan.hitoId]:paidEntry}};
        }
        return{...d,installmentPlans:updated};
      });
    } else if(action==='unconfirm'){
      // ef = ym string like '2026-04' to remove from paidMonths
      setData(d=>({...d,installmentPlans:d.installmentPlans.map(p=>{
        if(p.id!==plan.id)return p;
        const newPM=(p.paidMonths||[]).filter(m=>m!==ef);
        const wasComplete=p.status==='completed';
        return{...p,paidMonths:newPM,status:wasComplete?'active':p.status};
      })}));
    } else if(action==='manage'){
      setInstManagePlan(plan);
      setModal('instManage');
    } else if(action==='edit'){
      // ef = editForm object {amountPerMonth, totalMonths, startDate}
      setData(d=>({...d,installmentPlans:d.installmentPlans.map(p=>{
        if(p.id!==plan.id)return p;
        const newMonths=parseInt(ef.totalMonths)||p.totalMonths;
        const newAmt=parseFloat(ef.amountPerMonth)||p.amountPerMonth;
        const newStart=ef.startDate||p.startDate;
        return{...p,amountPerMonth:newAmt,totalMonths:newMonths,startDate:newStart};
      })}));
      setModal(null);
    } else if(action==='pause'){
      setData(d=>({...d,installmentPlans:d.installmentPlans.map(p=>p.id===plan.id?{...p,status:'paused'}:p)}));
      setModal(null);
    } else if(action==='resume'){
      setData(d=>({...d,installmentPlans:d.installmentPlans.map(p=>p.id===plan.id?{...p,status:'active'}:p)}));
      setModal(null);
    } else if(action==='cancel'){
      setConfirmData({msg:`¿Cancelar el plan de cuotas de "${plan.label}"? El hito vuelve a la cola normal de pagos.`,
        onConfirm:()=>{
          setData(d=>({...d,installmentPlans:d.installmentPlans.map(p=>p.id===plan.id?{...p,status:'cancelled'}:p)}));
          setModal(null);setConfirmData(null);
        }});
    }
  },[]);

  const exportBackup=useCallback(()=>{
    try{
      const backup={...data,_version:2,_exportDate:new Date().toISOString(),_app:'retiro_inmobiliario'};
      const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=`retiro_backup_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }catch(e){alert('Error al exportar: '+e.message);}
  },[data]);

  const importBackup=useCallback((e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(parsed._app!=='retiro_inmobiliario')return alert('Archivo no válido — no es un backup de esta app');
        delete parsed._version;delete parsed._exportDate;delete parsed._app;
        setConfirmData({
          msg:`¿Restaurar backup del ${file.name}? Se reemplazarán todos tus datos actuales.`,
          onConfirm:()=>{setData({...DEF,...parsed});setConfirmData(null);}
        });
      }catch(err){alert('Error al leer el archivo: '+err.message);}
    };
    reader.readAsText(file);
    e.target.value=''; // reset file input
  },[]);

  const resetAll=useCallback(()=>{
    setConfirmData({
      msg:'¿Reiniciar la app? Se borrarán ahorros registrados, pagos manuales, planes de cuotas y overrides de capacidad. Las propiedades e hitos base se conservan.',
      onConfirm:()=>{
        const fresh={...DEF};
        SEEDED_IDS.forEach(id=>{fresh.paid[id]={seeded:true};});
        PROPS_BASE.forEach(p=>{fresh.propStatus[p.id]=p.defStatus;});
        setData(fresh);
        setConfirmData(null);
      }
    });
  },[]);

  const restoreProp=useCallback(propId=>{
    setData(d=>({
      ...d,
      deletedBaseProps:(d.deletedBaseProps||[]).filter(id=>id!==propId),
      // Restore propStatus to default
      propStatus:{...d.propStatus,[propId]:(PROPS_BASE.find(p=>p.id===propId)?.defStatus||'Sin Iniciar')},
    }));
  },[]);

  const setMonthOverride=useCallback((key,value)=>{
    setData(d=>{
      const ov={...d.savingsOverrides};
      if(value===null||value===undefined) delete ov[key]; else ov[key]=value;
      return{...d,savingsOverrides:ov};
    });
  },[]);

  const moveHito=useCallback((id,dir)=>{
    setData(d=>{const pending=getOrderedPending(d);const order=pending.map(h=>h.id);const idx=order.indexOf(id);
      if(dir==='up'&&idx>0)[order[idx-1],order[idx]]=[order[idx],order[idx-1]];
      if(dir==='down'&&idx<order.length-1)[order[idx],order[idx+1]]=[order[idx+1],order[idx]];
      return{...d,hitoOrder:order};});},[]);

  const openEditHitoFromPlan=useCallback(h=>{
    const pb=getBaseProp(h.propId,data)||{hitos:[],name:h.propName,color:h.color,colorL:h.colorL};
    openEditHito(h,pb);
  },[openEditHito,data]);

  const NAV_H='calc(74px + env(safe-area-inset-bottom))';
  return<div style={{maxWidth:480,margin:'0 auto',minHeight:'100svh',background:C.bg,fontFamily:C.font,color:C.text,paddingBottom:NAV_H,overflowX:'hidden'}}>
    {tab==='inicio'      &&<InicioTab metrics={metrics} onAddSaving={openAdd} onManual={()=>setModal('manual')} onManageInstallment={manageInstallment}/>}
    {tab==='ahorros'     &&<AhorrosTab data={data} metrics={metrics} onAdd={openAdd} onEdit={openEdit} onDelete={id=>setConfirmData({msg:'¿Eliminar este registro de ahorro?',onConfirm:()=>{setData(d=>({...d,savings:d.savings.filter(s=>s.id!==id)}));setConfirmData(null);}})} onSetOverride={setMonthOverride} onReset={resetAll} onExport={exportBackup} onImport={importBackup} onRestoreProp={restoreProp}/>}
    {tab==='propiedades' &&<PropiedadesTab data={data} onChangeStatus={changeStatus} onEditProp={openEditProp} onEditHito={openEditHito} onAddHito={openAddHito} onRemoveHito={removeHito} onDeleteProp={deleteProp} onNewProp={openNewProp} onUnmark={unmarkPaid} onSetupInstallment={openSetupInstallment}/>}
    {tab==='plan'        &&<PlanTab data={data} metrics={metrics} paymentDates={paymentDates} planFilter={planFilter} setPlanFilter={setPlanFilter} onMarkPaid={openMarkPaid} onUnmark={unmarkPaid} onMoveHito={moveHito} onEditHitoFromPlan={openEditHitoFromPlan}/>}
    {tab==='historial'   &&<HistorialTab data={data} metrics={metrics}/>}
    {tab==='escenarios'  &&<EscenariosTab data={data} metrics={metrics}/>}
    {tab==='proyeccion'  &&<ProyeccionTab data={data} metrics={metrics}/>}

    {modal==='manual'   &&<ManualModal onClose={()=>setModal(null)}/>}
    {modal==='saving'   &&<SavingModal form={savForm} setForm={setSavForm} data={data} onSave={saveSaving} onClose={()=>setModal(null)} isEdit={!!editingSav}/>}
    {modal==='paid'     &&<PaidModal form={paidForm} setForm={setPaidForm} hito={selHito} onSave={savePaid} onClose={()=>setModal(null)}/>}
    {modal==='editProp' &&<EditPropModal propId={editingPropId} data={data} form={propForm} setForm={setPropForm} onSave={savePropEdit} onClose={()=>setModal(null)}/>}
    {modal==='editHito' &&<EditHitoModal hito={editingHito} propBase={editingHitoProp} form={hitoForm} setForm={setHitoForm} onSave={saveHitoEdit} onClose={()=>setModal(null)}/>}
    {modal==='addHito'  &&<AddHitoModal propBase={addingHitoProp} form={addHitoForm} setForm={setAddHitoForm} onSave={saveAddHito} onClose={()=>setModal(null)}/>}
    {modal==='newProp'  &&<NewPropModal form={newPropForm} setForm={setNewPropForm} onSave={saveNewProp} onClose={()=>setModal(null)}/>}
    {modal==='instSetup'&&<InstallmentSetupModal hito={instSetupHito} propBase={instSetupProp} form={instSetupForm} setForm={setInstSetupForm} onSave={saveInstallmentSetup} onClose={()=>setModal(null)}/>}
    {modal==='instManage'&&<InstallmentManageModal plan={instManagePlan} onAction={(a,ef)=>manageInstallment(instManagePlan,a,ef)} onClose={()=>setModal(null)}/>}
    {confirmData&&<ConfirmModal msg={confirmData.msg} onConfirm={confirmData.onConfirm} onCancel={()=>setConfirmData(null)}/>}
    <BottomNav tab={tab} setTab={setTab}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
