<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Retiro">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <title>Plan de Retiro</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overscroll-behavior:none;background:#0a1628}
    ::-webkit-scrollbar{display:none}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .fade-in{animation:fadeIn .3s ease forwards}
    .slide-up{animation:slideUp .35s cubic-bezier(.16,1,.3,1) forwards}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState, useEffect, useMemo, useCallback} = React;

// ─────────────────────────────────────────────
// CONSTANTES
// ─────────────────────────────────────────────
const KEY = 'retiro_inmobiliario';

const PLAN = [
  {id:'P01',desc:'Pago Chantilly',           usd:29000, prop:'2026-09',orig:'2026-06'},
  {id:'P02',desc:'C. Inicial Casa Bs As',    usd:60000, prop:'2027-10',orig:'2027-06'},
  {id:'P03',desc:'Abono Reserva del Mar',    usd:52000, prop:'2028-08',orig:'2028-06'},
  {id:'P04',desc:'C. Inicial Bogotá 1',      usd:30000, prop:'2029-03',orig:'2028-12'},
  {id:'P05',desc:'Avícola',                  usd:50000, prop:'2030-02',orig:'2029-06'},
  {id:'P06',desc:'Abono Casa Bs As',         usd:30000, prop:'2030-07',orig:'2029-12'},
  {id:'P07',desc:'Obra Quincho',             usd:25000, prop:'2031-01',orig:'2030-07'},
  {id:'P08',desc:'C. Inicial Bogotá 2',      usd:30000, prop:'2031-06',orig:'2030-07'},
  {id:'P09',desc:'Obra Quincho 2da',         usd:25000, prop:'2032-01',orig:'2030-12'},
  {id:'P10',desc:'C. Inicial Medellín',      usd:30000, prop:'2032-06',orig:'2031-07'},
  {id:'P11',desc:'Abono Bogotá 1',           usd:30000, prop:'2033-01',orig:'2031-12'},
  {id:'P12',desc:'Abono Bogotá 2',           usd:30000, prop:'2033-06',orig:'2032-06'},
  {id:'P13',desc:'Pago Indigo',              usd:18610, prop:'2033-11',orig:'2032-12'},
  {id:'P14',desc:'Abono Casa Bs As 2',       usd:50000, prop:'2034-09',orig:'2033-06'},
  {id:'P15',desc:'Pago Reserva del Mar',     usd:72000, prop:'2035-12',orig:'2034-06'},
  {id:'P16',desc:'Abono Medellín',           usd:30000, prop:'2036-05',orig:'2034-12'},
  {id:'P17',desc:'Pago Bogotá 1',            usd:40000, prop:'2037-02',orig:'2035-06'},
  {id:'P18',desc:'Pago Bogotá 2',            usd:40000, prop:'2037-11',orig:'2035-12'},
  {id:'P19',desc:'Abono Casa Bs As 3',       usd:43390, prop:'2038-07',orig:'2036-06'},
  {id:'P20',desc:'Pago Medellín',            usd:40000, prop:'2039-04',orig:'2037-06'},
  {id:'P21',desc:'Pago Casa Bs As',          usd:16610, prop:'2039-06',orig:'2037-06'},
];
const PLAN_TOTAL = PLAN.reduce((s,p)=>s+p.usd,0); // 771,610

const MES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MES_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const C = {
  bg:'#0a1628', card:'#132140', card2:'#1a2d50',
  primary:'#4fa3f7', gold:'#e8b84b', goldBg:'rgba(232,184,75,.12)',
  success:'#34d399', successBg:'rgba(52,211,153,.12)',
  danger:'#f87171', dangerBg:'rgba(248,113,113,.12)',
  warning:'#fb923c', warningBg:'rgba(251,146,60,.12)',
  text:'#e2e8f0', sub:'#7c93b5', border:'rgba(255,255,255,.08)',
  navBg:'#0d1e38', font:"'DM Sans', system-ui, sans-serif",
  serif:"'DM Serif Display', Georgia, serif",
};

const DEF = {trm:1500, savings:[], paid:{}};

// ─────────────────────────────────────────────
// UTILIDADES
// ─────────────────────────────────────────────
const fUSD = n => '$'+Math.round(n).toLocaleString('es-AR');
const fARS = n => '$'+Math.round(n).toLocaleString('es-AR');
const mStr = (y,m) => `${MES[m-1]} ${y}`;
const pDate = s => {const[y,m]=s.split('-').map(Number);return{y,m};};

const mSav = (y,m) => m<=6 ? 6000 : 22000/6; // mensual teórico USD

function theorCumul(toY,toM){
  let t=0,y=2026,m=4;
  while(y<toY||(y===toY&&m<=toM)){t+=mSav(y,m);m++;if(m>12){y++;m=1;}}
  return t;
}

function addM(y,m,n){
  m+=n; while(m>12){m-=12;y++;} while(m<1){m+=12;y--;}
  return{y,m};
}
const mDiff=(y1,m1,y2,m2)=>(y2-y1)*12+(m2-m1);

function computeMetrics(data){
  const now=new Date(), nY=now.getFullYear(), nM=now.getMonth()+1;
  const realTotal=data.savings.reduce((s,e)=>s+e.usd,0);
  const paidTotal=Object.values(data.paid).reduce((s,p)=>s+(p.amount_usd||0),0);
  const realBalance=realTotal-paidTotal;
  const thTotal=theorCumul(nY,nM);
  const savGap=realTotal-thTotal; // + adelantado
  const paidCount=Object.keys(data.paid).length;
  const next=PLAN.find(p=>!data.paid[p.id]);
  
  // Delay próximo pago
  let nd=null;
  if(next){
    const{y:py,m:pm}=pDate(next.prop);
    const planMo=mDiff(nY,nM,py,pm);
    if(realBalance>=next.usd){
      nd={months:0,status:'ready',canPay:true,payment:next};
    } else {
      let bal=realBalance,cy=nY,cm=nM,mo=0;
      while(bal<next.usd&&mo<400){cm++;if(cm>12){cy++;cm=1;}bal+=mSav(cy,cm);mo++;}
      const delay=Math.max(0,mo-Math.max(0,planMo));
      nd={months:delay,status:delay===0?'ok':delay<=3?'warning':'danger',
          canPay:false,monthsNeeded:mo,reachDate:addM(nY,nM,mo),payment:next};
    }
  }
  
  // Completion estimate
  let comp=null;
  const rem=PLAN.filter(p=>!data.paid[p.id]);
  if(rem.length>0){
    let bal=realBalance,cy=nY,cm=nM,r=[...rem],it=0;
    while(r.length>0&&it++<600){
      cm++;if(cm>12){cy++;cm=1;}bal+=mSav(cy,cm);
      while(r.length>0&&bal>=r[0].usd){bal-=r[0].usd;r.shift();}
    }
    comp={y:cy,m:cm};
  }
  const compDelay=comp?mDiff(2039,6,comp.y,comp.m):0;

  // Last 3 months avg savings rate
  const sorted=[...data.savings].sort((a,b)=>b.year-a.year||(b.month-a.month));
  const last3=sorted.slice(0,3);
  const avgRate=last3.length>0?last3.reduce((s,e)=>s+e.usd,0)/last3.length:mSav(nY,nM);
  
  let overall='ok';
  if(savGap<-5000||( nd&&nd.months>3)) overall='danger';
  else if(savGap<-1000||(nd&&nd.months>0&&nd.months<=3)) overall='warning';

  return{realTotal,paidTotal,realBalance,thTotal,savGap,paidCount,next,nd,comp,compDelay,overall,avgRate,nY,nM};
}

function buildChart(data){
  const now=new Date(),nY=now.getFullYear(),nM=now.getMonth()+1;
  let tC=0,rC=0; const pts=[];
  let y=2026,m=4;
  while(y<2040){
    tC+=mSav(y,m);
    const e=data.savings.find(s=>s.year===y&&s.month===m);
    if(e) rC+=e.usd;
    const isReal=y<nY||(y===nY&&m<=nM);
    const pay=PLAN.find(p=>{const{y:py,m:pm}=pDate(p.prop);return py===y&&pm===m;});
    pts.push({y,m,tC,rC:isReal?rC:null,pay});
    m++;if(m>12){y++;m=1;}
  }
  return pts;
}

// ─────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────
const loadData=()=>{
  try{const s=localStorage.getItem(KEY);if(s)return{...DEF,...JSON.parse(s)};}catch(e){}
  return{...DEF};
};

// ─────────────────────────────────────────────
// SUB-COMPONENTES (sin hooks)
// ─────────────────────────────────────────────

function Header({title,sub}){
  return(
    <div style={{background:`linear-gradient(135deg,#0d1e38 0%,#162847 100%)`,padding:'20px 20px 16px',borderBottom:`1px solid ${C.border}`}}>
      <div style={{fontSize:11,color:C.gold,fontWeight:600,letterSpacing:2,textTransform:'uppercase',marginBottom:4}}>Plan de Retiro</div>
      <div style={{fontFamily:C.serif,fontSize:22,color:C.text,lineHeight:1.2}}>{title}</div>
      {sub&&<div style={{fontSize:13,color:C.sub,marginTop:4}}>{sub}</div>}
    </div>
  );
}

function Card({children,style={}}){
  return <div style={{background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`,margin:'0 16px 12px',...style}}>{children}</div>;
}

function StatusPill({status}){
  const conf={ok:{c:C.success,bg:C.successBg,icon:'✓',text:'Al día'},
    warning:{c:C.warning,bg:C.warningBg,icon:'▲',text:'Atención'},
    danger:{c:C.danger,bg:C.dangerBg,icon:'✕',text:'Retrasado'},
    ready:{c:C.gold,bg:C.goldBg,icon:'★',text:'Listo para pagar'}};
  const s=conf[status]||conf.ok;
  return(
    <span style={{display:'inline-flex',alignItems:'center',gap:5,background:s.bg,color:s.c,
      padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:600}}>
      <span>{s.icon}</span><span>{s.text}</span>
    </span>
  );
}

function ProgressBar({value,max,color=C.primary}){
  const pct=Math.min(100,Math.max(0,(value/max)*100));
  return(
    <div style={{height:6,background:'rgba(255,255,255,.1)',borderRadius:3,overflow:'hidden'}}>
      <div style={{height:'100%',width:`${pct}%`,background:color,borderRadius:3,
        transition:'width .5s ease'}}/>
    </div>
  );
}

function InicioTab({metrics,data,onAddSaving}){
  const{realTotal,paidTotal,realBalance,thTotal,savGap,paidCount,next,nd,comp,compDelay,overall,nY,nM}=metrics;
  const ahead=savGap>=0;
  const totalAhorrado=realTotal;
  
  const statusConf={
    ok:{color:C.success,bg:C.successBg,msg:'Vas al día con el plan'},
    warning:{color:C.warning,bg:C.warningBg,msg:'Atención: podés estar retrasándote'},
    danger:{color:C.danger,bg:C.dangerBg,msg:'Retrasado respecto al plan'},
  };
  const sc=statusConf[overall]||statusConf.ok;

  return(
    <div className="fade-in">
      <Header title="Inicio" sub={`${mStr(nY,nM)} · Actualizado ahora`}/>
      
      {/* Estado general */}
      <div style={{margin:'16px 16px 0'}}>
        <div style={{background:sc.bg,border:`1px solid ${sc.color}33`,borderRadius:16,padding:16,display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:44,height:44,borderRadius:22,background:sc.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>
            {overall==='ok'?'🟢':overall==='warning'?'🟡':'🔴'}
          </div>
          <div>
            <div style={{fontWeight:700,color:sc.color,fontSize:15}}>{sc.msg}</div>
            <div style={{fontSize:13,color:C.sub,marginTop:2}}>
              {ahead?`Adelantado ${fUSD(Math.abs(savGap))} vs teórico`:`Déficit de ${fUSD(Math.abs(savGap))} vs teórico`}
            </div>
          </div>
        </div>
      </div>
      
      {/* Saldo real vs teórico */}
      <Card style={{marginTop:12}}>
        <div style={{fontSize:11,color:C.sub,fontWeight:600,letterSpacing:1,textTransform:'uppercase',marginBottom:12}}>Ahorro Acumulado</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div>
            <div style={{fontSize:11,color:C.sub}}>Real ahorrado</div>
            <div style={{fontSize:22,fontWeight:700,color:C.text,fontFamily:C.serif}}>{fUSD(realTotal)}</div>
          </div>
          <div>
            <div style={{fontSize:11,color:C.sub}}>Teórico a la fecha</div>
            <div style={{fontSize:22,fontWeight:700,color:ahead?C.success:C.danger,fontFamily:C.serif}}>{fUSD(thTotal)}</div>
          </div>
        </div>
        <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:13,color:C.sub}}>Balance disponible (post pagos)</span>
          <span style={{fontSize:15,fontWeight:700,color:C.primary}}>{fUSD(realBalance)}</span>
        </div>
        <div style={{marginTop:10}}>
          <ProgressBar value={realTotal} max={PLAN_TOTAL} color={ahead?C.success:C.warning}/>
          <div style={{fontSize:11,color:C.sub,marginTop:4,textAlign:'right'}}>
            {((realTotal/PLAN_TOTAL)*100).toFixed(1)}% del plan total ({fUSD(PLAN_TOTAL)})
          </div>
        </div>
      </Card>

      {/* Próximo pago */}
      {next&&(
        <Card>
          <div style={{fontSize:11,color:C.sub,fontWeight:600,letterSpacing:1,textTransform:'uppercase',marginBottom:12}}>
            Próximo Pago · #{PLAN.findIndex(p=>p.id===next.id)+1} de 21
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{fontSize:17,fontWeight:700,color:C.text}}>{next.desc}</div>
              <div style={{fontSize:13,color:C.sub,marginTop:2}}>{(()=>{const{y,m}=pDate(next.prop);return mStr(y,m);})()} (plan)</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:C.serif,fontSize:22,color:C.gold,fontWeight:700}}>{fUSD(next.usd)}</div>
              <div style={{fontSize:11,color:C.sub}}>USD</div>
            </div>
          </div>
          
          <div style={{marginTop:12}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:12,color:C.sub}}>Acumulado para este pago</span>
              <span style={{fontSize:12,color:C.text,fontWeight:600}}>
                {fUSD(Math.min(realBalance,next.usd))} / {fUSD(next.usd)}
              </span>
            </div>
            <ProgressBar value={realBalance} max={next.usd}
              color={realBalance>=next.usd?C.success:realBalance>=next.usd*0.7?C.warning:C.danger}/>
          </div>
          
          <div style={{marginTop:12}}>
            {nd&&nd.canPay?(
              <div style={{background:C.successBg,borderRadius:10,padding:'10px 12px',fontSize:13,color:C.success,fontWeight:600}}>
                ✓ Tenés el saldo suficiente para realizar este pago
              </div>
            ):nd?(
              <div style={{background:nd.status==='ok'?C.successBg:nd.status==='warning'?C.warningBg:C.dangerBg,
                borderRadius:10,padding:'10px 12px',fontSize:13,color:nd.status==='ok'?C.success:nd.status==='warning'?C.warning:C.danger}}>
                {nd.months===0
                  ?`✓ Llegarás a tiempo — Saldo suficiente en ${mStr(nd.reachDate.y,nd.reachDate.m)}`
                  :`▲ Delay estimado: ${nd.months} ${nd.months===1?'mes':'meses'} — Podrías pagar en ${mStr(nd.reachDate.y,nd.reachDate.m)}`
                }
              </div>
            ):null}
          </div>
        </Card>
      )}
      
      {/* Finalización estimada */}
      {comp&&(
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:11,color:C.sub,fontWeight:600,letterSpacing:1,textTransform:'uppercase'}}>Fin estimado del plan</div>
              <div style={{fontSize:20,fontWeight:700,color:C.text,fontFamily:C.serif,marginTop:4}}>{mStr(comp.y,comp.m)}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:11,color:C.sub}}>Plan base</div>
              <div style={{fontSize:14,color:C.sub,textDecoration:'line-through',marginTop:2}}>Jun 2039</div>
              {compDelay>0&&<div style={{fontSize:13,color:C.warning,fontWeight:600}}>+{compDelay}m de delay</div>}
              {compDelay<=0&&<div style={{fontSize:13,color:C.success,fontWeight:600}}>Sin delay ✓</div>}
            </div>
          </div>
          <div style={{marginTop:10}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:12,color:C.sub}}>
              <span>{paidCount} de 21 pagos realizados</span>
              <span>{fUSD(paidTotal)} pagado</span>
            </div>
            <ProgressBar value={paidCount} max={21} color={C.gold}/>
          </div>
        </Card>
      )}
      
      {/* CTA */}
      <div style={{padding:'4px 16px 8px'}}>
        <button onClick={onAddSaving} style={{width:'100%',padding:'14px',background:`linear-gradient(135deg,${C.primary},#2563eb)`,
          border:'none',borderRadius:14,color:'#fff',fontSize:16,fontWeight:700,cursor:'pointer',
          fontFamily:C.font,letterSpacing:.3,boxShadow:'0 4px 16px rgba(79,163,247,.3)'}}>
          + Registrar Ahorro del Mes
        </button>
      </div>
    </div>
  );
}

function AhorrosTab({data,metrics,onAdd,onDelete}){
  const sorted=[...data.savings].sort((a,b)=>b.year-a.year||(b.month-a.month));
  const{avgRate,nY,nM}=metrics;
  
  return(
    <div className="fade-in">
      <Header title="Ahorros" sub="Registro mensual en ARS"/>
      
      {/* Resumen */}
      <Card style={{marginTop:12}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,textAlign:'center'}}>
          <div>
            <div style={{fontSize:11,color:C.sub}}>Total USD</div>
            <div style={{fontSize:17,fontWeight:700,color:C.primary,marginTop:2}}>{fUSD(metrics.realTotal)}</div>
          </div>
          <div style={{borderLeft:`1px solid ${C.border}`,borderRight:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.sub}}>Meses reg.</div>
            <div style={{fontSize:17,fontWeight:700,color:C.text,marginTop:2}}>{data.savings.length}</div>
          </div>
          <div>
            <div style={{fontSize:11,color:C.sub}}>Promedio/mes</div>
            <div style={{fontSize:17,fontWeight:700,color:C.gold,marginTop:2}}>{fUSD(avgRate)}</div>
          </div>
        </div>
        {/* TRM configurado */}
        <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:13,color:C.sub}}>TRM configurada (ARS/USD)</span>
          <span style={{fontSize:14,fontWeight:700,color:C.gold}}>$ {data.trm.toLocaleString('es-AR')}</span>
        </div>
      </Card>
      
      {/* Lista */}
      {sorted.length===0?(
        <div style={{textAlign:'center',padding:'40px 20px',color:C.sub}}>
          <div style={{fontSize:36,marginBottom:12}}>💰</div>
          <div style={{fontSize:15,fontWeight:600,color:C.text}}>Sin ahorros registrados</div>
          <div style={{fontSize:13,marginTop:4}}>Registrá tu primer ahorro mensual para empezar a trackear el plan</div>
        </div>
      ):(
        <div style={{padding:'0 0 8px'}}>
          {sorted.map(s=>{
            const th=mSav(s.year,s.month);
            const diff=s.usd-th;
            const ok=diff>=0;
            return(
              <div key={s.id} className="fade-in" style={{margin:'0 16px 8px',background:C.card,borderRadius:14,padding:14,
                border:`1px solid ${C.border}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:C.text}}>{mStr(s.year,s.month)}</div>
                    <div style={{fontSize:12,color:C.sub,marginTop:2}}>
                      {fARS(s.ars)} · TRM {s.trm.toLocaleString()}
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:18,fontWeight:700,color:ok?C.success:C.danger}}>{fUSD(s.usd)}</div>
                    <div style={{fontSize:11,color:ok?C.success:C.danger,marginTop:1}}>
                      {ok?`+${fUSD(diff)} vs teórico`:`${fUSD(diff)} vs teórico`}
                    </div>
                  </div>
                </div>
                <div style={{marginTop:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{flex:1,marginRight:12}}>
                    <ProgressBar value={s.usd} max={Math.max(s.usd,th)} color={ok?C.success:C.warning}/>
                    <div style={{fontSize:10,color:C.sub,marginTop:3}}>Teórico: {fUSD(th)}</div>
                  </div>
                  <button onClick={()=>onDelete(s.id)} style={{background:'transparent',border:`1px solid ${C.border}`,
                    color:C.sub,borderRadius:8,padding:'4px 8px',cursor:'pointer',fontSize:12,fontFamily:C.font}}>
                    Eliminar
                  </button>

function ProyeccionTab({chartData,metrics,data}){
  const{realTotal,thTotal,savGap,compDelay,comp}=metrics;
  const maxVal=Math.max(...chartData.map(p=>p.tC));
  const W=1100,H=200,ML=45,MB=25,MT=10,MR=10;
  const PW=W-ML-MR,PH=H-MB-MT;
  
  const xOf=(y,m)=>{
    const mo=(y-2026)*12+(m-4);
    return ML+mo*(PW/((2040-2026)*12));
  };
  const yOf=(v)=>MT+PH-v*(PH/maxVal);
  
  const tPts=chartData.filter(p=>p.tC!=null);
  const rPts=chartData.filter(p=>p.rC!=null);
  
  const toPath=pts=>pts.map((p,i)=>`${i===0?'M':'L'}${xOf(p.y,p.m).toFixed(1)},${yOf(p.tC??p.rC).toFixed(1)}`).join(' ');
  const rPath=rPts.map((p,i)=>`${i===0?'M':'L'}${xOf(p.y,p.m).toFixed(1)},${yOf(p.rC).toFixed(1)}`).join(' ');
  
  const years=[2026,2028,2030,2032,2034,2036,2038,2040];
  const payments=PLAN.map(p=>{const{y,m}=pDate(p.prop);return{...p,y,m};});
  
  return(
    <div className="fade-in">
      <Header title="Proyección" sub="Curva de ahorro real vs teórico"/>
      
      <Card style={{marginTop:12,padding:'16px 0 8px'}}>
        <div style={{paddingLeft:16,marginBottom:12,fontSize:11,color:C.sub,fontWeight:600,letterSpacing:1,textTransform:'uppercase'}}>
          Curva Acumulada (USD)
        </div>
        <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          <svg width={W} height={H+5} style={{display:'block'}}>
            {/* Grid horizontal */}
            {[0,.25,.5,.75,1].map(f=>{
              const v=maxVal*f;
              const y2=yOf(v);
              return(
                <g key={f}>
                  <line x1={ML} y1={y2} x2={W-MR} y2={y2} stroke="rgba(255,255,255,.05)" strokeWidth={1}/>
                  <text x={ML-4} y={y2+4} fill={C.sub} fontSize={8} textAnchor="end">
                    {v>=1000?`${(v/1000).toFixed(0)}K`:'0'}
                  </text>
                </g>
              );
            })}
            
            {/* Year labels */}
            {years.map(yr=>{
              const x=xOf(yr,1);
              return(
                <g key={yr}>
                  <line x1={x} y1={MT} x2={x} y2={MT+PH} stroke="rgba(255,255,255,.04)" strokeWidth={1}/>
                  <text x={x} y={H} fill={C.sub} fontSize={9} textAnchor="middle">{yr}</text>
                </g>
              );
            })}
            
            {/* Payment markers */}
            {payments.filter(p=>!data.paid[p.id]).map(p=>{
              const x=xOf(p.y,p.m);
              return(
                <g key={p.id}>
                  <line x1={x} y1={MT} x2={x} y2={MT+PH}
                    stroke={C.gold} strokeWidth={1} strokeDasharray="3,3" opacity={.5}/>
                </g>
              );
            })}
            
            {/* Theoretical line */}
            <path d={toPath(tPts)} fill="none" stroke={C.sub} strokeWidth={1.5}
              strokeDasharray="5,3" opacity={.5}/>
            
            {/* Real line */}
            {rPath&&<path d={rPath} fill="none" stroke={C.success} strokeWidth={2.5}/>}
            
            {/* Real dots */}
            {rPts.map(p=>(
              <circle key={`${p.y}-${p.m}`} cx={xOf(p.y,p.m)} cy={yOf(p.rC)} r={3}
                fill={C.success} stroke={C.card} strokeWidth={1.5}/>
            ))}
          </svg>
        </div>
        <div style={{display:'flex',gap:16,padding:'4px 16px 8px',flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:24,height:2,background:C.sub,borderRadius:1}}/>
            <span style={{fontSize:11,color:C.sub}}>Teórico</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:24,height:2.5,background:C.success,borderRadius:1}}/>
            <span style={{fontSize:11,color:C.sub}}>Real ahorrado</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:16,height:1,borderTop:`1px dashed ${C.gold}`}}/>
            <span style={{fontSize:11,color:C.sub}}>Pagos pendientes</span>
          </div>
        </div>
      </Card>
      
      {/* Stats */}
      <Card>
        <div style={{fontSize:11,color:C.sub,fontWeight:600,letterSpacing:1,textTransform:'uppercase',marginBottom:12}}>
          Métricas del Plan
        </div>
        {[
          {label:'Ahorrado real',val:fUSD(realTotal),color:C.success},
          {label:'Teórico a la fecha',val:fUSD(thTotal),color:C.sub},
          {label:'Diferencia',val:(savGap>=0?'+':'')+fUSD(savGap),color:savGap>=0?C.success:C.danger},
          {label:'Total plan',val:fUSD(PLAN_TOTAL),color:C.text},
          {label:'Fin del plan (base)',val:'Jun 2039',color:C.sub},
          {label:'Fin estimado real',val:comp?mStr(comp.y,comp.m):'—',color:compDelay>0?C.warning:C.success},
          {label:'Delay acumulado',val:compDelay>0?`+${compDelay} meses`:compDelay<0?`${compDelay}m adelantado`:'Sin delay',
            color:compDelay>0?C.warning:C.success},
        ].map(({label,val,color})=>(
          <div key={label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:13,color:C.sub}}>{label}</span>
            <span style={{fontSize:14,fontWeight:700,color}}>{val}</span>
          </div>
        ))}
      </Card>
    </div>
  );
}

// APP PRINCIPAL
// ─────────────────────────────────────────────
function App(){
  // ─── TODOS LOS HOOKS AL TOPE ───
  const[tab,setTab]=useState('inicio');
  const[data,setData]=useState(loadData);
  const[modal,setModal]=useState(null); // null|'addSaving'|'markPaid'|'config'
  const[savForm,setSavForm]=useState({year:'',month:'',ars:'',trm:'',notes:''});
  const[paidForm,setPaidForm]=useState({paymentId:'',amount:'',date:''});
  const[confirmDel,setConfirmDel]=useState(null);
  const[configForm,setConfigForm]=useState({trm:''});
  const[selectedPayment,setSelectedPayment]=useState(null);

  useEffect(()=>{
    try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}
  },[data]);

  const metrics=useMemo(()=>computeMetrics(data),[data]);
  const chartData=useMemo(()=>buildChart(data),[data]);

  // ─── HANDLERS ───
  const openAdd=useCallback(()=>{
    const now=new Date();
    setSavForm({year:String(now.getFullYear()),month:String(now.getMonth()+1),ars:'',trm:String(data.trm),notes:''});
    setModal('addSaving');
  },[data.trm]);

  const saveSaving=useCallback(()=>{
    const year=parseInt(savForm.year),month=parseInt(savForm.month);
    const ars=parseFloat(String(savForm.ars).replace(/[.,\s]/g,''))||0;
    const trm=parseFloat(savForm.trm)||data.trm;
    if(!year||!month||!ars) return;
    const usd=ars/trm;
    const exists=data.savings.find(s=>s.year===year&&s.month===month);
    const newSav=exists
      ?data.savings.map(s=>s.year===year&&s.month===month?{...s,ars,trm,usd}:s)
      :[...data.savings,{id:`s${Date.now()}`,year,month,ars,trm,usd}];
    setData(d=>({...d,savings:newSav}));
    setModal(null);
  },[savForm,data]);

  const deleteConfirm=useCallback(id=>setConfirmDel(id),[]);
  const doDelete=useCallback(()=>{
    setData(d=>({...d,savings:d.savings.filter(s=>s.id!==confirmDel)}));
    setConfirmDel(null);
  },[confirmDel]);

  const openMarkPaid=useCallback(payment=>{
    const now=new Date();
    const yy=now.getFullYear(),mm=String(now.getMonth()+1).padStart(2,'0');
    setSelectedPayment(payment);
    setPaidForm({paymentId:payment.id,amount:String(payment.usd),date:`${yy}-${mm}`});
    setModal('markPaid');
  },[]);

  const savePaid=useCallback(()=>{
    const amount=parseFloat(paidForm.amount)||0;
    if(!amount||!paidForm.date) return;
    setData(d=>({...d,paid:{...d.paid,[paidForm.paymentId]:{date:paidForm.date,amount_usd:amount}}}));
    setModal(null);
    setSelectedPayment(null);
  },[paidForm]);

  const unmarkPaid=useCallback(id=>{
    setData(d=>{const p={...d.paid};delete p[id];return{...d,paid:p};});
  },[]);

  const openConfig=useCallback(()=>{
    setConfigForm({trm:String(data.trm)});
    setModal('config');
  },[data.trm]);

  const saveConfig=useCallback(()=>{
    const trm=parseFloat(configForm.trm);
    if(trm>0) setData(d=>({...d,trm}));
    setModal(null);
  },[configForm]);

  // ─── RENDER ───
  return(
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100svh',background:C.bg,
      fontFamily:C.font,color:C.text,paddingBottom:70,overflowX:'hidden'}}>
      
      {tab==='inicio'&&<InicioTab metrics={metrics} data={data} onAddSaving={openAdd}/>}
      {tab==='ahorros'&&<AhorrosTab data={data} metrics={metrics} onAdd={openAdd} onDelete={deleteConfirm}/>}
      {tab==='plan'&&<PlanTab data={data} metrics={metrics} onMarkPaid={openMarkPaid} onUnmark={unmarkPaid}/>}
      {tab==='proyeccion'&&<ProyeccionTab chartData={chartData} metrics={metrics} data={data}/>}
      
      {modal==='addSaving'&&(
        <AddSavingModal form={savForm} setForm={setSavForm} data={data}
          onSave={saveSaving} onClose={()=>setModal(null)}/>
      )}
      {modal==='markPaid'&&selectedPayment&&(
        <MarkPaidModal paidForm={paidForm} setPaidForm={setPaidForm}
          payment={selectedPayment} onSave={savePaid} onClose={()=>setModal(null)}/>
      )}
      {modal==='config'&&(
        <ConfigModal data={data} configForm={configForm} setConfigForm={setConfigForm}
          onSave={saveConfig} onClose={()=>setModal(null)}/>
      )}
      {confirmDel&&(
        <ConfirmModal msg="¿Eliminás este registro de ahorro? Esta acción no se puede deshacer."
          onConfirm={doDelete} onCancel={()=>setConfirmDel(null)}/>
      )}
      
      <BottomNav tab={tab} setTab={setTab} metrics={metrics}/>
      
      {/* Config gear en proyeccion */}
      {tab==='proyeccion'&&(
        <button onClick={openConfig} style={{position:'fixed',top:14,right:16,zIndex:50,
          background:'rgba(255,255,255,.08)',border:`1px solid ${C.border}`,borderRadius:20,
          color:C.sub,width:36,height:36,cursor:'pointer',fontSize:16,fontFamily:C.font}}>⚙</button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
